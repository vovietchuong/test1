function topicWeaknessMatrixHTML(arr=analyticsFilteredSubmissions()){
  const qMeta={};
  questionBank.forEach(q=>{qMeta[String(q.id)]={topic: q.topicName||topicName(q.topicId)||'Chủ đề khác', text:q.text||''};});
  exams.forEach(e=>(e.questions||[]).forEach(q=>{qMeta[String(q.id)]={topic:q.topicName||topicName(q.topicId||e.topicId)||'Chủ đề khác', text:q.text||''};}));
  const map={};
  arr.forEach(s=>(s.details||[]).forEach(d=>{const meta=qMeta[String(d.qid)]||{topic:'Chưa xác định'}; const k=meta.topic; map[k]=map[k]||{total:0,wrong:0}; map[k].total++; if(!d.ok) map[k].wrong++;}));
  const rows=Object.entries(map).map(([topic,v])=>({topic,total:v.total,wrong:v.wrong,rate:v.total?Math.round(v.wrong*100/v.total):0})).sort((a,b)=>b.rate-a.rate||b.total-a.total).slice(0,8);

}
function examStatusBadge(e){
  const av=getExamAvailability(e,{role:'student',className:(e.classIds||[])[0]||''});
  if(e.isPublished===false) return '<span class="px-2 py-1 rounded-full bg-amber-100 text-amber-700 text-xs font-bold">Nháp</span>';
  if(e.endTime && Date.now()>new Date(e.endTime).getTime()) return '<span class="px-2 py-1 rounded-full bg-slate-100 text-slate-700 text-xs font-bold">Đã đóng</span>';
  if(e.startTime && Date.now()<new Date(e.startTime).getTime()) return '<span class="px-2 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-bold">Chờ mở</span>';
  return '<span class="px-2 py-1 rounded-full bg-green-100 text-green-700 text-xs font-bold">Đang mở</span>';
}
function filteredTeacherExams(){
  const st=examManagerState();
  const q=st.q.toLowerCase().trim();
  return exams.map(normalizeExamAccess).filter(e=>{
    const hay=[e.title,e.description,e.level,topicName(e.topicId),(e.classIds||[]).join(' ')].join(' ').toLowerCase();
    const okQ=!q||hay.includes(q);
    const okTopic=st.topic==='all'||String(e.topicId)===String(st.topic);
    const okClass=st.cls==='all'||(st.cls==='none'?!(e.classIds||[]).length:(e.classIds||[]).includes(st.cls));
    let okStatus=true;
    if(st.status==='published') okStatus=e.isPublished!==false;
    if(st.status==='draft') okStatus=e.isPublished===false;
    if(st.status==='open') okStatus=e.isPublished!==false && (!e.startTime||Date.now()>=new Date(e.startTime).getTime()) && (!e.endTime||Date.now()<=new Date(e.endTime).getTime());
    if(st.status==='closed') okStatus=!!e.endTime && Date.now()>new Date(e.endTime).getTime();
    return okQ&&okTopic&&okClass&&okStatus;
  });
}
function examManagerHTML(){
  const st=examManagerState();
  const list=filteredTeacherExams();
  const totalQ=list.reduce((sum,e)=>sum+((e.questions||[]).length||e.questionCount||0),0);
  return `<div class="exam-admin-toolbar mb-4">
    <label><span class="text-xs font-bold" style="color:var(--muted)">Tìm kiếm đề</span><input class="exam-admin-input" value="${safe(st.q)}" oninput="setExamManagerFilter('q',this.value)" placeholder="Nhập tên đề, mức độ, chủ đề..."></label>
    <label><span class="text-xs font-bold" style="color:var(--muted)">Chủ đề</span><select class="exam-admin-input" onchange="setExamManagerFilter('topic',this.value)"><option value="all">Tất cả</option>${TOPICS.map(t=>`<option value="${t.id}" ${String(st.topic)===String(t.id)?'selected':''}>${safe(t.name)}</option>`).join('')}</select></label>
    <label><span class="text-xs font-bold" style="color:var(--muted)">Trạng thái</span><select class="exam-admin-input" onchange="setExamManagerFilter('status',this.value)"><option value="all">Tất cả</option><option value="open" ${st.status==='open'?'selected':''}>Đang mở</option><option value="published" ${st.status==='published'?'selected':''}>Đã xuất bản</option><option value="draft" ${st.status==='draft'?'selected':''}>Nháp</option><option value="closed" ${st.status==='closed'?'selected':''}>Đã đóng</option></select></label>
    <label><span class="text-xs font-bold" style="color:var(--muted)">Lớp</span><select class="exam-admin-input" onchange="setExamManagerFilter('class',this.value)"><option value="all">Tất cả lớp</option><option value="none" ${st.cls==='none'?'selected':''}>Giao tất cả</option>${classes.map(c=>`<option value="${safe(c)}" ${st.cls===c?'selected':''}>${safe(c)}</option>`).join('')}</select></label>
  </div>
  <div class="grid sm:grid-cols-3 gap-3 mb-4">
    <div class="exam-meta-tile"><b>${list.length}</b><span class="text-xs" style="color:var(--muted)">Đề đang hiển thị</span></div>
    <div class="exam-meta-tile"><b>${totalQ}</b><span class="text-xs" style="color:var(--muted)">Tổng câu trong danh sách</span></div>
    <div class="exam-meta-tile"><b>${list.filter(e=>e.isPublished!==false).length}</b><span class="text-xs" style="color:var(--muted)">Đề đã xuất bản</span></div>
  </div>
  <div class="grid gap-3">${list.map(examAdminCard).join('')||'<div class="p-6 text-center text-slate-500 border rounded-2xl">Không tìm thấy đề phù hợp bộ lọc.</div>'}</div>`;
}
function examAdminCard(e){
  const st=examStatsForTeacher(e.id);
  const qCount=(e.questions||[]).length||e.questionCount||0;
  return `<article class="exam-admin-card">
    <div class="flex flex-wrap justify-between gap-3">
      <div class="min-w-0"><div class="flex flex-wrap items-center gap-2 mb-1">${examStatusBadge(e)}<span class="text-xs px-2 py-1 rounded-full bg-blue-50 text-blue-700 font-bold">${safe(topicName(e.topicId))}</span></div><h4 class="font-black text-lg math-content">${safe(e.title)}</h4><p class="text-sm mt-1" style="color:var(--muted)">${safe(e.description||'Chưa có mô tả')}</p></div>
      <div class="flex flex-wrap gap-2 items-start">
        <button onclick="openExamEditor('${e.id}')" class="exam-action-btn"><i class="fa-solid fa-pen"></i> Sửa</button>
        <button onclick="toggleExamPublished('${e.id}')" class="exam-action-btn"><i class="fa-solid ${e.isPublished===false?'fa-eye':'fa-eye-slash'}"></i> ${e.isPublished===false?'Xuất bản':'Ẩn'}</button>
        <button onclick="duplicateExam('${e.id}')" class="exam-action-btn"><i class="fa-solid fa-copy"></i> Nhân bản</button>
        <button onclick="startExam('${e.id}')" class="exam-action-btn"><i class="fa-solid fa-play"></i> Xem thử</button>
        <button onclick="deleteExam('${e.id}')" class="exam-action-btn exam-action-danger"><i class="fa-solid fa-trash"></i> Xóa</button>
      </div>
    </div>
    <div class="exam-meta-grid mt-3">
      <div class="exam-meta-tile"><b>${qCount}</b><span class="text-xs" style="color:var(--muted)">Câu hỏi</span></div>
      <div class="exam-meta-tile"><b>${e.duration||30}'</b><span class="text-xs" style="color:var(--muted)">Thời gian</span></div>
      <div class="exam-meta-tile"><b>${st.attempts}</b><span class="text-xs" style="color:var(--muted)">Lượt làm</span></div>
      <div class="exam-meta-tile"><b>${st.avg}%</b><span class="text-xs" style="color:var(--muted)">Điểm TB</span></div>
    </div>
    <div class="mt-3 flex flex-wrap gap-2 text-xs" style="color:var(--muted)"><span><i class="fa-solid fa-users"></i> ${(e.classIds||[]).length?safe((e.classIds||[]).join(', ')):'Tất cả học sinh'}</span><span>•</span><span>${safe(examScheduleText(e))}</span>${st.warned?`<span class="text-red-600 font-bold">• ${st.warned} cảnh báo</span>`:''}</div>
  </article>`;
}
async function toggleExamPublished(id){
  if(!requireRole('teacher'))return;
  const idx=exams.findIndex(e=>String(e.id)===String(id));
  if(idx<0)return;
  exams[idx]=normalizeExamAccess(exams[idx]);
  exams[idx].isPublished=exams[idx].isPublished===false;
  exams[idx].updatedAt=new Date().toISOString();
  save();
  if(firebaseReady){try{await db.collection('exams').doc(String(id)).set({isPublished:exams[idx].isPublished,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(err){toast('Đã đổi local, chưa đồng bộ Firestore: '+fbError(err),'bad')}}
  renderTeacherDashboard();toast(exams[idx].isPublished?'Đã xuất bản đề':'Đã chuyển đề về nháp','ok');
}
async function duplicateExam(id){
  if(!requireRole('teacher'))return;
  const src=exams.find(e=>String(e.id)===String(id)); if(!src)return;
  const docId=String(uid());
  const copy=JSON.parse(JSON.stringify(normalizeExamAccess(src)));
  copy.id=docId; copy.title='Bản sao - '+(copy.title||'Đề thi'); copy.isPublished=false; copy.createdAt=new Date().toISOString(); copy.updatedAt=new Date().toISOString();
  exams.unshift(copy); save();
  try{
    if(firebaseReady){await db.collection('exams').doc(docId).set({...copy,createdBy:currentUser?.id||null,questionCount:(copy.questions||[]).length,usesQuestionBank:true,createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); await syncExamStructureToFirestore(copy);}
  }catch(err){toast('Đã nhân bản local, chưa đồng bộ Firestore: '+fbError(err),'bad')}
  renderTeacherDashboard();toast('Đã nhân bản đề ở trạng thái nháp','ok');
}

function renderTeacherDashboard(){
  if(!requireRole('teacher'))return;
  const totalStudents=users.filter(u=>u.role==='student').length;
  const totalQuestions=questionBank.length || exams.reduce((sum,e)=>sum+((e.questions||[]).length||0),0);
  const publishedCount=exams.filter(e=>normalizeExamAccess(e).isPublished!==false).length;
  const draftCount=exams.length-publishedCount;
  const actionBtn=(text,icon,fn,cls='btn-soft')=>`<button onclick="${fn}" class="${cls} px-4 py-3 rounded-2xl font-bold text-left flex items-center justify-between gap-3"><span><i class="fa-solid ${icon} mr-2"></i>${text}</span><i class="fa-solid fa-chevron-right text-xs opacity-60"></i></button>`;
  const examRows=exams.slice(0,8).map(e=>{e=normalizeExamAccess(e);const status=e.isPublished===false?'<span class="px-2 py-1 rounded-full bg-amber-100 text-amber-700 text-xs font-bold">Nháp</span>':'<span class="px-2 py-1 rounded-full bg-green-100 text-green-700 text-xs font-bold">Đã xuất bản</span>';return `<tr class="border-b"><td class="p-3"><b>${safe(e.title)}</b><p class="text-xs" style="color:var(--muted)">${safe(topicName(e.topicId))}</p></td><td class="p-3">${(e.questions||[]).length||e.questionCount||0}</td><td class="p-3">${status}</td><td class="p-3 text-xs" style="color:var(--muted)">${safe(examScheduleText(e))}</td></tr>`}).join('')||'<tr><td colspan="4" class="p-5 text-center text-slate-500">Chưa có đề.</td></tr>';
  const recentRows=analyticsFilteredSubmissions().slice(0,8).map(s=>`<tr class="border-b"><td class="p-3"><b>${safe(s.studentName||'Học sinh')}</b><p class="text-xs" style="color:var(--muted)">${safe(s.className||'Chưa phân lớp')}</p></td><td class="p-3">${safe(s.examTitle||'')}</td><td class="p-3"><b>${s.score||0}/${s.total||0}</b><div class="bar-track mt-1 max-w-32"><div class="bar-fill" style="width:${pct(s.percent)}%"></div></div></td><td class="p-3 ${s.warnings?'text-red-600 font-bold':''}">${s.warnings||0}</td></tr>`).join('')||'<tr><td colspan="4" class="p-5 text-center text-slate-500">Chưa có bài làm.</td></tr>';
  $('mainView').innerHTML=`<div class="fade-in"><div class="flex flex-wrap justify-between items-start gap-3 mb-5"><div><span class="mini-badge"><i class="fa-solid fa-chart-pie"></i> Dashboard giáo viên - Giai đoạn 7</span><h2 class="text-3xl md:text-4xl font-black mt-2">Trung tâm phân tích & can thiệp học tập</h2><p style="color:var(--muted)">Theo dõi chất lượng lớp, phát hiện học sinh cần hỗ trợ, phân tích chủ đề yếu và xuất báo cáo.</p></div><div class="flex flex-wrap gap-2"><button onclick="exportAnalyticsCSV()" class="btn-soft px-4 py-2 rounded-2xl font-bold"><i class="fa-solid fa-file-export"></i> Xuất thống kê</button><button onclick="exportBackupJSON()" class="btn-soft px-4 py-2 rounded-2xl font-bold"><i class="fa-solid fa-download"></i> Backup</button><button onclick="renderUserManager()" class="bg-indigo-600 text-white px-4 py-2 rounded-2xl font-bold"><i class="fa-solid fa-user-shield"></i> Phân quyền</button><button onclick="renderClassManager()" class="btn-primary text-white px-4 py-2 rounded-2xl font-bold"><i class="fa-solid fa-users-gear"></i> Học sinh & lớp</button></div></div>${analyticsFiltersHTML()}${dataHealthHTML()}<section class="grid sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-5">${analyticsCard('Học sinh',totalStudents,'fa-user-graduate','Đang quản lý')}${analyticsCard('Đề thi',exams.length,'fa-file-lines',`${publishedCount} xuất bản • ${draftCount} nháp`)}${analyticsCard('Kho câu hỏi',totalQuestions,'fa-database','Dùng để sinh đề')}${analyticsCard('Lớp học',classes.length,'fa-school','Giao đề theo lớp')}${analyticsCard('Chờ duyệt GV',teacherPendingUsers().length,'fa-user-clock','Yêu cầu phân quyền',teacherPendingUsers().length?'amber':'green')}</section>${teacherAnalyticsHTML()}${interventionCenterHTML()}${topicWeaknessMatrixHTML()}${smartExamPanelHTML()}${weaknessTrainingPanelHTML()}<section class="grid xl:grid-cols-[.85fr_1.15fr] gap-5 mb-5"><div class="glass-card p-5"><h3 class="font-black text-xl mb-3">Thao tác nhanh</h3><div class="grid gap-2">${actionBtn('Tạo đề thủ công','fa-plus','openExamEditor()','btn-primary text-white')}${actionBtn('Tạo đề tự động','fa-wand-magic-sparkles','openAutoExamBuilder()','bg-indigo-600 text-white')}${actionBtn('Tạo đề theo ma trận','fa-table-cells-large','openMatrixExamBuilder()','bg-purple-600 text-white')}${actionBtn('Nhập câu hỏi từ file','fa-file-import',"openQuestionImportModal('bank')",'bg-emerald-600 text-white')}${actionBtn('Nhập từ LaTeX','fa-square-root-variable',"openLatexImportModal('bank')",'bg-cyan-600 text-white')}${actionBtn('Nhập đề từ PDF','fa-file-pdf','openPDFImportModal()','bg-rose-600 text-white')}${actionBtn('Kho câu hỏi','fa-box-archive','renderQuestionBank()')}${actionBtn('Duyệt giáo viên & người dùng','fa-user-shield','renderUserManager()','bg-indigo-600 text-white')}${actionBtn('Rules bảo mật','fa-shield-halved','showSecurityRules()')}${actionBtn('Công cụ dữ liệu','fa-screwdriver-wrench','renderDataTools()','bg-slate-800 text-white')}</div></div><div class="glass-card p-5"><h3 class="font-black text-xl mb-3">Lượt làm gần đây</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left border-b"><th class="p-3">Học sinh</th><th class="p-3">Đề thi</th><th class="p-3">Điểm</th><th class="p-3">Cảnh báo</th></tr></thead><tbody>${recentRows}</tbody></table></div></div></section><section id="teacherExamManager" class="glass-card p-5"><div class="flex flex-wrap justify-between items-center gap-3 mb-3"><div><h3 class="font-black text-xl">Quản lý đề thi nâng cao</h3><p class="text-sm" style="color:var(--muted)">Lọc, xuất bản, giao lớp, nhân bản và kiểm tra nhanh từng đề.</p></div><div class="flex flex-wrap gap-2"><button onclick="openExamEditor()" class="btn-primary text-white px-4 py-2 rounded-2xl font-bold"><i class="fa-solid fa-plus"></i> Thêm đề</button><button onclick="migrateAllExamStructures()" class="btn-soft px-4 py-2 rounded-2xl font-bold"><i class="fa-solid fa-cloud-arrow-up"></i> Đồng bộ cấu trúc</button></div></div>${examManagerHTML()}</section></div>`;
  typeset();
}
function renderStats(){
  if(currentUser?.role==='teacher'){renderTeacherDashboard();return;}
  const mine=currentUser?.role==='student'?submissions.filter(s=>s.studentId===currentUser.id):submissions;
  const avg=avgOf(mine), warn=mine.reduce((s,x)=>s+(Number(x.warnings)||0),0);
  $('mainView').innerHTML=`<h2 class="text-3xl font-black mb-5">📊 Thống kê học tập</h2><section class="grid sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-5">${analyticsCard('Số bài đã làm',mine.length,'fa-file-pen')}${analyticsCard('Điểm trung bình',avg+'%','fa-chart-line','',avg>=70?'green':avg>=50?'amber':'red')}${analyticsCard('Cảnh báo',warn,'fa-shield-halved','',warn?'amber':'green')}${analyticsCard('Điểm cao nhất',mine.length?Math.max(...mine.map(s=>Number(s.percent)||0))+'%':'-','fa-trophy')}</section><div class="glass-card p-5 mb-5"><h3 class="font-black text-xl mb-3">Xu hướng điểm</h3>${weeklyTrendHTML(mine)}</div><div class="glass-card p-5 overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left border-b"><th class="p-2">Đề thi</th><th>Điểm</th><th>Cảnh báo</th><th>Ngày làm</th></tr></thead><tbody>${mine.map(s=>`<tr class="border-b"><td class="p-2">${safe(s.examTitle)}</td><td><b>${s.score}/${s.total}</b> (${s.percent}%)</td><td>${s.warnings||0}</td><td>${safe(s.date||'')}</td></tr>`).join('')||'<tr><td class="p-4" colspan="4">Chưa có dữ liệu.</td></tr>'}</tbody></table></div>`;
}

async function bootstrap(){
  $('mainView').innerHTML='<div class="glass-card p-8 text-center"><i class="fa-solid fa-spinner fa-spin text-3xl text-blue-600"></i><p class="mt-3 font-semibold">Đang kết nối Firebase và tải dữ liệu...</p></div>';
  await load();
  renderHeader();
  renderHome();
  if(firebaseReady){
    auth.onAuthStateChanged(async (user)=>{
      if(user){
        try{
          currentUser=await getUserProfile(user); save(); renderHeader();
          await loadExamsFromFirestore(); await loadQuestionBankFromFirestore(); await loadSubmissionsFromFirestore();
        }catch(err){console.warn(err)}
      }else{currentUser=null; save(); renderHeader();}
    });
  }
}
bootstrap();
</script>
