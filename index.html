<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>MathPro 12 - Ôn thi TN THPT 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script>
    window.MathJax = { tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] }, svg: { fontCache: 'global' } };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  <style>
    :root{--bg1:#eef7ff;--bg2:#f7fbff;--card:rgba(255,255,255,.86);--text:#0f172a;--muted:#64748b;--line:#dbeafe;--brand:#2563eb;--brand2:#06b6d4;--good:#16a34a;--bad:#dc2626;--warn:#d97706}
    html[data-theme="dark"]{--bg1:#07111f;--bg2:#0f172a;--card:rgba(15,23,42,.86);--text:#e5eefc;--muted:#a7b4c7;--line:#1e3a5f;--brand:#60a5fa;--brand2:#22d3ee}
    body{min-height:100vh;background:radial-gradient(circle at top left, rgba(37,99,235,.22), transparent 30%),linear-gradient(135deg,var(--bg1),var(--bg2));font-family:'Segoe UI',system-ui,Roboto,sans-serif;color:var(--text)}
    .glass-card{background:var(--card);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:1.5rem;box-shadow:0 20px 45px -24px rgba(2,6,23,.45);transition:.22s ease}
    .glass-card:hover{transform:translateY(-2px);box-shadow:0 28px 60px -30px rgba(2,6,23,.55)}
    .btn-primary{background:linear-gradient(100deg,#2563eb,#06b6d4);box-shadow:0 10px 24px rgba(37,99,235,.25)}
    .btn-soft{background:rgba(37,99,235,.10);color:var(--brand);border:1px solid var(--line)}
    .tab-active{background:linear-gradient(100deg,#2563eb,#06b6d4);color:white;box-shadow:0 10px 22px rgba(37,99,235,.22)}
    .math-content{max-width:100%;overflow-x:auto;overflow-y:hidden;line-height:1.75;word-break:normal}
    .math-content mjx-container{display:inline-block!important;max-width:100%;overflow-x:auto;overflow-y:hidden;vertical-align:middle}
    .auto-check{border:1px dashed var(--line);border-radius:1rem;padding:.75rem;background:rgba(37,99,235,.06)}
    .fade-in{animation:fadeIn .35s ease both}.slide-up{animation:slideUp .35s ease both}@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .option-card{border:1px solid var(--line);border-radius:1rem;padding:.75rem;cursor:pointer;transition:.18s;background:rgba(255,255,255,.48)}
    html[data-theme="dark"] .option-card{background:rgba(15,23,42,.45)}.option-card:hover{border-color:#60a5fa;transform:scale(1.005)}.option-card.selected{border-color:#2563eb;background:rgba(37,99,235,.12)}
    .question-image{max-width:100%;max-height:420px;border-radius:1rem;border:1px solid var(--line);cursor:zoom-in;background:white}
    .question-image-thumb{max-width:210px;max-height:130px;border-radius:.8rem;border:1px solid var(--line);object-fit:contain;background:white}
    .class-chip{display:inline-flex;padding:.25rem .6rem;border-radius:999px;background:rgba(6,182,212,.12);color:#0891b2;font-size:.75rem;font-weight:700}
    .correct{border-color:#16a34a!important;background:rgba(22,163,74,.13)!important}.wrong{border-color:#dc2626!important;background:rgba(220,38,38,.11)!important}
    ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:999px}
    .bar-track{height:.7rem;background:rgba(148,163,184,.22);border-radius:999px;overflow:hidden}
    .bar-fill{height:100%;background:linear-gradient(90deg,#2563eb,#06b6d4);border-radius:999px}
    .mini-badge{display:inline-flex;align-items:center;gap:.35rem;padding:.25rem .55rem;border-radius:999px;background:rgba(37,99,235,.10);color:var(--brand);font-size:.75rem;font-weight:700}
    .warning-pulse{animation:pulseWarn 1s ease infinite}@keyframes pulseWarn{0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,.35)}50%{box-shadow:0 0 0 8px rgba(217,119,6,0)}}
    body.exam-lock{user-select:none}.anti-cheat-box{border:1px solid rgba(217,119,6,.45);background:rgba(217,119,6,.10);color:var(--warn)}

    /* ===== UI THI THẬT - BƯỚC 1: SIDEBAR CÂU HỎI + TIẾN TRÌNH ===== */
    .exam-shell{display:grid;grid-template-columns:310px minmax(0,1fr);gap:1.25rem;align-items:start}
    .exam-sidebar{position:sticky;top:6.25rem;max-height:calc(100vh - 7.5rem);overflow:auto}
    .exam-topbar{position:sticky;top:5rem;z-index:20}
    .question-nav-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:.55rem}
    .qnav-btn{height:2.55rem;border-radius:.85rem;border:1px solid var(--line);background:rgba(255,255,255,.72);font-weight:800;font-size:.9rem;transition:.16s ease;display:grid;place-items:center;position:relative}
    html[data-theme="dark"] .qnav-btn{background:rgba(15,23,42,.62)}
    .qnav-btn:hover{transform:translateY(-1px);border-color:#60a5fa}
    .qnav-btn.answered{background:rgba(22,163,74,.14);border-color:rgba(22,163,74,.55);color:#15803d}
    .qnav-btn.current{background:linear-gradient(100deg,#2563eb,#06b6d4);border-color:transparent;color:white;box-shadow:0 12px 26px rgba(37,99,235,.25)}
    .exam-progress-label{display:flex;justify-content:space-between;gap:.75rem;font-size:.82rem;font-weight:800;color:var(--muted);margin-bottom:.45rem}
    .exam-progress-track{height:.78rem;background:rgba(148,163,184,.22);border-radius:999px;overflow:hidden;border:1px solid rgba(148,163,184,.16)}
    .exam-progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#2563eb,#06b6d4,#16a34a);border-radius:999px;transition:width .25s ease}
    .exam-question-card{scroll-margin-top:8.5rem;border-left:5px solid transparent}
    .exam-question-card.active-question{border-left-color:#2563eb;box-shadow:0 28px 70px -32px rgba(37,99,235,.48)}
    .exam-status-pill{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .7rem;border-radius:999px;background:rgba(37,99,235,.10);color:var(--brand);font-size:.78rem;font-weight:800}
    .exam-stat-tile{border:1px solid var(--line);border-radius:1rem;padding:.8rem;background:rgba(255,255,255,.54)}
    html[data-theme="dark"] .exam-stat-tile{background:rgba(15,23,42,.48)}
    .tf-toggle{display:inline-flex;gap:.35rem;flex-wrap:wrap}
    .tf-toggle label{cursor:pointer}
    .tf-toggle input{display:none}
    .tf-toggle span{display:inline-flex;padding:.5rem .9rem;border-radius:999px;border:1px solid var(--line);font-weight:800;font-size:.85rem;background:rgba(148,163,184,.12);transition:.16s ease}
    .tf-toggle input:checked+span{background:linear-gradient(100deg,#2563eb,#06b6d4);color:white;border-color:transparent;box-shadow:0 8px 18px rgba(37,99,235,.18)}
    @media(max-width:1024px){.exam-shell{grid-template-columns:1fr}.exam-sidebar{position:relative;top:auto;max-height:none}.question-nav-grid{grid-template-columns:repeat(8,minmax(0,1fr))}.exam-topbar{top:4.75rem}}
    @media(max-width:640px){.question-nav-grid{grid-template-columns:repeat(5,minmax(0,1fr))}.exam-topbar{position:relative;top:auto}.qnav-btn{height:2.3rem}.exam-status-pill{font-size:.72rem}}

    /* ===== UI THI THẬT - BƯỚC 2: FOCUS MODE + PHÒNG THI TOÀN MÀN HÌNH ===== */
    body.exam-focus{overflow-x:hidden;background:linear-gradient(135deg,#07111f,#0f172a 45%,#082f49)!important}
    body.exam-focus header{display:none!important}
    body.exam-focus main{max-width:none!important;width:100%!important;padding:0!important}
    body.exam-focus #app{min-height:100vh;background:radial-gradient(circle at 15% 0%,rgba(37,99,235,.35),transparent 28%),radial-gradient(circle at 95% 10%,rgba(6,182,212,.28),transparent 24%)}
    .exam-focus-shell{min-height:100vh;padding:1rem;background:transparent}
    .exam-focus-frame{max-width:1480px;margin:0 auto}
    .exam-focus-topbar{position:sticky;top:0;z-index:45;background:rgba(15,23,42,.88)!important;color:#e5eefc;border-color:rgba(96,165,250,.35);box-shadow:0 22px 60px -28px rgba(0,0,0,.65)}
    .exam-focus-topbar h2{color:#fff}.exam-focus-topbar p{color:#bfd0e8!important}
    .exam-focus-topbar .exam-status-pill{background:rgba(96,165,250,.16);color:#dbeafe;border:1px solid rgba(96,165,250,.24)}
    .exam-focus-topbar .btn-soft{background:rgba(255,255,255,.08);color:#e0f2fe;border-color:rgba(255,255,255,.16)}
    .focus-brand{display:flex;align-items:center;gap:.8rem;padding:.7rem .9rem;border-radius:1rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12)}
    .focus-brand-logo{width:2.45rem;height:2.45rem;border-radius:.9rem;display:grid;place-items:center;background:linear-gradient(100deg,#2563eb,#06b6d4);color:white;box-shadow:0 10px 22px rgba(37,99,235,.35)}
    .focus-command-bar{display:flex;flex-wrap:wrap;gap:.55rem;align-items:center;justify-content:flex-end}
    .focus-danger-btn{background:rgba(220,38,38,.12);color:#fecaca;border:1px solid rgba(248,113,113,.35)}
    .focus-submit-btn{background:linear-gradient(100deg,#16a34a,#22c55e);color:white;box-shadow:0 10px 24px rgba(22,163,74,.22)}
    .focus-exam-body{margin-top:1rem}
    body.exam-focus .exam-sidebar{top:1rem;max-height:calc(100vh - 2rem);background:rgba(15,23,42,.86);color:#e5eefc;border-color:rgba(96,165,250,.26)}
    body.exam-focus .exam-sidebar p,body.exam-focus .exam-sidebar .exam-progress-label{color:#bfd0e8!important}
    body.exam-focus .exam-stat-tile{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12)}
    body.exam-focus .qnav-btn{background:rgba(255,255,255,.08);color:#dbeafe;border-color:rgba(255,255,255,.14)}
    body.exam-focus .qnav-btn.answered{background:rgba(34,197,94,.16);border-color:rgba(34,197,94,.48);color:#bbf7d0}
    body.exam-focus .qnav-btn.current{background:linear-gradient(100deg,#2563eb,#06b6d4);color:white}
    body.exam-focus .exam-question-card{background:rgba(255,255,255,.95);border-color:rgba(219,234,254,.95);box-shadow:0 24px 70px -38px rgba(0,0,0,.55)}
    html[data-theme="dark"] body.exam-focus .exam-question-card{background:rgba(15,23,42,.94);border-color:rgba(96,165,250,.22)}
    body.exam-focus .anti-cheat-box{background:rgba(217,119,6,.16);border-color:rgba(251,191,36,.45);color:#fde68a}
    .focus-mobile-nav{display:none}
    @media(max-width:1024px){body.exam-focus .exam-sidebar{position:relative;top:auto;max-height:18rem}.focus-mobile-nav{display:flex}.exam-focus-shell{padding:.75rem}.exam-focus-topbar{border-radius:1.25rem!important}.focus-command-bar{justify-content:flex-start}}
    @media(max-width:640px){.exam-focus-shell{padding:.5rem}.focus-brand{width:100%;justify-content:center}.focus-command-bar{width:100%}.focus-command-bar>*{flex:1;justify-content:center;text-align:center}.exam-focus-topbar{padding:1rem!important}}


    .submit-modal-backdrop{position:fixed;inset:0;z-index:120;background:rgba(2,6,23,.72);backdrop-filter:blur(10px);display:grid;place-items:center;padding:1rem}
    .submit-modal{width:min(620px,100%);background:var(--card);border:1px solid var(--line);border-radius:1.5rem;box-shadow:0 30px 90px -35px rgba(0,0,0,.72);overflow:hidden}
    .submit-modal-head{padding:1.25rem 1.5rem;background:linear-gradient(100deg,#0f172a,#1e40af);color:white;display:flex;align-items:center;gap:1rem}
    .submit-modal-icon{width:3.25rem;height:3.25rem;border-radius:1.1rem;display:grid;place-items:center;background:rgba(255,255,255,.14);font-size:1.35rem}
    .submit-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.75rem}
    .submit-summary-card{border:1px solid var(--line);border-radius:1rem;padding:.9rem;background:rgba(37,99,235,.06);text-align:center}
    .submit-summary-card b{display:block;font-size:1.65rem;line-height:1;color:var(--brand)}
    .unanswered-list{display:flex;flex-wrap:wrap;gap:.45rem;max-height:7rem;overflow:auto;padding:.75rem;border-radius:1rem;border:1px dashed rgba(217,119,6,.45);background:rgba(217,119,6,.08)}
    .unanswered-chip{display:inline-grid;place-items:center;min-width:2rem;height:2rem;border-radius:.7rem;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;font-weight:900;font-size:.85rem}
    html[data-theme="dark"] .unanswered-chip{background:rgba(217,119,6,.14);color:#fed7aa;border-color:rgba(251,191,36,.35)}
    @media(max-width:640px){.submit-summary-grid{grid-template-columns:1fr}.submit-modal-head{align-items:flex-start}.submit-modal{border-radius:1.1rem}}


    /* ===== UI THI THẬT - BƯỚC 4: BẢNG KẾT QUẢ + PHÂN TÍCH SAU THI ===== */
    .result-hero{position:relative;overflow:hidden;background:linear-gradient(135deg,#0f172a,#1d4ed8 48%,#06b6d4);color:white;border-radius:1.75rem;padding:1.5rem;border:1px solid rgba(255,255,255,.16);box-shadow:0 28px 80px -35px rgba(2,6,23,.72)}
    .result-hero:before{content:"";position:absolute;inset:-40% -10% auto auto;width:22rem;height:22rem;border-radius:999px;background:rgba(255,255,255,.12);filter:blur(2px)}
    .result-hero>*{position:relative;z-index:1}
    .score-ring{width:9.5rem;height:9.5rem;border-radius:999px;display:grid;place-items:center;background:conic-gradient(#22c55e var(--p),rgba(255,255,255,.18) 0);box-shadow:inset 0 0 0 12px rgba(15,23,42,.35),0 18px 45px rgba(0,0,0,.24)}
    .score-ring-inner{width:6.8rem;height:6.8rem;border-radius:999px;background:rgba(15,23,42,.84);display:grid;place-items:center;text-align:center;border:1px solid rgba(255,255,255,.12)}
    .result-kpi{background:var(--card);border:1px solid var(--line);border-radius:1.25rem;padding:1rem;box-shadow:0 18px 44px -30px rgba(2,6,23,.45)}
    .result-kpi b{display:block;font-size:1.85rem;line-height:1.05;color:var(--brand)}
    .result-breakdown-row{display:grid;grid-template-columns:minmax(110px,1fr) 3fr auto;gap:.75rem;align-items:center;padding:.75rem;border-radius:1rem;border:1px solid var(--line);background:rgba(255,255,255,.48)}
    html[data-theme="dark"] .result-breakdown-row{background:rgba(15,23,42,.45)}
    .result-bar{height:.72rem;border-radius:999px;background:rgba(148,163,184,.22);overflow:hidden;border:1px solid rgba(148,163,184,.14)}
    .result-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#2563eb,#06b6d4,#22c55e)}
    .review-filter-bar{position:sticky;top:5rem;z-index:18;background:var(--card);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:1.25rem;padding:.9rem;box-shadow:0 18px 40px -30px rgba(2,6,23,.45)}
    .review-card{border-left:5px solid rgba(148,163,184,.45)}
    .review-card.correct-review{border-left-color:#16a34a;background:linear-gradient(90deg,rgba(22,163,74,.08),transparent 24%),var(--card)}
    .review-card.wrong-review{border-left-color:#dc2626;background:linear-gradient(90deg,rgba(220,38,38,.08),transparent 24%),var(--card)}
    .answer-pill{display:inline-flex;align-items:center;gap:.35rem;padding:.35rem .65rem;border-radius:999px;font-size:.78rem;font-weight:900;border:1px solid var(--line);background:rgba(148,163,184,.11)}
    .answer-pill.good{color:#15803d;background:rgba(22,163,74,.12);border-color:rgba(22,163,74,.28)}
    .answer-pill.bad{color:#dc2626;background:rgba(220,38,38,.10);border-color:rgba(220,38,38,.25)}
    .topic-performance-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.75rem}
    @media(max-width:640px){.result-hero{padding:1rem}.score-ring{width:7.8rem;height:7.8rem}.score-ring-inner{width:5.7rem;height:5.7rem}.result-breakdown-row{grid-template-columns:1fr}.review-filter-bar{position:relative;top:auto}}

    /* ===== NÂNG CẤP QUẢN LÝ ĐỀ THI GIÁO VIÊN ===== */
    .exam-admin-toolbar{display:grid;grid-template-columns:1.2fr .75fr .75fr auto;gap:.75rem;align-items:end}
    .exam-admin-input{width:100%;border:1px solid var(--line);border-radius:1rem;padding:.78rem 1rem;background:rgba(255,255,255,.72);outline:none}
    html[data-theme="dark"] .exam-admin-input{background:rgba(15,23,42,.58);color:var(--text)}
    .exam-admin-card{border:1px solid var(--line);border-radius:1.25rem;padding:1rem;background:rgba(255,255,255,.55);transition:.18s ease}
    html[data-theme="dark"] .exam-admin-card{background:rgba(15,23,42,.48)}
    .exam-admin-card:hover{transform:translateY(-1px);box-shadow:0 18px 40px -30px rgba(2,6,23,.5)}
    .exam-action-btn{display:inline-flex;align-items:center;gap:.35rem;padding:.48rem .7rem;border-radius:.85rem;border:1px solid var(--line);font-size:.78rem;font-weight:800;background:rgba(255,255,255,.58)}
    html[data-theme="dark"] .exam-action-btn{background:rgba(15,23,42,.58)}
    .exam-action-danger{color:#dc2626;background:rgba(220,38,38,.08);border-color:rgba(220,38,38,.25)}
    .exam-meta-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.55rem}
    .exam-meta-tile{border:1px solid var(--line);border-radius:.95rem;padding:.65rem;background:rgba(37,99,235,.045)}
    .exam-meta-tile b{display:block;font-size:1.05rem;color:var(--brand)}
    @media(max-width:900px){.exam-admin-toolbar{grid-template-columns:1fr}.exam-meta-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}

    @media print{header,.no-print{display:none!important}body{background:white}.glass-card{box-shadow:none;border:1px solid #ddd}}
  </style>
</head>

<script>
const TOPICS=[
 {id:1,name:'Phương trình, hệ phương trình và bất phương trình',icon:'fa-code-branch',color:'blue'},
 {id:2,name:'Cấp số cộng, cấp số nhân',icon:'fa-arrow-trend-up',color:'cyan'},

  questions.forEach((q,idx)=>{
    const questionId=getQuestionBankId(q);

    batch.set(db.collection('examQuestions').doc(linkId),{
      examId,
      questionId,
      order:idx+1,

async function loadExamFromQuestionBank(examBase){
  // Bước 4: học sinh lấy cấu trúc đề từ examQuestions và nội dung câu từ questionBanks.
  // Nếu Firestore chưa có cấu trúc mới, hệ thống tự quay về questions cũ để không làm hỏng đề đang dùng.
  const fallback=JSON.parse(JSON.stringify(examBase||{}));
  if(!firebaseReady || !examBase?.id) return fallback;
  try{
    let links=[];
    const snap=await db.collection('examQuestions').where('examId','==',String(examBase.id)).get();
    if(!snap.empty){
      links=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));
    }
    if(!links.length && Array.isArray(examBase.questionIds) && examBase.questionIds.length){
      links=examBase.questionIds.map((questionId,idx)=>({questionId,order:idx+1}));
    }
    if(!links.length) return fallback;

    const questionDocs=await Promise.all(links.map(l=>db.collection('questionBanks').doc(String(l.questionId)).get()));
    const questions=[];
    questionDocs.forEach((doc,idx)=>{
      if(!doc.exists) return;
      const raw={id:doc.id,...doc.data()};
      questions.push({
        ...raw,
        id:String(raw.id||doc.id),
        sourceQuestionId:String(doc.id),
        point:links[idx]?.point||raw.point||1,
        order:links[idx]?.order||idx+1
      });
    });
    if(!questions.length) return fallback;
    return {
      ...fallback,
      questions,
      questionCount:questions.length,
      loadedFromQuestionBank:true,
      usesQuestionBank:true
    };
  }catch(err){
    console.warn('Không tải được đề từ questionBanks/examQuestions, dùng dữ liệu cũ:',err);
    return fallback;
  }
}

function getExamAvailability(e,user=currentUser){
  e=normalizeExamAccess(e||{});
  const now=Date.now();
  const start=e.startTime?new Date(e.startTime).getTime():null;
  const end=e.endTime?new Date(e.endTime).getTime():null;
  if(e.isPublished===false && user?.role!=='teacher') return {ok:false,label:'Chưa xuất bản',reason:'Đề này chưa được giáo viên xuất bản.'};
  if(user?.role==='student'){
    if(e.classIds.length && !e.classIds.includes(user.className||'')) return {ok:false,label:'Không thuộc lớp',reason:'Đề này không được giao cho lớp của em.'};
    if(start && now<start) return {ok:false,label:'Chưa mở',reason:'Đề chưa đến thời gian mở.'};
    if(end && now>end) return {ok:false,label:'Đã đóng',reason:'Đề đã hết thời gian làm bài.'};
    if(e.maxAttempts>0 && examAttemptCount(e.id,user.id)>=e.maxAttempts) return {ok:false,label:'Đã làm đủ lượt',reason:`Em đã dùng đủ ${e.maxAttempts} lượt làm bài.`};

}

}

}

function isQuestionAnswered(q){
  const a=examAnswers[q.id];
  if(q.type==='mc') return a!==undefined && a!==null && a!=='';
  if(q.type==='tf') return Array.isArray(a) && Array.isArray(q.statements) && q.statements.every((_,i)=>a[i]===true||a[i]===false);
  if(q.type==='short') return norm(a).length>0;
  return false;
}

  const percent=total?Math.round(done*100/total):0;
  return {total,done,remain:Math.max(total-done,0),percent};
}

function qBankExportValue(v){
  if(Array.isArray(v)) return v.map(x=>typeof x==='boolean'?(x?'Đúng':'Sai'):String(x??'')).join('; ');
  if(v&&typeof v==='object') return JSON.stringify(v);
  return v??'';
}
function qBankRowForExcel(q){
  const options=Array.isArray(q.options)?q.options:[];
  const statements=Array.isArray(q.statements)?q.statements:[];
  const tfAnswer=Array.isArray(q.answer)?q.answer:[];
  let answer=q.answer;
  if(q.type==='mc') answer=typeof q.answer==='number'?(['A','B','C','D','E','F'][q.answer]||q.answer):q.answer;
  if(q.type==='tf') answer=tfAnswer.map(x=>x?'Đúng':'Sai').join('; ');
  return {
    id:q.id||'', type:q.type||'mc', topicId:q.topicId||'', topicName:q.topicName||topicName(q.topicId)||'',
    level:q.level||'', difficulty:q.difficulty||'', standard2018:q.standard2018||q.standard||q.yccd||'',
    status:q.status||'published', point:q.point||1, text:q.text||'',
    optionA:options[0]||'', optionB:options[1]||'', optionC:options[2]||'', optionD:options[3]||'', answer:answer??'',
    statementA:statements[0]||'', statementB:statements[1]||'', statementC:statements[2]||'', statementD:statements[3]||'',
    answerA:tfAnswer.length?(tfAnswer[0]?'Đúng':'Sai'):'', answerB:tfAnswer.length?(tfAnswer[1]?'Đúng':'Sai'):'', answerC:tfAnswer.length?(tfAnswer[2]?'Đúng':'Sai'):'', answerD:tfAnswer.length?(tfAnswer[3]?'Đúng':'Sai'):'',
    solution:q.solution||'', imageUrl:q.imageUrl||'', tags:Array.isArray(q.tags)?q.tags.join('; '):(q.tags||''),
    sourceExamTitle:q.sourceExamTitle||'', updatedAt:q.updatedAt||''
  };
}
function exportQuestionBankExcel(onlyFiltered=false){
  if(!requireRole('teacher'))return;
  qBankNormalizeList();
  const items=onlyFiltered?qBankFilteredItems():questionBank;
  if(!items.length)return toast('Không có câu hỏi để xuất Excel','bad');
  const rows=items.map(qBankRowForExcel);
  const stamp=new Date().toISOString().slice(0,10);
  if(window.XLSX){
    const headers=['id','type','topicId','topicName','level','difficulty','standard2018','status','point','text','optionA','optionB','optionC','optionD','answer','statementA','statementB','statementC','statementD','answerA','answerB','answerC','answerD','solution','imageUrl','tags','sourceExamTitle','updatedAt'];
    const ws=XLSX.utils.json_to_sheet(rows,{header:headers});
    ws['!cols']=[{wch:18},{wch:10},{wch:8},{wch:28},{wch:16},{wch:10},{wch:20},{wch:12},{wch:8},{wch:58},{wch:20},{wch:20},{wch:20},{wch:20},{wch:14},{wch:32},{wch:32},{wch:32},{wch:32},{wch:10},{wch:10},{wch:10},{wch:10},{wch:60},{wch:24},{wch:24},{wch:28},{wch:22}];
    const guide=XLSX.utils.aoa_to_sheet([
      ['HƯỚNG DẪN ĐỒNG BỘ NGÂN HÀNG CÂU HỎI'],
      ['id','Giữ nguyên id để cập nhật câu hỏi cũ. Để trống hoặc đổi id để tạo câu hỏi mới.'],
      ['type','mc = trắc nghiệm, tf = đúng/sai, short = trả lời ngắn.'],
      ['status','published = xuất bản, draft = nháp, archived = lưu trữ.'],
      ['answer','Với mc nhập A/B/C/D; với short nhập đáp án. Với tf có thể dùng answerA-D.'],
      ['Đồng bộ','Sau khi chỉnh Excel, vào Ngân hàng câu hỏi > Nhập/đồng bộ Excel > chọn file > Duyệt & lưu.']
    ]);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Ngan hang cau hoi');XLSX.utils.book_append_sheet(wb,guide,'Huong dan dong bo');
    XLSX.writeFile(wb,`ngan-hang-cau-hoi-mathpro12-${onlyFiltered?'bo-loc-':''}${stamp}.xlsx`);
  }else{
    const headers=Object.keys(rows[0]);
    const csv=[headers,...rows.map(r=>headers.map(h=>qBankExportValue(r[h])))].map(r=>r.map(csvEscape).join(',')).join('\n');
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`ngan-hang-cau-hoi-mathpro12-${stamp}.csv`;a.click();URL.revokeObjectURL(a.href);
    toast('Chưa tải được thư viện Excel, đã xuất CSV thay thế','info');
  }
  toast(`Đã xuất ${items.length} câu hỏi ra file Excel`,'ok');
}
async function syncQuestionBankToFirestore(){
  if(!requireRole('teacher'))return;
  qBankNormalizeList();
  if(!firebaseReady)return toast('Firebase chưa sẵn sàng, dữ liệu đã lưu local nhưng chưa đồng bộ cloud','bad');
  try{
    let batch=db.batch(),count=0;
    for(const q of questionBank){
      batch.set(db.collection('questionBanks').doc(String(q.id)),{...q,updatedAt:firebase.firestore.FieldValue.serverTimestamp(),createdBy:q.createdBy||currentUser?.id||null},{merge:true});
      count++; if(count%450===0){await batch.commit();batch=db.batch();}
    }
    await batch.commit(); await loadQuestionBankFromFirestore(); renderQuestionBank();
    toast(`Đã đồng bộ ${count} câu hỏi lên Firestore`,'ok');
  }catch(err){toast('Chưa đồng bộ được Firestore: '+fbError(err),'bad');}
}

async function deleteFirestoreCollectionInBatches(collectionName){
  if(!firebaseReady) return 0;
  let deleted=0;
  while(true){
    const snap=await db.collection(collectionName).limit(450).get();
    if(snap.empty) break;
    const batch=db.batch();
    snap.docs.forEach(doc=>batch.delete(doc.ref));
    await batch.commit();
    deleted+=snap.size;
    if(snap.size<450) break;
  }
  return deleted;
}

function qBankTypeLabel(type){
  return type==='mc'?'Trắc nghiệm A/B/C/D':type==='tf'?'Đúng/Sai':type==='short'?'Trả lời ngắn':'Tự luận';
}
function qBankStatusLabel(status){
  return status==='draft'?'Nháp':status==='archived'?'Lưu trữ':'Đã xuất bản';
}
function qBankNormalizeList(){
  if(!questionBank.length){
    questionBank=questionBankFromLocalExams();
  }
  questionBank=questionBank.map(q=>({
    ...q,
    id:String(q.id||q.bankId||('q'+uid())),
    topicId:q.topicId||'',
    topicName:q.topicName||topicName(q.topicId),
    status:q.status||'published',
    level:q.level||q.difficulty||'',
    tags:Array.isArray(q.tags)?q.tags:(String(q.tags||'').split(',').map(x=>x.trim()).filter(Boolean))
  }));
  localStorage.setItem('mathpro12_questionBank',JSON.stringify(canSeeSensitiveExamData()?questionBank:questionBank.map(stripSensitiveQuestionData)));
}
function qBankDuplicateKey(q){
  // Chuẩn hóa nội dung để phát hiện câu trùng: bỏ HTML, bỏ khoảng trắng thừa, chuẩn hóa LaTeX cơ bản.
  const base=String(q?.text||'')
    .replace(/<[^>]*>/g,' ')
    .replace(/\\\(|\\\)|\\\[|\\\]/g,' ')
    .replace(/\$+/g,' ')
    .replace(/\\left|\\right/g,'')
    .replace(/[{}]/g,'')
    .replace(/\s+/g,' ')
    .trim();
  return norm(base);
}
function qBankDuplicateGroups(){
  const map={};
  questionBank.forEach(q=>{
    const key=qBankDuplicateKey(q);
    if(!key || key.length<12) return;
    (map[key]=map[key]||[]).push(q);
  });
  return Object.values(map).filter(g=>g.length>1).sort((a,b)=>b.length-a.length);
}
function qBankDuplicateIds(){
  const ids={};
  qBankDuplicateGroups().forEach((g,gi)=>g.forEach(q=>{ids[String(q.id)]={group:gi+1,count:g.length,key:qBankDuplicateKey(q)};}));
  return ids;
}
function qBankDuplicateStats(){
  const groups=qBankDuplicateGroups();
  const duplicateQuestions=groups.reduce((s,g)=>s+g.length,0);
  const removable=groups.reduce((s,g)=>s+Math.max(0,g.length-1),0);
  return {groups,groupCount:groups.length,duplicateQuestions,removable};
}
function qBankGetFilters(){
  window.qBankFilters=window.qBankFilters||{search:'',topic:'all',type:'all',level:'all',status:'all',duplicate:'all'};
  if(!('duplicate' in window.qBankFilters)) window.qBankFilters.duplicate='all';
  return window.qBankFilters;
}
function qBankUpdateFilter(key,val){
  const f=qBankGetFilters();
  f[key]=val;
  renderQuestionBank();
}
function qBankFilteredItems(){
  const f=qBankGetFilters();
  const kw=norm(f.search||'');
  const duplicateMap=qBankDuplicateIds();
  return questionBank.filter(q=>{
    const hay=norm([q.text,q.solution,q.topicName,q.level,(q.tags||[]).join(' '),q.sourceExamTitle,q.id].join(' '));
    const okSearch=!kw||hay.includes(kw);
    const okTopic=f.topic==='all'||String(q.topicId)===String(f.topic);
    const okType=f.type==='all'||String(q.type)===String(f.type);
    const okLevel=f.level==='all'||norm(q.level||'').includes(norm(f.level));
    const okStatus=f.status==='all'||String(q.status||'published')===String(f.status);
    const isDup=!!duplicateMap[String(q.id)];
    const okDuplicate=f.duplicate==='all'||(f.duplicate==='duplicated'&&isDup)||(f.duplicate==='unique'&&!isDup);
    return okSearch&&okTopic&&okType&&okLevel&&okStatus&&okDuplicate;
  }).sort((a,b)=>{
    if(f.duplicate==='duplicated'){
      const da=duplicateMap[String(a.id)]?.group||9999;
      const db=duplicateMap[String(b.id)]?.group||9999;
      if(da!==db) return da-db;
    }
    return String(b.updatedAt||'').localeCompare(String(a.updatedAt||''));
  });
}
function qBankAnswerText(q){
  const a=q.answer;
  if(q.type==='mc'){
    if(typeof a==='number') return ['A','B','C','D','E','F'][a]||String(a);
    return safe(a??'');
  }
  if(q.type==='tf'&&Array.isArray(a)) return a.map(x=>x?'Đ':'S').join(' - ');
  return safe(a??'');
}
function qBankAnswerToEditor(q){
  if(!q) return '';
  if(q.type==='mc'){
    if(typeof q.answer==='number') return ['A','B','C','D','E','F'][q.answer]||String(q.answer);
    return q.answer??'';
  }
  if(q.type==='tf'&&Array.isArray(q.answer)) return q.answer.map(x=>x?'Đ':'S').join(', ');
  return q.answer??'';
}
function qBankOptionsText(q){
  return Array.isArray(q.options)?q.options.join('\n'):'';
}
function qBankStatementsText(q){
  return Array.isArray(q.statements)?q.statements.join('\n'):'';
}
function qBankParseAnswer(type,raw){
  raw=String(raw||'').trim();
  if(type==='mc'){
    const up=raw.toUpperCase();
    if(['A','B','C','D','E','F'].includes(up)) return up.charCodeAt(0)-65;
    if(/^\d+$/.test(raw)) return Math.max(0,Number(raw)-1);
    return raw;
  }
  if(type==='tf'){
    return raw.split(/[,\n;]/).map(x=>norm(x)).filter(Boolean).map(x=>['d','đ','true','t','1','dung','đung','dúng'].includes(x)||x.includes('true')||x.includes('dung'));
  }
  return raw;
}

async function qBankMarkDuplicateCopiesDraft(){
  if(!confirm('Chuyển các bản trùng trong mỗi nhóm sang trạng thái nháp, giữ bản mới nhất ở trạng thái hiện tại?')) return;
  const groups=qBankDuplicateGroups();
  const ids=[];
  groups.forEach(g=>[...g].sort((a,b)=>String(b.updatedAt||'').localeCompare(String(a.updatedAt||''))).slice(1).forEach(q=>ids.push(String(q.id))));
  questionBank.forEach(q=>{if(ids.includes(String(q.id))){q.status='draft';q.updatedAt=new Date().toISOString();}});
  localStorage.setItem('mathpro12_questionBank',JSON.stringify(questionBank));
  if(firebaseReady){
    try{let batch=db.batch();ids.forEach(id=>batch.set(db.collection('questionBanks').doc(id),{status:'draft',updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}));await batch.commit();}catch(err){toast('Đã đổi local, chưa đồng bộ Firestore: '+fbError(err),'bad');}
  }
  save();document.querySelector('.fixed')?.remove();renderQuestionBank();toast('Đã chuyển các bản trùng sang nháp','ok');
}
async function qBankDeleteDuplicateCopies(){
  if(!confirm('Xóa tự động các bản trùng, mỗi nhóm chỉ giữ lại bản mới nhất? Thao tác này nên dùng sau khi thầy đã xem báo cáo.')) return;
  const groups=qBankDuplicateGroups();
  const ids=[];
  groups.forEach(g=>[...g].sort((a,b)=>String(b.updatedAt||'').localeCompare(String(a.updatedAt||''))).slice(1).forEach(q=>ids.push(String(q.id))));
  if(!ids.length) return toast('Không có bản trùng để xóa','info');
  questionBank=questionBank.filter(q=>!ids.includes(String(q.id)));
  localStorage.setItem('mathpro12_questionBank',JSON.stringify(questionBank));
  if(firebaseReady){
    try{let batch=db.batch();ids.forEach(id=>batch.delete(db.collection('questionBanks').doc(id)));await batch.commit();}catch(err){toast('Đã xóa local, chưa xóa Firestore: '+fbError(err),'bad');}
  }
  save();document.querySelector('.fixed')?.remove();renderQuestionBank();toast('Đã xóa '+ids.length+' bản câu hỏi trùng','ok');
}

async function saveQuestionBankItem(id=''){
  if(!requireRole('teacher'))return;
  const type=$('qbeType')?.value||'mc';
  const topicId=$('qbeTopic')?.value||'';
  const options=($('qbeOptions')?.value||'').split('\n').map(x=>x.trim()).filter(Boolean);
  const statements=($('qbeStatements')?.value||'').split('\n').map(x=>x.trim()).filter(Boolean);
  const q={
    ...(questionBank.find(x=>String(x.id)===String(id))||{}),
    id:String(id||('q'+uid())),
    type,
    topicId,
    topicName:topicName(topicId),
    level:$('qbeLevel')?.value||'',
    status:$('qbeStatus')?.value||'published',
    text:($('qbeText')?.value||'').trim(),
    answer:qBankParseAnswer(type,$('qbeAnswer')?.value||''),
    solution:($('qbeSolution')?.value||'').trim(),
    point:Number($('qbePoint')?.value||1),
    tags:($('qbeTags')?.value||'').split(',').map(x=>x.trim()).filter(Boolean),
    updatedAt:new Date().toISOString(),
    createdBy:currentUser?.id||null
  };
  if(type==='mc') q.options=options;
  if(type==='tf') q.statements=statements;
  if(!q.text) return toast('Thầy chưa nhập nội dung câu hỏi','bad');
  if(type==='mc'&&q.options.length<2) return toast('Câu trắc nghiệm cần ít nhất 2 phương án','bad');
  if(type==='tf'&&q.statements.length<2) return toast('Câu đúng/sai cần nhập các mệnh đề','bad');
  questionBank=questionBank.filter(x=>String(x.id)!==String(q.id));
  questionBank.unshift(q);
  localStorage.setItem('mathpro12_questionBank',JSON.stringify(questionBank));
  if(firebaseReady){
    try{
      await db.collection('questionBanks').doc(String(q.id)).set({...q,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
    }catch(err){toast('Đã lưu local nhưng chưa lưu Firestore: '+fbError(err),'bad');}
  }
  save();
  document.querySelector('.fixed')?.remove();
  renderQuestionBank();
  toast('Đã lưu câu hỏi vào ngân hàng','ok');
}
async function duplicateQuestionBankItem(id){

  const copy={...JSON.parse(JSON.stringify(q)),id:'q'+uid(),status:'draft',updatedAt:new Date().toISOString(),sourceExamId:null,sourceExamTitle:'Nhân bản từ kho câu hỏi'};
  questionBank.unshift(copy);
  localStorage.setItem('mathpro12_questionBank',JSON.stringify(questionBank));
  if(firebaseReady){
    try{await db.collection('questionBanks').doc(String(copy.id)).set({...copy,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(err){toast('Chưa nhân bản lên Firestore: '+fbError(err),'bad');}

  save(); renderQuestionBank(); toast('Đã nhân bản câu hỏi ở trạng thái nháp','ok');
}
async function toggleQuestionStatus(id){
  const q=questionBank.find(x=>String(x.id)===String(id)); if(!q)return;
  const next=(q.status||'published')==='published'?'draft':'published';
  q.status=next; q.updatedAt=new Date().toISOString();
  localStorage.setItem('mathpro12_questionBank',JSON.stringify(questionBank));
  if(firebaseReady){
    try{await db.collection('questionBanks').doc(String(id)).set({status:next,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(err){toast('Chưa đổi trạng thái trên Firestore: '+fbError(err),'bad');}
  }
  save(); renderQuestionBank(); toast('Đã đổi trạng thái câu hỏi','ok');
}
async function deleteQuestionBankItem(id){
  if(!confirm('Xóa câu hỏi này khỏi ngân hàng? Các đề đang dùng câu này có thể bị thiếu nếu đã liên kết qua examQuestions.')) return;
  questionBank=questionBank.filter(q=>String(q.id)!==String(id));
  localStorage.setItem('mathpro12_questionBank',JSON.stringify(questionBank));
  if(firebaseReady){
    try{await db.collection('questionBanks').doc(String(id)).delete();}catch(err){toast('Chưa xóa được trên Firestore: '+fbError(err),'bad');}
  }
  save(); renderQuestionBank(); toast('Đã xóa câu hỏi','ok');
}

  }

}

function validateMatrixRules(rules=[]){

  rules.forEach((r,i)=>{const need=Number(r.count||0), available=matrixPool(r).length;if(need<=0)errors.push('Dòng '+(i+1)+' chưa có số câu hợp lệ.'); if(available<need)errors.push('Dòng '+(i+1)+' thiếu câu: cần '+need+', kho hiện có '+available+'.');});
  return errors;
}
async function generateMatrixExam(){

  if(errors.length){refreshMatrixSummary();return toast(errors.slice(0,3).join('<br>')+(errors.length>3?'<br>...':''),'bad');}
  const used={}; let questions=[];
  cfg.rules.forEach((r,ri)=>{
    const pool=shuffleArray(matrixPool(r).filter(q=>!used[String(q.id)]));
    const picked=pool.slice(0,Number(r.count||0));
    picked.forEach((q,idx)=>{used[String(q.id)]=true;const c=cleanQuestionFromBank(q);c.id='q'+uid()+ri+'_'+idx;c.sourceQuestionId=q.id;c.matrixRule={topic:r.topic,level:r.level,type:r.type};questions.push(c);});

  exams.unshift(data);save();

  }catch(err){toast('Đã tạo đề local, chưa đồng bộ Firestore: '+fbError(err),'bad');}
  document.querySelector('.matrix-builder-modal')?.remove();renderTeacherDashboard();toast('Đã sinh đề theo ma trận. Đề đang ở trạng thái nháp để thầy kiểm tra trước khi xuất bản.','ok');
}

function validateAutoExam(){
  const need=autoNeedConfig(), av=autoAvailability(), errors=[];
  if((need.mc+need.tf+need.short)<=0)errors.push('Cần chọn ít nhất 1 câu hỏi.');
  if(av.mc.length<need.mc)errors.push(`Thiếu câu trắc nghiệm: cần ${need.mc}, kho có ${av.mc.length}.`);
  if(av.tf.length<need.tf)errors.push(`Thiếu câu đúng/sai: cần ${need.tf}, kho có ${av.tf.length}.`);
  if(av.short.length<need.short)errors.push(`Thiếu câu trả lời ngắn: cần ${need.short}, kho có ${av.short.length}.`);
  if(Number($('autoDuration')?.value||0)<=0)errors.push('Thời gian làm bài phải lớn hơn 0.');
  return errors;
}

function findExamByIdLoose(id){return exams.find(e=>String(e.id)===String(id)||String(e.originalId)===String(id));}
function findQuestionInExam(exam,qid){return (exam?.questions||[]).find(q=>String(q.id)===String(qid)||String(q.sourceQuestionId)===String(qid));}
function weakTopicName(topicId){return topicName(topicId||8);}
function studentWeaknessProfile(studentId){
  const student=users.find(u=>String(u.id)===String(studentId))||{};
  const attempts=submissions.filter(s=>String(s.studentId)===String(studentId));
  const topicMap={};
  let total=0, wrong=0;
  attempts.forEach(sub=>{
    const exam=findExamByIdLoose(sub.examId);
    (sub.details||[]).forEach(d=>{
      total++;
      const q=findQuestionInExam(exam,d.qid)||{};
      const topicId=String(q.topicId||exam?.topicId||8);
      if(!topicMap[topicId])topicMap[topicId]={topicId,total:0,wrong:0,examples:[]};
      topicMap[topicId].total++;
      if(!d.ok){
        wrong++;
        topicMap[topicId].wrong++;
        if(topicMap[topicId].examples.length<3)topicMap[topicId].examples.push(q.text||d.qid||'Câu sai');
      }
    });
  });
  const topics=Object.values(topicMap).map(x=>({...x,rate:x.total?Math.round(x.wrong*100/x.total):0,name:weakTopicName(x.topicId)})).sort((a,b)=>b.rate-a.rate||b.wrong-a.wrong);
  const avg=attempts.length?Math.round(attempts.reduce((a,b)=>a+(Number(b.percent)||0),0)/attempts.length):0;
  return {student,attempts,total,wrong,avg,topics,main:topics.find(t=>t.wrong>0)||topics[0]||null};
}
function allStudentWeaknessProfiles(){
  return users.filter(u=>u.role==='student').map(u=>studentWeaknessProfile(u.id)).filter(p=>p.attempts.length).sort((a,b)=>(b.main?.rate||0)-(a.main?.rate||0)||a.avg-b.avg);
}
function questionPoolForWeakness(topicIds=[],level='all'){
  const ids=topicIds.map(String);
  return questionBank.filter(q=>{
    const okTopic=!ids.length||ids.includes(String(q.topicId||8));
    const okLevel=level==='all'||String(q.level||'').toLowerCase().includes(String(level).toLowerCase());
    return okTopic&&okLevel;
  });
}

function parseCSV(text){
  const rows=[];let row=[],cell='',q=false;text=String(text||'').replace(/^\ufeff/,'');
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(q&&c==='"'&&n==='"'){cell+='"';i++;continue}
    if(c==='"'){q=!q;continue}
    if(!q&&c===','){row.push(cell);cell='';continue}
    if(!q&&(c==='\n'||c==='\r')){if(c==='\r'&&n==='\n')i++;row.push(cell);if(row.some(x=>String(x).trim()!==''))rows.push(row);row=[];cell='';continue}
    cell+=c;
  }
  row.push(cell);if(row.some(x=>String(x).trim()!==''))rows.push(row);return rows;
}

function normalizeImportedQuestion(raw,idx=0,collectErrors=false){

function convertUnicodeMathToLatex(text=''){
  const sup={'⁰':'0','¹':'1','²':'2','³':'3','⁴':'4','⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9','⁺':'+','⁻':'-','ⁿ':'n'};
  const sub={'₀':'0','₁':'1','₂':'2','₃':'3','₄':'4','₅':'5','₆':'6','₇':'7','₈':'8','₉':'9','₊':'+','₋':'-'};
  let out='', i=0, raw=String(text||'');
  while(i<raw.length){
    const ch=raw[i];
    if(sup[ch]){let v=''; while(i<raw.length&&sup[raw[i]]){v+=sup[raw[i]]; i++;} out+='^{'+v+'}'; continue;}
    if(sub[ch]){let v=''; while(i<raw.length&&sub[raw[i]]){v+=sub[raw[i]]; i++;} out+='_{'+v+'}'; continue;}
    out+=ch; i++;
  }
  return out;
}
function protectDollarMath(text='',fn=x=>x){
  const parts=String(text||'').split(/(\$[^$]*\$|\\\([^]*?\\\)|\\\[[^]*?\\\])/g);
  return parts.map(part=>/^\$[^$]*\$$/.test(part)||/^\\\([^]*?\\\)$/.test(part)||/^\\\[[^]*?\\\]$/.test(part)?part:fn(part)).join('');
}
function normalizeMathOCRText(text=''){
  let s=convertUnicodeMathToLatex(String(text||''));
  s=s
    .replace(/[−–—]/g,'-')
    .replace(/[×∙·]/g,'\\cdot ')
    .replace(/[÷]/g,':')
    .replace(/≤/g,'\\le ')
    .replace(/≥/g,'\\ge ')
    .replace(/≠/g,'\\ne ')
    .replace(/≈/g,'\\approx ')
    .replace(/∈/g,'\\in ')
    .replace(/∉/g,'\\notin ')
    .replace(/∞/g,'\\infty ')
    .replace(/π/g,'\\pi ')
    .replace(/α/g,'\\alpha ')
    .replace(/β/g,'\\beta ')
    .replace(/γ/g,'\\gamma ')
    .replace(/Δ/g,'\\Delta ')
    .replace(/∑/g,'\\sum ')
    .replace(/∫/g,'\\int ')
    .replace(/∂/g,'\\partial ')
    .replace(/√\s*\(([^()]+)\)/g,'\\sqrt{$1}')
    .replace(/√\s*([A-Za-z0-9]+(?:\s*[+\-]\s*[A-Za-z0-9]+)?)/g,'\\sqrt{$1}')
    .replace(/\b(sin|cos|tan|cot|ln|log)\s*([A-Za-z])/gi,'\\$1 $2')
    .replace(/\blim\s*([A-Za-z])\s*[-→>]\s*([^\s,.;]+)/gi,'\\lim_{$1\\to $2}')
    .replace(/\b([A-Za-z])\s*\^\s*([0-9A-Za-z]+)\b/g,'$1^{$2}')
    .replace(/\b([A-Za-z])\s*_\s*([0-9A-Za-z]+)\b/g,'$1_{$2}')
    .replace(/\b(\d+)\s*\/\s*(\d+)\b/g,'\\frac{$1}{$2}')
    .replace(/\b([A-Za-z])\s*\/\s*([A-Za-z])\b/g,'\\frac{$1}{$2}')
    .replace(/\bR\b/g,'\\mathbb{R}')
    .replace(/\bN\b/g,'\\mathbb{N}')
    .replace(/\bZ\b/g,'\\mathbb{Z}')
    .replace(/\bQ\b/g,'\\mathbb{Q}');
  return s.replace(/\\(sin|cos|tan|cot|ln|log)\b/g,m=>m.toLowerCase()).replace(/\s{2,}/g,' ');
}
function hasMathSignal(segment=''){
  return /\\(frac|sqrt|int|lim|sin|cos|tan|cot|ln|log|le|ge|ne|infty|pi|mathbb)|[=^_]|[+*/]|≤|≥|≠|≈/.test(segment);
}
function autoWrapMathForMathJax(text=''){
  return protectDollarMath(text,plain=>{
    let s=plain;
    s=s.replace(/(\\(?:frac|sqrt|int|lim|sin|cos|tan|cot|ln|log|le|ge|ne|infty|pi|mathbb|Delta)[^\n,;:]*)/g,(m)=>`$${m.trim()}$`);
    s=s.replace(/\b([A-Za-z](?:\([A-Za-z]\))?\s*=\s*[^\n,;:]+)/g,(m)=>hasMathSignal(m)?`$${m.trim()}$`:m);
    s=s.replace(/\b([A-Za-z0-9()]+(?:\^\{[^}]+\}|_\{[^}]+\})[^\n,;:]*)/g,(m)=>hasMathSignal(m)?`$${m.trim()}$`:m);
    return s.replace(/\$\s*\$/g,'');
  });
}
function improvePdfMathText(text='',autoWrap=true){
  const normalized=protectDollarMath(text,part=>normalizeMathOCRText(part));
  return autoWrap?autoWrapMathForMathJax(normalized):normalized;
}
function normalizeImportedMathQuestion(q,autoWrap=true){

  if(Array.isArray(q.options))q.options=q.options.map(x=>improvePdfMathText(x,autoWrap));
  if(Array.isArray(q.statements))q.statements=q.statements.map(x=>improvePdfMathText(x,autoWrap));
  return q;
}

function cleanPdfTextForMathPro(text='',autoMath=true){
  let s=String(text||'')
    .replace(/\u00a0/g,' ')
    .replace(/[\t ]+/g,' ')
    .replace(/\r/g,'\n')
    .replace(/\n\s+/g,'\n')
    .replace(/(Câu|Bài)\s*(\d+)\s*([.)])/gi,'$1 $2$3 ')
    .replace(/\b([ABCDabcd])\s*([.)])\s*/g,'\n$1. ')
    .replace(/\b([abcd])\s*([.)])\s*/g,'\n$1. ')
    .replace(/(Đáp\s*án|Lời\s*giải|Hướng\s*dẫn\s*giải|Giải)\s*[:：]/gi,'\n$1:')
    .replace(/\n{3,}/g,'\n\n')
    .trim();
  return autoMath?improvePdfMathText(s,true):s;
}
async function extractTextFromPDFFile(file,autoMath=true){
  if(!window.pdfjsLib)throw new Error('Chưa tải được thư viện PDF.js. Thầy hãy kiểm tra kết nối mạng rồi tải lại trang.');
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    const rows=[];
    content.items.forEach(it=>{
      const x=Math.round(it.transform?.[4]||0), y=Math.round(it.transform?.[5]||0);
      const row=rows.find(r=>Math.abs(r.y-y)<=3);
      if(row)row.items.push({x,str:it.str}); else rows.push({y,items:[{x,str:it.str}]});
    });
    rows.sort((a,b)=>b.y-a.y);
    const lines=rows.map(r=>r.items.sort((a,b)=>a.x-b.x).map(it=>it.str).join(' ').trim()).filter(Boolean);
    pages.push(lines.join('\n'));
  }
  return cleanPdfTextForMathPro(pages.join('\n\n'),autoMath);
}
async function extractTextFromPDFByOCR(file,onProgress,autoMath=true){
  if(!window.pdfjsLib)throw new Error('Chưa tải được PDF.js để đọc trang PDF.');
  if(!window.Tesseract)throw new Error('Chưa tải được Tesseract.js để OCR PDF scan.');
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let out=[];
  for(let i=1;i<=pdf.numPages;i++){
    if(onProgress)onProgress(`Đang OCR trang ${i}/${pdf.numPages}...`);
    const page=await pdf.getPage(i);
    const viewport=page.getViewport({scale:2});
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    canvas.width=viewport.width; canvas.height=viewport.height;
    await page.render({canvasContext:ctx,viewport}).promise;
    const dataUrl=canvas.toDataURL('image/png');
    const result=await Tesseract.recognize(dataUrl,'vie+eng',{logger:m=>{if(onProgress&&m.status)onProgress(`OCR trang ${i}/${pdf.numPages}: ${m.status} ${m.progress?Math.round(m.progress*100)+'%':''}`)}});
    out.push(result?.data?.text||'');
  }
  return cleanPdfTextForMathPro(out.join('\n\n'),autoMath);
}
async function extractPDFSmart(file,mode='auto',onProgress,autoMath=true){
  if(mode==='ocr')return await extractTextFromPDFByOCR(file,onProgress,autoMath);
  const text=await extractTextFromPDFFile(file,autoMath);
  if(mode==='text')return text;
  const compact=text.replace(/\s/g,'');
  if(compact.length<120 && window.Tesseract){
    if(onProgress)onProgress('PDF giống bản scan, tự chuyển sang OCR...');
    return await extractTextFromPDFByOCR(file,onProgress,autoMath);
  }
  return text;
}
function stripSolutionFromBlock(block=''){
  const raw=String(block||'');

  if(!m)return {body:raw,solution:''};
  return {body:raw.slice(0,m.index).trim(),solution:m[1].trim()};
}
function parseAnswerFromBlock(block='',type='mc'){
  const raw=String(block||'');
  if(type==='tf'){
    const m=raw.match(/Đáp\s*án\s*[:：]?\s*([ĐDSSTF01\s,;.-]{4,})/i);
    if(m){
      const token=m[1].replace(/[\s,;.-]/g,'').toUpperCase();
      const arr=[];
      for(const ch of token){
        if(['Đ','D','T','1'].includes(ch))arr.push(true);
        if(['S','F','0'].includes(ch))arr.push(false);
        if(arr.length===4)break;
      }
      if(arr.length===4)return arr;
    }
  }
  if(type==='short'){
    const m=raw.match(/Đáp\s*án\s*[:：]?\s*([^\n;]+)/i);
    return m?m[1].trim():'';
  }
  const patterns=[/Đáp\s*án\s*[:：]?\s*([ABCD])/i,/Answer\s*[:：]?\s*([ABCD])/i,/Chọn\s+([ABCD])\b/i,/\b([ABCD])\s*(?:là\s*)?(?:đúng|dung)\b/i];
  for(const r of patterns){const m=raw.match(r);if(m)return 'ABCD'.indexOf(m[1].toUpperCase());}
  return NaN;
}
function removeAnswerMarks(text=''){
  return String(text||'')
    .replace(/Đáp\s*án\s*[:：]?\s*[ABCDĐDSSTF01\s,;.-]+/ig,'')
    .replace(/Answer\s*[:：]?\s*[ABCD]/ig,'')
    .trim();
}
function detectTFStatements(body=''){
  const b=String(body||'');
  const m=[...b.matchAll(/(?:^|\n|\s)([abcd])\s*[.)]\s*/gi)];
  if(m.length>=4){
    const pos=m.slice(0,4).map(x=>({index:x.index+x[0].length,markIndex:x.index}));
    const text=b.slice(0,pos[0].markIndex).trim();
    const statements=[];
    for(let i=0;i<4;i++)statements.push(removeAnswerMarks(b.slice(pos[i].index,i<3?pos[i+1].markIndex:b.length).trim()));
    return {text,statements};
  }
  return null;
}
function parsePdfBlocksToQuestions(text,opts={}){
  const topicId=Number(opts.topicId||4), level=opts.level||'PDF import', source=opts.source||'PDF';
  const autoMath=opts.autoMath!==false;
  const cleaned=cleanPdfTextForMathPro(text,autoMath);
  const chunks=cleaned.split(/(?=\b(?:Câu|Bài)\s*\d+\s*[:.)])/gi).map(x=>x.trim()).filter(x=>/^\b(?:Câu|Bài)\s*\d+/i.test(x));
  const items=[];
  chunks.forEach((block,idx)=>{
    const split=stripSolutionFromBlock(block);
    let b=split.body.replace(/^\b(?:Câu|Bài)\s*\d+\s*[:.)]?\s*/i,'').trim();
    const optRegex=/(?:^|\n|\s)([ABCD])\s*[.)]\s*/g;
    const matches=[...b.matchAll(optRegex)];
    if(matches.length>=4){
      const pos=matches.slice(0,4).map(m=>({letter:m[1],index:m.index+m[0].length,markIndex:m.index}));
      const textPart=removeAnswerMarks(b.slice(0,pos[0].markIndex).trim());
      const options=[];
      for(let k=0;k<4;k++){
        const start=pos[k].index;
        const end=k<3?pos[k+1].markIndex:b.length;
        options.push(removeAnswerMarks(b.slice(start,end).trim()));
      }
      const ans=parseAnswerFromBlock(block,'mc');
      items.push(normalizeImportedMathQuestion(normalizeImportedQuestion({type:'mc',topicId,level,text:textPart||('Câu '+(idx+1)+' từ PDF'),optionA:options[0],optionB:options[1],optionC:options[2],optionD:options[3],answer:Number.isFinite(ans)?ans:0,solution:split.solution,tags:'pdf-import',sourceExamTitle:source,standard2018:opts.standard2018||'',difficulty:opts.difficulty||''},idx,true),autoMath));
      if(!Number.isFinite(ans))items[items.length-1]._errors.push('Chưa nhận dạng được đáp án A/B/C/D');
      return;
    }
    const tf=detectTFStatements(b);
    if(tf && /đúng|sai|true|false|Đáp\s*án/i.test(block)){
      const ans=parseAnswerFromBlock(block,'tf');
      items.push(normalizeImportedMathQuestion(normalizeImportedQuestion({type:'tf',topicId,level,text:removeAnswerMarks(tf.text)||('Câu đúng/sai '+(idx+1)),statementA:tf.statements[0],statementB:tf.statements[1],statementC:tf.statements[2],statementD:tf.statements[3],answer:Array.isArray(ans)?ans:[true,true,true,true],solution:split.solution,tags:'pdf-import',sourceExamTitle:source,standard2018:opts.standard2018||'',difficulty:opts.difficulty||''},idx,true),autoMath));
      if(!Array.isArray(ans))items[items.length-1]._errors.push('Chưa nhận dạng được đáp án đúng/sai');
      return;
    }
    const shortAns=parseAnswerFromBlock(block,'short');
    items.push(normalizeImportedMathQuestion(normalizeImportedQuestion({type:'short',topicId,level,text:removeAnswerMarks(b),answer:shortAns,solution:split.solution,tags:'pdf-import;can-kiem-tra',sourceExamTitle:source,standard2018:opts.standard2018||'',difficulty:opts.difficulty||''},idx,true),autoMath));
  });
  return items;
}

// ===== GIAI ĐOẠN 6 MỚI: DUYỆT & CHUẨN HÓA CÂU HỎI TRƯỚC KHI LƯU =====
function rvCleanCompare(s=''){
  return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim().replace(/\s+/g,' ');
}
function rvFingerprint(q){return `${q.type||''}|${rvCleanCompare(q.text).slice(0,180)}|${(q.options||q.statements||[]).map(rvCleanCompare).join('|').slice(0,120)}`;}
function rvValidate(items=[]){
  const bank=new Set((questionBank||[]).map(rvFingerprint));
  const seen=new Set();
  return items.map((q,i)=>{
    const x={...q}; const e=[...(x._errors||[])], w=[];
    if(!String(x.text||'').trim())e.push('Thiếu nội dung');
    if(!x.solution)w.push('Chưa có lời giải');
    if(!x.level)w.push('Chưa có mức độ');
    if(!x.standard2018)w.push('Chưa gắn chuẩn CT 2018');
    if(x.type==='mc'){
      if(!Array.isArray(x.options)||x.options.length<4)e.push('Thiếu 4 phương án A-D');
      if((x.options||[]).some(v=>!String(v||'').trim()))e.push('Có phương án trống');
      if(!Number.isFinite(Number(x.answer))||Number(x.answer)<0||Number(x.answer)>3)e.push('Đáp án A-D chưa hợp lệ');
    }
    if(x.type==='tf'){
      if(!Array.isArray(x.statements)||x.statements.length<4)e.push('Thiếu 4 ý đúng/sai');
      if((x.statements||[]).some(v=>!String(v||'').trim()))e.push('Có ý đúng/sai trống');
      if(!Array.isArray(x.answer)||x.answer.length<4)e.push('Thiếu đáp án đúng/sai');
    }
    if(x.type==='short'&&!String(x.answer??'').trim())e.push('Thiếu đáp án ngắn');
    const fp=rvFingerprint(x);
    x._duplicate=(fp.length>5 && (bank.has(fp)||seen.has(fp)));
    if(x._duplicate)w.push('Có thể trùng câu đã có');
    seen.add(fp); x._errors=[...new Set(e)]; x._warnings=[...new Set(w)]; return x;
  });
}
function rvStats(items){items=rvValidate(items);const err=items.filter(x=>x._errors.length).length,dup=items.filter(x=>x._duplicate&&!x._errors.length).length,ok=items.length-err-dup;return `<div class="grid md:grid-cols-4 gap-3 mb-4"><div class="p-3 rounded-2xl bg-blue-50"><b>${items.length}</b><br><span class="text-xs">Tổng câu</span></div><div class="p-3 rounded-2xl bg-green-50"><b>${ok}</b><br><span class="text-xs">Đạt chuẩn</span></div><div class="p-3 rounded-2xl bg-red-50"><b>${err}</b><br><span class="text-xs">Cần sửa</span></div><div class="p-3 rounded-2xl bg-amber-50"><b>${dup}</b><br><span class="text-xs">Có thể trùng</span></div></div>`;}

// ===== BƯỚC 3: IMPORT LaTeX EX_TEST CHUYÊN NGHIỆP =====
function latexStripSolution(block=''){
  const m=String(block).match(/\\loigiai\s*\{([\s\S]*)\}\s*$/);
  if(!m)return {body:block,solution:''};
  const idx=block.indexOf(m[0]);
  return {body:block.slice(0,idx).trim(),solution:m[1].trim()};
}
function latexCleanText(s=''){
  return String(s||'').replace(/\\True\s*/g,'').replace(/\\par\b/g,'\n').replace(/^[\s\n]+|[\s\n]+$/g,'').replace(/\n{3,}/g,'\n\n');
}
function readBalancedLatexGroups(text='',start=0,maxGroups=12){
  const groups=[]; let i=start;
  while(i<text.length && groups.length<maxGroups){
    while(i<text.length && /\s/.test(text[i]))i++;
    if(text[i]!=='{')break;
    let depth=0, begin=i+1, j=i;
    for(;j<text.length;j++){
      const ch=text[j], prev=text[j-1];
      if(ch==='{' && prev!=='\\')depth++;
      if(ch==='}' && prev!=='\\')depth--;
      if(depth===0){groups.push(text.slice(begin,j)); i=j+1; break;}
    }
    if(j>=text.length)break;
  }
  return groups;
}
function parseLatexExBlocks(latex='',opts={}){
  const text=String(latex||'');
  const blocks=[...text.matchAll(/\\begin\{ex\}([\s\S]*?)\\end\{ex\}/g)].map(m=>m[1]);
  const sourceBlocks=blocks.length?blocks:[text];
  const topicId=Number(opts.topicId||4), level=opts.level||'LaTeX import';
  const items=[];
  sourceBlocks.forEach((rawBlock,idx)=>{
    let {body,solution}=latexStripSolution(rawBlock);
    const isTF=/\\choiceTF\b/.test(body);
    const isMC=/\\choice\b/.test(body) && !isTF;
    try{
      if(isTF){
        const cut=body.search(/\\choiceTF\b/);
        const lead=latexCleanText(body.slice(0,cut));
        const groups=readBalancedLatexGroups(body, body.indexOf('\\choiceTF')+'\\choiceTF'.length, 4);
        const statements=groups.slice(0,4).map(latexCleanText);
        const answer=groups.slice(0,4).map(g=>/\\True\b/.test(g));
        items.push(normalizeImportedQuestion({type:'tf',topicId,level,text:lead||`Câu đúng/sai ${idx+1}`,statementA:statements[0]||'',statementB:statements[1]||'',statementC:statements[2]||'',statementD:statements[3]||'',answerA:answer[0]?'Đúng':'Sai',answerB:answer[1]?'Đúng':'Sai',answerC:answer[2]?'Đúng':'Sai',answerD:answer[3]?'Đúng':'Sai',solution,tags:'latex-import',standard2018:opts.standard2018||'',difficulty:opts.difficulty||'',sourceExamTitle:opts.source||'Nhập từ LaTeX'},idx,true));
      }else if(isMC){
        const cut=body.search(/\\choice\b/);
        const lead=latexCleanText(body.slice(0,cut));
        const groups=readBalancedLatexGroups(body, body.indexOf('\\choice')+'\\choice'.length, 4);
        const ans=Math.max(0,groups.findIndex(g=>/\\True\b/.test(g)));
        const options=groups.slice(0,4).map(latexCleanText);
        items.push(normalizeImportedQuestion({type:'mc',topicId,level,text:lead||`Câu trắc nghiệm ${idx+1}`,optionA:options[0]||'',optionB:options[1]||'',optionC:options[2]||'',optionD:options[3]||'',answer:ans,solution,tags:'latex-import',standard2018:opts.standard2018||'',difficulty:opts.difficulty||'',sourceExamTitle:opts.source||'Nhập từ LaTeX'},idx,true));
      }else{
        const ansMatch=body.match(/\\shortans\s*\{([^}]*)\}/)||body.match(/\\dapso\s*\{([^}]*)\}/i);
        const qText=latexCleanText(body.replace(/\\shortans\s*\{[^}]*\}/g,'').replace(/\\dapso\s*\{[^}]*\}/gi,''));
        items.push(normalizeImportedQuestion({type:'short',topicId,level,text:qText||`Câu trả lời ngắn ${idx+1}`,answer:ansMatch?ansMatch[1].trim():'',solution,tags:'latex-import;can-kiem-tra',standard2018:opts.standard2018||'',difficulty:opts.difficulty||'',sourceExamTitle:opts.source||'Nhập từ LaTeX'},idx,true));
      }
    }catch(err){
      const q=normalizeImportedQuestion({type:'short',topicId,level,text:latexCleanText(rawBlock).slice(0,500),answer:'',solution,tags:'latex-import-loi'},idx,true);
      q._errors=(q._errors||[]).concat('Không tách được LaTeX: '+(err?.message||err)); items.push(q);
    }
  });
  return items;
}

\\choice

function getFilteredBankQuestions(){
  const topic=$('bankTopicFilter')?.value||'all', type=$('bankTypeFilter')?.value||'all', kw=norm($('bankSearch')?.value||'');
  return questionBank.filter(q=>{const okTopic=topic==='all'||String(q.topicId)===String(topic);const okType=type==='all'||q.type===type;const hay=norm([q.text,q.sourceExamTitle,q.level,...(q.options||[]),...(q.statements||[])].join(' '));return okTopic&&okType&&(!kw||hay.includes(kw));});
}

function addPickedQuestionsToEditor(){
  const ids=Object.keys(window.bankPicked||{});if(!ids.length)return toast('Thầy chưa chọn câu hỏi nào','bad');
  const exists=new Set((window.editorQ||[]).map(q=>String(q.sourceQuestionId||q.id)));let added=0,skipped=0;
  ids.forEach(id=>{const q=questionBank.find(x=>String(x.id)===String(id));if(!q)return;if(exists.has(String(q.id))){skipped++;return;}const copy=cleanQuestionFromBank(q);copy.id='q'+uid()+added;copy.sourceQuestionId=q.id;window.editorQ.push(copy);exists.add(String(q.id));added++;});

}

async function saveExamEditor(id){
  const docId=String(id||uid());
  const data={id:docId,title:$('edTitle').value.trim(),topicId:Number($('edTopic').value),duration:Number($('edDuration').value||30),level:$('edLevel').value,description:$('edDesc').value,questions:window.editorQ,classIds:selectedClassIdsFromEditor(),startTime:readDateInputValue('edStartTime'),endTime:readDateInputValue('edEndTime'),maxAttempts:Number($('edMaxAttempts')?.value||0),isPublished:($('edPublished')?.value!=='false'),updatedAt:new Date().toISOString()};
  if(!data.title||!data.questions.length)return toast('Cần nhập tên đề và ít nhất 1 câu hỏi','bad');
  if(data.startTime&&data.endTime&&new Date(data.startTime)>=new Date(data.endTime))return toast('Thời gian đóng đề phải sau thời gian mở đề','bad');
  if(id){const idx=exams.findIndex(e=>String(e.id)==String(id)); if(idx>=0)data.createdAt=exams[idx].createdAt||data.updatedAt,exams[idx]=data}else {data.createdAt=new Date().toISOString(); exams.unshift(data);}
  save();
  if(firebaseReady){
    try{await db.collection('exams').doc(docId).set({...data,createdBy:currentUser?.id||null,questionCount:data.questions.length,usesQuestionBank:true,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); await syncExamStructureToFirestore(data);}
    catch(err){toast('Đã lưu local, chưa ghi được Firestore: '+fbError(err),'bad')}
  } else { await syncExamQuestionsToQuestionBank(data); localStorage.setItem('mathpro12_examQuestionIds_'+docId,JSON.stringify(data.questions.map(q=>getQuestionBankId(q)))); }
  document.querySelector('.fixed')?.remove();renderTeacherDashboard();toast('Đã lưu đề thi','ok');
}

function showSecurityRules(){
  const rules=`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function signedIn(){ return request.auth != null; }
    function isTeacher(){ return signedIn() && get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'teacher'; }

    match /users/{userId} {
      allow read: if signedIn() && (request.auth.uid == userId || isTeacher());
      allow create: if signedIn() && request.auth.uid == userId;
      allow update: if signedIn() && (request.auth.uid == userId || isTeacher());
    }

    match /questionBanks/{questionId} {
      allow read: if signedIn();
      allow create, update, delete: if isTeacher();
    }

    match /exams/{examId} {
      allow read: if true;
      allow create, update, delete: if isTeacher();
    }

    match /examQuestions/{id} {
      allow read: if signedIn();
      allow create, update, delete: if isTeacher();
    }

    match /examResults/{resultId} {
      allow create: if signedIn() && request.resource.data.studentId == request.auth.uid;
      allow read: if signedIn() && (resource.data.studentId == request.auth.uid || isTeacher());
      allow update, delete: if isTeacher();
    }
  }
}`;
  const m=document.createElement('div');m.className='fixed inset-0 bg-black/55 z-50 p-4 overflow-auto fade-in';m.innerHTML=`<div class="glass-card max-w-4xl mx-auto p-6"><div class="flex justify-between"><h2 class="text-2xl font-black">Firestore Rules chống sửa dữ liệu</h2><button onclick="this.closest('.fixed').remove()" class="text-2xl">&times;</button></div><p class="my-3 text-sm" style="color:var(--muted)">Dán đoạn này vào Firebase Console → Firestore Database → Rules. Bản HTML đã giảm lộ đáp án trên giao diện, còn rules này giúp học sinh không tự sửa/xóa đề và điểm.</p><textarea class="w-full h-96 border rounded-2xl p-4 font-mono text-sm">${rules}</textarea></div>`;document.body.appendChild(m);
}

function studentSubmissions(studentId){return submissions.filter(s=>String(s.studentId)===String(studentId));}
function studentAverage(studentId){const arr=studentSubmissions(studentId);return arr.length?Math.round(arr.reduce((sum,s)=>sum+(Number(s.percent)||0),0)/arr.length):0;}
function studentLastSubmit(studentId){const arr=studentSubmissions(studentId);return arr[0]||null;}
function classStudents(className){return users.filter(u=>u.role==='student' && String(u.className||'Chưa phân lớp')===String(className));}
function classAverage(className){const ids=classStudents(className).map(u=>String(u.id));const arr=submissions.filter(s=>ids.includes(String(s.studentId)));return arr.length?Math.round(arr.reduce((sum,s)=>sum+(Number(s.percent)||0),0)/arr.length):0;}
function studentWeakTopics(studentId){
  const wrong={};
  studentSubmissions(studentId).forEach(sub=>{
    const ex=exams.find(e=>String(e.id)===String(sub.examId));
    (sub.details||[]).forEach(d=>{
      if(d.ok) return;
      const q=(ex?.questions||[]).find(x=>String(x.id)===String(d.qid));
      const name=topicName(q?.topicId||ex?.topicId||8);
      wrong[name]=(wrong[name]||0)+1;
    });
  });
  return Object.entries(wrong).sort((a,b)=>b[1]-a[1]).slice(0,4);
}
async function refreshUsersFromFirestore(){
  if(!firebaseReady) return false;
  try{
    const snap=await db.collection('users').get();
    const remote=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(remote.length){
      const byId={}; users.forEach(u=>byId[String(u.id)]=u); remote.forEach(u=>byId[String(u.id)]={...byId[String(u.id)],...u,id:String(u.id)});
      users=Object.values(byId);
      const cls=new Set(classes);
      users.filter(u=>u.role==='student').forEach(u=>cls.add(u.className||'Chưa phân lớp'));
      classes=[...cls].filter(Boolean);
      save(); return true;
    }
  }catch(err){console.warn('Không tải được danh sách users từ Firestore:',err)}
  return false;
}

function applyStudentFilters(){

  if(cls!=='all') list=list.filter(u=>String(u.className||'Chưa phân lớp')===String(cls));
  if(sort==='avgDesc') list.sort((a,b)=>studentAverage(b.id)-studentAverage(a.id));
  else if(sort==='avgAsc') list.sort((a,b)=>studentAverage(a.id)-studentAverage(b.id));

  else list.sort((a,b)=>String(a.fullname||a.email||'').localeCompare(String(b.fullname||b.email||''),'vi'));
  const body=$('studentTableBody'); if(body) body.innerHTML=buildStudentRows(list);
}

let analyticsState={className:'all',examId:'all',from:'',to:'',mode:'overview'};
function pct(n){return Math.max(0,Math.min(100,Math.round(Number(n)||0)));}
function parseVNDateTime(v){
  if(!v)return null;
  if(v && typeof v.toDate==='function') return v.toDate();
  if(typeof v==='number') return new Date(v);
  const s=String(v);
  const iso=new Date(s); if(!isNaN(iso.getTime())) return iso;
  const m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})(?:,?\s*(\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
  if(m){return new Date(Number(m[3]),Number(m[2])-1,Number(m[1]),Number(m[4]||0),Number(m[5]||0),Number(m[6]||0));}
  return null;
}
function analyticsFilteredSubmissions(){
  let arr=[...submissions];
  const cls=analyticsState.className||'all', examId=analyticsState.examId||'all';
  if(cls!=='all') arr=arr.filter(s=>String(s.className||'Chưa phân lớp')===String(cls));
  if(examId!=='all') arr=arr.filter(s=>String(s.examId)===String(examId));
  if(analyticsState.from){const f=new Date(analyticsState.from+'T00:00:00');arr=arr.filter(s=>{const d=parseVNDateTime(s.createdAt||s.date);return d && d>=f;});}
  if(analyticsState.to){const t=new Date(analyticsState.to+'T23:59:59');arr=arr.filter(s=>{const d=parseVNDateTime(s.createdAt||s.date);return d && d<=t;});}
  return arr;
}
function avgOf(arr,field='percent'){return arr.length?Math.round(arr.reduce((a,b)=>a+(Number(b[field])||0),0)/arr.length):0;}
function analyticsStudentsInScope(){
  let list=users.filter(u=>u.role==='student');
  if((analyticsState.className||'all')!=='all') list=list.filter(u=>String(u.className||'Chưa phân lớp')===String(analyticsState.className));
  return list;
}
function groupBy(arr,keyFn){const m={};arr.forEach(x=>{const k=keyFn(x);(m[k]||(m[k]=[])).push(x)});return m;}
function analyticsCard(title,value,icon,sub='',tone='blue'){

  return `<div class="glass-card p-5"><div class="flex items-start justify-between gap-3"><div><p class="text-sm" style="color:var(--muted)">${title}</p><p class="text-3xl font-black mt-1 ${toneClass}">${value}</p>${sub?`<p class="text-xs mt-1" style="color:var(--muted)">${sub}</p>`:''}</div><div class="w-11 h-11 rounded-2xl bg-blue-50 grid place-items-center ${toneClass}"><i class="fa-solid ${icon}"></i></div></div></div>`;
}
function miniProgressBar(value,label='',right=''){
  value=pct(value);
  return `<div class="mb-3"><div class="flex justify-between gap-2 text-sm"><span class="truncate">${safe(label)}</span><b>${safe(right||value+'%')}</b></div><div class="bar-track mt-1"><div class="bar-fill" style="width:${value}%"></div></div></div>`;
}
function classPerformanceHTML(arr=analyticsFilteredSubmissions()){

  const rows=Object.entries(by).map(([name,a])=>({name,avg:avgOf(a),count:a.length,warn:a.reduce((s,x)=>s+(Number(x.warnings)||0),0)})).sort((a,b)=>b.avg-a.avg);

function weeklyTrendHTML(arr=analyticsFilteredSubmissions()){
  const points={};
  arr.forEach(s=>{const d=parseVNDateTime(s.createdAt||s.date);if(!d)return;const key=d.toISOString().slice(0,10);(points[key]||(points[key]=[])).push(Number(s.percent)||0);});
  const rows=Object.entries(points).sort((a,b)=>a[0].localeCompare(b[0])).slice(-10).map(([date,vals])=>({date,avg:Math.round(vals.reduce((a,b)=>a+b,0)/vals.length),count:vals.length}));

  const w=620,h=180,pad=28;
  const coords=rows.map((r,i)=>{const x=pad+(rows.length===1?0:i*(w-2*pad)/(rows.length-1));const y=h-pad-(r.avg*(h-2*pad)/100);return [x,y,r];});
  const poly=coords.map(c=>c[0]+','+c[1]).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" class="w-full h-52"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="currentColor" opacity=".15"/><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="currentColor" opacity=".15"/><polyline points="${poly}" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".82"/>${coords.map(c=>`<circle cx="${c[0]}" cy="${c[1]}" r="5" fill="currentColor"><title>${c[2].date}: ${c[2].avg}% (${c[2].count} lượt)</title></circle>`).join('')}${coords.map(c=>`<text x="${c[0]}" y="${c[1]-10}" text-anchor="middle" font-size="12" fill="currentColor">${c[2].avg}%</text>`).join('')}</svg><div class="grid grid-cols-2 md:grid-cols-5 gap-2 text-xs">${rows.map(r=>`<span class="px-2 py-1 rounded-lg bg-blue-50 text-blue-700 text-center">${safe(r.date.slice(5))}: ${r.avg}%</span>`).join('')}</div>`;

function difficultQuestionsHTML(arr=analyticsFilteredSubmissions()){

}
function riskStudentsHTML(arr=analyticsFilteredSubmissions()){

function applyUserFilters(){
  let list=[...users];
  const q=norm($('userSearch')?.value||''), role=$('userRoleFilter')?.value||'all', status=$('userStatusFilter')?.value||'all';
  if(q) list=list.filter(u=>norm((u.fullname||'')+' '+(u.email||u.username||'')+' '+(u.className||'')).includes(q));
  if(role==='teacher') list=list.filter(u=>u.role==='teacher');
  if(role==='student') list=list.filter(u=>u.role!=='teacher');
  if(status==='pendingTeacher') list=list.filter(u=>u.teacherRequest && u.role!=='teacher');
  if(status==='normal') list=list.filter(u=>!(u.teacherRequest && u.role!=='teacher'));
  list.sort((a,b)=>String(a.role||'student').localeCompare(String(b.role||'student')) || String(a.fullname||a.email||'').localeCompare(String(b.fullname||b.email||''),'vi'));
  const body=$('userTableBody'); if(body) body.innerHTML=buildUserRows(list);
}
async function updateUserRole(userId,newRole){
  if(!requireRole('teacher'))return;
  newRole=newRole==='teacher'?'teacher':'student';
  if(String(userId)===String(currentUser?.id) && newRole!=='teacher') return toast('Không thể tự hạ quyền tài khoản đang đăng nhập','bad');
  const u=users.find(x=>String(x.id)===String(userId));
  if(!u) return toast('Không tìm thấy người dùng','bad');
  const ok=confirm(`${newRole==='teacher'?'Cấp quyền giáo viên cho':'Hạ quyền về học sinh cho'} ${u.fullname||u.email}?`);
  if(!ok) return;
  const oldRole=u.role||'student';
  u.role=newRole;
  u.teacherRequest=false;
  if(newRole==='student' && !u.className) u.className='Chưa phân lớp';
  save();
  if(firebaseReady){
    try{await db.collection('users').doc(String(userId)).set({role:newRole,teacherRequest:false,teacherApprovedAt:newRole==='teacher'?firebase.firestore.FieldValue.serverTimestamp():null,className:u.className||'Chưa phân lớp',updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}
    catch(err){toast('Chưa cập nhật được Firestore: '+fbError(err),'bad');}
  }
  await addAuditLog(newRole==='teacher'?(oldRole==='teacher'?'promoteTeacher':'approveTeacher'):'demoteTeacher',u,{oldRole,newRole});
  toast(newRole==='teacher'?'Đã cấp quyền giáo viên':'Đã hạ quyền về học sinh','ok');
  renderUserManager();
}


async function rejectTeacherRequest(userId){
  if(!requireRole('teacher'))return;
  const u=users.find(x=>String(x.id)===String(userId));
  if(!u) return toast('Không tìm thấy người dùng','bad');
  if(!confirm(`Từ chối yêu cầu giáo viên của ${u.fullname||u.email}?`)) return;
  u.teacherRequest=false;
  save();
  if(firebaseReady){
    try{await db.collection('users').doc(String(userId)).set({teacherRequest:false,teacherRejectedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}
    catch(err){toast('Chưa cập nhật được Firestore: '+fbError(err),'bad');}
  }

  renderUserManager();
}
async function approveAllTeacherRequests(){
  if(!requireRole('teacher'))return;
  const list=teacherPendingUsers();
  if(!list.length) return toast('Không có tài khoản chờ duyệt','info');
  if(!confirm(`Duyệt ${list.length} tài khoản thành giáo viên?`)) return;
  for(const u of list){
    u.role='teacher'; u.teacherRequest=false;
    if(firebaseReady){
      try{await db.collection('users').doc(String(u.id)).set({role:'teacher',teacherRequest:false,teacherApprovedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}
      catch(err){console.warn(err)}
    }
    await addAuditLog('approveTeacher',u,{bulk:true});
  }
  save();
  toast('Đã duyệt tất cả tài khoản giáo viên','ok');
  renderUserManager();
}

function dataQualityReport(){
  const issues=[];
  const userIds=new Set(users.map(u=>String(u.id)));
  const examIds=new Set(exams.map(e=>String(e.id)));
  const qIds=new Set(questionBank.map(q=>String(q.id)));
  users.forEach(u=>{
    if(!u.fullname && !u.email && !u.username) issues.push({level:'warn',group:'users',msg:'Có tài khoản thiếu họ tên/email',ref:String(u.id)});
    if(u.role==='student' && !u.className) issues.push({level:'warn',group:'users',msg:'Học sinh chưa phân lớp',ref:u.fullname||u.email||u.id});
    if(!['student','teacher'].includes(String(u.role))) issues.push({level:'bad',group:'users',msg:'Vai trò người dùng không hợp lệ',ref:u.fullname||u.email||u.id});
  });
  exams.forEach(e=>{
    if(!e.title) issues.push({level:'bad',group:'exams',msg:'Đề thi thiếu tiêu đề',ref:String(e.id)});
    if(!Array.isArray(e.questions) && !Array.isArray(e.questionIds)) issues.push({level:'bad',group:'exams',msg:'Đề chưa có danh sách câu hỏi',ref:e.title||e.id});
    const count=(e.questions||[]).length || (e.questionIds||[]).length || Number(e.questionCount||0);
    if(!count) issues.push({level:'warn',group:'exams',msg:'Đề chưa có câu hỏi',ref:e.title||e.id});
    if(Number(e.duration||0)<=0) issues.push({level:'warn',group:'exams',msg:'Đề chưa đặt thời gian làm bài',ref:e.title||e.id});
  });
  questionBank.forEach(q=>{
    if(!q.text) issues.push({level:'bad',group:'questionBank',msg:'Câu hỏi thiếu nội dung',ref:String(q.id)});
    if(!['mc','tf','short'].includes(String(q.type))) issues.push({level:'bad',group:'questionBank',msg:'Loại câu hỏi không hợp lệ',ref:String(q.id)});
    if(q.type==='mc' && (!Array.isArray(q.options)||q.options.length<2)) issues.push({level:'bad',group:'questionBank',msg:'Câu trắc nghiệm thiếu phương án',ref:String(q.id)});
    if(q.type==='tf' && (!Array.isArray(q.statements)||q.statements.length<2)) issues.push({level:'bad',group:'questionBank',msg:'Câu đúng/sai thiếu mệnh đề',ref:String(q.id)});
  });
  submissions.forEach(s=>{
    if(s.studentId && !userIds.has(String(s.studentId))) issues.push({level:'warn',group:'submissions',msg:'Bài làm có học sinh không còn trong danh sách local',ref:s.studentName||s.studentId});
    if(s.examId && !examIds.has(String(s.examId))) issues.push({level:'warn',group:'submissions',msg:'Bài làm thuộc đề không còn trong danh sách local',ref:s.examTitle||s.examId});
  });
  return issues;
}

function buildBackupObject(){
  return {version:'MathPro12-step5',exportedAt:new Date().toISOString(),users,exams,submissions,questionBank,classes,auditLogs,meta:{totalUsers:users.length,totalExams:exams.length,totalResults:submissions.length,totalQuestions:questionBank.length}};
}
function exportBackupJSON(){
  const data=JSON.stringify(buildBackupObject(),null,2);
  const blob=new Blob([data],{type:'application/json;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='mathpro12-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Đã xuất file sao lưu JSON','ok');
}
function importBackupJSON(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data || !Array.isArray(data.exams)) throw new Error('File sao lưu không đúng cấu trúc');
      if(!confirm('Phục hồi dữ liệu từ file này sẽ ghi đè dữ liệu local hiện tại. Tiếp tục?')) return;
      users=Array.isArray(data.users)?data.users:users;
      exams=Array.isArray(data.exams)?data.exams:exams;
      submissions=Array.isArray(data.submissions)?data.submissions:submissions;
      questionBank=Array.isArray(data.questionBank)?data.questionBank:questionBank;
      classes=Array.isArray(data.classes)?data.classes:classes;
      auditLogs=Array.isArray(data.auditLogs)?data.auditLogs:auditLogs;
      save();
      toast('Đã phục hồi dữ liệu local từ file sao lưu','ok');
      renderDataTools();
    }catch(err){toast('Không đọc được file sao lưu: '+(err.message||err),'bad');}
  };
  reader.readAsText(file);
}
async function syncLocalDataToFirestore(){
  if(!requireRole('teacher'))return;
  if(!firebaseReady) return toast('Firebase chưa sẵn sàng','bad');
  if(!confirm('Đồng bộ đề thi, kho câu hỏi, lớp học và hồ sơ người dùng local lên Firestore?')) return;
  try{
    for(const u of users){ if(u.id) await db.collection('users').doc(String(u.id)).set({...u,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); }
    for(const e of exams){ await db.collection('exams').doc(String(e.id)).set({...e,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); await syncExamStructureToFirestore(e); }
    for(const c of classes){ await db.collection('classes').doc(String(c)).set({name:String(c),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); }
    toast('Đã đồng bộ dữ liệu local lên Firestore','ok');
    renderDataTools();
  }catch(err){toast('Đồng bộ thất bại: '+fbError(err),'bad');}
}

function studentInterventionProfile(u, arr=analyticsFilteredSubmissions()){
  const sid=String(u.id||'');
  const a=arr.filter(s=>String(s.studentId||'')===sid);
  const avg=a.length?avgOf(a):0;
  const warnings=a.reduce((sum,x)=>sum+(Number(x.warnings)||0),0);
  let level='Chưa làm bài', tone='slate', action='Giao đề chẩn đoán 15 phút để lấy dữ liệu ban đầu.';
  if(a.length && avg<50){level='Cần kèm gấp'; tone='red'; action='Giao 1 đề nền tảng, xem lại câu sai và hẹn chữa bài.';}
  else if(a.length && avg<70){level='Cần theo dõi'; tone='amber'; action='Giao thêm bài cùng chủ đề sai nhiều, kiểm tra lại sau 2–3 ngày.';}
  else if(a.length && warnings>=3){level='Cần xác minh'; tone='amber'; action='Kiểm tra lại phiên thi vì có nhiều cảnh báo gian lận.';}
  else if(a.length){level='Ổn định'; tone='green'; action='Giao đề vận dụng hoặc đề tổng hợp để nâng mức.';}
  return {student:u, attempts:a.length, avg, warnings, level, tone, action, last:a[0]||null};
}
function toneBadge(text,tone='blue'){
  const cls=tone==='red'?'bg-red-100 text-red-700':tone==='amber'?'bg-amber-100 text-amber-700':tone==='green'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-600';
  return '<span class="px-2 py-1 rounded-full text-xs font-bold '+cls+'">'+safe(text)+'</span>';
}
