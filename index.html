async function syncExamQuestionsToQuestionBank(examData){
  const now=new Date().toISOString();
  const items=(examData.questions||[]).map((q,idx)=>({
    ...q,
    id:String(q.bankId||q.id||('q'+uid())),
    sourceExamId:String(examData.id),
    sourceExamTitle:examData.title,
    topicId:examData.topicId,
    topicName:topicName(examData.topicId),
    level:examData.level||'',
    order:idx+1,
    status:'published',
    createdBy:currentUser?.id||null,
    updatedAt:now
  }));
  const byId={}; questionBank.forEach(q=>byId[String(q.id)]=q); items.forEach(q=>byId[String(q.id)]=q);
  questionBank=Object.values(byId);
  localStorage.setItem('mathpro12_questionBank',JSON.stringify(questionBank));
  if(firebaseReady){
    const batch=db.batch();
    items.forEach(q=>batch.set(db.collection('questionBanks').doc(String(q.id)),{...q,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}));
    await batch.commit();
  }
}

function getQuestionBankId(q){
  return String(q?.sourceQuestionId || q?.bankId || q?.id || ('q'+uid()));
}
async function deleteExamQuestionLinks(examId){
  if(!firebaseReady) return;
  const snap=await db.collection('examQuestions').where('examId','==',String(examId)).get().catch(()=>null);
  if(!snap || snap.empty) return;
  let batch=db.batch(), count=0;
  for(const d of snap.docs){
    batch.delete(d.ref); count++;
    if(count%450===0){await batch.commit(); batch=db.batch();}
  }
  await batch.commit();
}
async function syncExamStructureToFirestore(examData){
  if(!examData || !examData.id) return;
  const examId=String(examData.id);
  const questions=(examData.questions||[]);
  // Bước 3: mỗi đề chỉ cần liên kết tới mã câu hỏi trong kho qua collection examQuestions.
  // File vẫn giữ mảng questions trong exams để tương thích với bản web hiện tại.
  await syncExamQuestionsToQuestionBank(examData);
  const questionIds=questions.map(q=>getQuestionBankId(q));
  localStorage.setItem('mathpro12_examQuestionIds_'+examId,JSON.stringify(questionIds));
  if(!firebaseReady) return;
  await deleteExamQuestionLinks(examId);
  let batch=db.batch();
  questions.forEach((q,idx)=>{
    const questionId=getQuestionBankId(q);
    const linkId=examId+'_'+questionId;
    batch.set(db.collection('examQuestions').doc(linkId),{
      examId,
      questionId,
      order:idx+1,
      point:q.point||1,
      type:q.type||'',
      topicId:examData.topicId||q.topicId||null,
      examTitle:examData.title||'',
      createdBy:currentUser?.id||null,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  });
  batch.set(db.collection('exams').doc(examId),{
    questionIds,
    questionCount:questions.length,
    usesQuestionBank:true,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true});
  await batch.commit();
}

async function loadExamFromQuestionBank(examBase){
  // Bước 4: học sinh lấy cấu trúc đề từ examQuestions và nội dung câu từ questionBanks.
  // Nếu Firestore chưa có cấu trúc mới, hệ thống tự quay về questions cũ để không làm hỏng đề đang dùng.
  const fallback=JSON.parse(JSON.stringify(examBase||{}));
  if(!firebaseReady || !examBase?.id) return fallback;
  try{
    let links=[];
    const snap=await db.collection('examQuestions').where('examId','==',String(examBase.id)).get();
    if(!snap.empty){
      links=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));
    }
    if(!links.length && Array.isArray(examBase.questionIds) && examBase.questionIds.length){
      links=examBase.questionIds.map((questionId,idx)=>({questionId,order:idx+1}));
    }
    if(!links.length) return fallback;

    const questionDocs=await Promise.all(links.map(l=>db.collection('questionBanks').doc(String(l.questionId)).get()));
    const questions=[];
    questionDocs.forEach((doc,idx)=>{
      if(!doc.exists) return;
      const raw={id:doc.id,...doc.data()};
      questions.push({
        ...raw,
        id:String(raw.id||doc.id),
        sourceQuestionId:String(doc.id),
        point:links[idx]?.point||raw.point||1,
        order:links[idx]?.order||idx+1
      });
    });
    if(!questions.length) return fallback;
    return {
      ...fallback,
      questions,
      questionCount:questions.length,
      loadedFromQuestionBank:true,
      usesQuestionBank:true
    };
  }catch(err){
    console.warn('Không tải được đề từ questionBanks/examQuestions, dùng dữ liệu cũ:',err);
    return fallback;
  }
}
function publicQuestionForStudent(q){
  const copy=JSON.parse(JSON.stringify(q));
  delete copy.answer;
  delete copy.solution;
  delete copy.explanation;
  return copy;
}
function safeExamForProgress(exam){
  const copy=JSON.parse(JSON.stringify(exam));
  copy.questions=(copy.questions||[]).map(publicQuestionForStudent);
  return copy;
}

function getExamAvailability(e,user=currentUser){
  e=normalizeExamAccess(e||{});
  const now=Date.now();
  const start=e.startTime?new Date(e.startTime).getTime():null;
  const end=e.endTime?new Date(e.endTime).getTime():null;
  if(e.isPublished===false && user?.role!=='teacher') return {ok:false,label:'Chưa xuất bản',reason:'Đề này chưa được giáo viên xuất bản.'};
  if(user?.role==='student'){
    if(e.classIds.length && !e.classIds.includes(user.className||'')) return {ok:false,label:'Không thuộc lớp',reason:'Đề này không được giao cho lớp của em.'};
    if(start && now<start) return {ok:false,label:'Chưa mở',reason:'Đề chưa đến thời gian mở.'};
    if(end && now>end) return {ok:false,label:'Đã đóng',reason:'Đề đã hết thời gian làm bài.'};
    if(e.maxAttempts>0 && examAttemptCount(e.id,user.id)>=e.maxAttempts) return {ok:false,label:'Đã làm đủ lượt',reason:`Em đã dùng đủ ${e.maxAttempts} lượt làm bài.`};

}

function examScheduleText(e){

  return `Lớp: ${cls} • Mở: ${fmt(e.startTime)} • Đóng: ${fmt(e.endTime)} • ${attempts}`;
}

  const email=emailFromLogin($('regU').value.trim()), password=$('regP').value, fullname=$('regName').value.trim()||email, className=($('regClass')?.value||'Chưa phân lớp').trim()||'Chưa phân lớp';

async function startExam(id){
  const base=exams.find(e=>String(e.id)==String(id)); if(!base)return;
  const av=getExamAvailability(base);

  const key=progressKey(id), saved=key?JSON.parse(localStorage.getItem(key)||'null'):null;
  if(saved?.exam && saved?.remain>0){
    selectedExam=saved.exam;
    examAnswers=saved.answers||{};
    examRemain=saved.remain;
    examWarnings=saved.warnings||0;
    examStartedAt=saved.startedAt||new Date().toISOString();
    // Không lưu đáp án trong localStorage. Khi khôi phục, tải lại đáp án tạm từ questionBanks/examQuestions để chấm.
    const fullExam=await loadExamFromQuestionBank(base);
    prepareExamInstance(fullExam);
    selectedExam=saved.exam;
    toast('Đã khôi phục bài đang làm trước đó','ok');
  }
  else{
    $('mainView').innerHTML='<div class="glass-card p-8 text-center"><i class="fa-solid fa-spinner fa-spin text-3xl text-blue-600"></i><p class="mt-3 font-semibold">Đang tải đề từ kho câu hỏi...</p></div>';
    const fullExam=await loadExamFromQuestionBank(base);
    selectedExam=prepareExamInstance(fullExam);
    examAnswers={};examReview=false;examRemain=(selectedExam.duration||30)*60; examWarnings=0; examStartedAt=new Date().toISOString();
  }
  renderExamRoom();
  if(currentUser?.role==='student'){enableAntiCheat();clearInterval(examTimer);examTimer=setInterval(()=>{examRemain--;saveExamProgress();updateTimer(); if(examRemain<=0){clearInterval(examTimer);submitExam(true)}},1000)}

async function submitExam(auto=false){

  });

function parseCSV(text){
  const rows=[];let row=[],cell='',q=false;text=String(text||'').replace(/^\ufeff/,'');
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(q&&c==='"'&&n==='"'){cell+='"';i++;continue}
    if(c==='"'){q=!q;continue}
    if(!q&&c===','){row.push(cell);cell='';continue}
    if(!q&&(c==='\n'||c==='\r')){if(c==='\r'&&n==='\n')i++;row.push(cell);if(row.some(x=>String(x).trim()!==''))rows.push(row);row=[];cell='';continue}
    cell+=c;
  }
  row.push(cell);if(row.some(x=>String(x).trim()!==''))rows.push(row);return rows;
}
function truthyVN(v){v=norm(v);return ['true','1','dung','đung','đúng','yes','y','t','d','đ'].includes(v)}
function falseyVN(v){v=norm(v);return ['false','0','sai','no','n','f','s'].includes(v)}
function guessTopicIdFromText(text=''){
  const t=String(text).toLowerCase();
  const rules=[[5,['tích phân','nguyên hàm','\\int','integral']],[4,['đạo hàm','cực trị','đồng biến','nghịch biến','hàm số','tiệm cận']],[7,['xác suất','thống kê','biến cố','tần số','trung bình','phương sai']],[3,['hình chóp','lăng trụ','khối nón','khối trụ','khối cầu','thể tích']],[6,['vectơ','tọa độ','mặt phẳng','đường thẳng','không gian oxyz']],[2,['cấp số cộng','cấp số nhân','công sai','công bội']],[1,['phương trình','bất phương trình','hệ phương trình','logarit','mũ']]];
  for(const [id,keys] of rules){if(keys.some(k=>t.includes(k)))return id;} return Number($('edTopic')?.value||4);
}
function normalizeImportedQuestion(raw,idx=0,collectErrors=false){
  const errors=[]; const q={...raw};q.type=String(q.type||'mc').trim().toLowerCase();
  if(q.type==='multiple')q.type='mc'; if(q.type==='truefalse')q.type='tf'; if(q.type==='number')q.type='short';
  if(!['mc','tf','short'].includes(q.type)){errors.push('Sai type, chỉ nhận mc/tf/short');q.type='mc';}
  q.id=String(q.id||('q'+uid()+idx)); q.text=String(q.text||'').trim();
  q.topicId=Number(q.topicId||0); if(!q.topicId||q.topicId<1||q.topicId>8)q.topicId=guessTopicIdFromText(q.text);
  q.level=String(q.level||$('edLevel')?.value||'').trim(); q.solution=String(q.solution||'').trim(); q.imageUrl=String(q.imageUrl||'').trim(); q.tags=String(q.tags||'').trim();
  if(q.type==='mc'){
    q.options=Array.isArray(q.options)?q.options:[q.optionA,q.optionB,q.optionC,q.optionD].map(x=>String(x||'').trim());
    while(q.options.length<4)q.options.push(''); q.options=q.options.slice(0,4);
    if(q.options.some(x=>!String(x).trim()))errors.push('Trắc nghiệm cần đủ 4 phương án A-D');
    let a=q.answer; if(typeof a==='string'){const ss=a.trim().toUpperCase();a='ABCD'.includes(ss)?'ABCD'.indexOf(ss):Number(ss)}
    q.answer=Number.isFinite(Number(a))?Number(a):NaN; if(q.answer>3)q.answer=Math.max(0,q.answer-1);
    if(!Number.isFinite(q.answer)||q.answer<0||q.answer>3){errors.push('Đáp án trắc nghiệm phải là A/B/C/D hoặc 0-3/1-4');q.answer=0;}
  }else if(q.type==='tf'){
    q.statements=Array.isArray(q.statements)?q.statements:[q.statementA,q.statementB,q.statementC,q.statementD].map(x=>String(x||'').trim());
    while(q.statements.length<4)q.statements.push(''); q.statements=q.statements.slice(0,4);
    if(q.statements.some(x=>!String(x).trim()))errors.push('Câu đúng/sai cần đủ 4 mệnh đề');
    if(Array.isArray(q.answer))q.answer=q.answer.map(Boolean).slice(0,4); else q.answer=[q.answerA,q.answerB,q.answerC,q.answerD].map(v=>truthyVN(v)?true:(falseyVN(v)?false:null));
    while(q.answer.length<4)q.answer.push(null);
    if(q.answer.some(v=>v===null)){errors.push('Đáp án đúng/sai phải là Đúng/Sai hoặc true/false');q.answer=q.answer.map(v=>v===null?true:v);}
  }else{ q.answer=String(q.answer||'').trim(); if(!q.answer)errors.push('Câu trả lời ngắn thiếu đáp án'); }
  if(!q.text)errors.push('Thiếu nội dung câu hỏi'); q._row=idx+2; q._errors=errors;
  if(errors.length&&!collectErrors)throw new Error('Dòng '+(idx+2)+': '+errors.join('; ')); return q;
}
function rawObjectsFromCSV(text){const rows=parseCSV(text); if(rows.length<2)return []; const headers=rows[0].map(h=>String(h).trim()); return rows.slice(1).map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]??'');return o;});}
function questionsFromCSV(text,collectErrors=false){return rawObjectsFromCSV(text).map((o,idx)=>normalizeImportedQuestion(o,idx,collectErrors));}
function questionsFromJSON(text,collectErrors=false){const data=JSON.parse(text); const arr=Array.isArray(data)?data:(data.questions||[]); return arr.map((q,idx)=>normalizeImportedQuestion(q,idx,collectErrors));}
async function questionsFromExcel(file,collectErrors=false){
  if(!window.XLSX)throw new Error('Chưa tải được thư viện đọc Excel. Thầy có thể lưu file thành CSV rồi nhập lại.');
  const buf=await file.arrayBuffer(); const wb=XLSX.read(buf,{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''}); if(rows.length<2)return [];
  const headers=rows[0].map(h=>String(h).trim());
  return rows.slice(1).filter(r=>r.some(x=>String(x).trim()!=='')).map((r,idx)=>{const o={};headers.forEach((h,i)=>o[h]=r[i]??'');return normalizeImportedQuestion(o,idx,collectErrors);});
}
async function parseQuestionImportFile(file,collectErrors=false){const name=file.name.toLowerCase(); if(name.endsWith('.json'))return questionsFromJSON(await file.text(),collectErrors); if(name.endsWith('.xlsx')||name.endsWith('.xls'))return await questionsFromExcel(file,collectErrors); return questionsFromCSV(await file.text(),collectErrors);}

  if(!items.length){box.innerHTML='<p class="text-sm text-slate-500">Chọn file để xem trước dữ liệu.</p>';return;}
  box.innerHTML=importPreviewStats(items)+`<div class="max-h-80 overflow-auto border rounded-2xl"><table class="w-full text-xs"><thead class="sticky top-0 bg-white"><tr><th class="p-2 text-left">Dòng</th><th class="text-left">Loại</th><th class="text-left">Chủ đề</th><th class="text-left">Nội dung</th><th class="text-left">Trạng thái</th></tr></thead><tbody>${items.map(q=>`<tr class="border-t ${q._errors?.length?'bg-red-50':'bg-white/70'}"><td class="p-2">${q._row||''}</td><td>${safe(q.type)}</td><td>${safe(topicName(q.topicId))}</td><td class="math-content">${safe(q.text).slice(0,160)}</td><td>${q._errors?.length?'<span class="text-red-600 font-bold">'+safe(q._errors.join('; '))+'</span>':'<span class="text-green-700 font-bold">Hợp lệ</span>'}</td></tr>`).join('')}</tbody></table></div>`; typeset();
}

async function handleQuestionImport(target='bank'){
  const input=$('questionImportFile'),file=input?.files?.[0]; if(!file)return toast('Thầy hãy chọn file CSV, Excel hoặc JSON','bad');
  try{
    const imported=(window.questionImportPreviewItems&&window.questionImportPreviewItems.length)?window.questionImportPreviewItems:await parseQuestionImportFile(file,true);
    const valid=imported.filter(q=>!q._errors?.length).map(q=>{const c={...q};delete c._errors;delete c._row;return c;}); const bad=imported.length-valid.length;
    if(!valid.length){renderQuestionImportPreview(imported);return toast('File chưa có câu hỏi hợp lệ. Thầy xem bảng lỗi để sửa.','bad');}
    if(target==='editor'){window.editorQ=window.editorQ||[]; valid.forEach((q,i)=>{q.id='q'+uid()+i;window.editorQ.push(q)}); refreshEditorQuestions(); document.querySelector('.question-import-modal')?.remove(); toast(`Đã đưa ${valid.length} câu vào đề đang soạn${bad?`, bỏ qua ${bad} dòng lỗi`:''}`,'ok'); return;}
    const now=new Date().toISOString(); valid.forEach((q,i)=>{q.id=String(q.id||('q'+uid()+i));q.status='published';q.sourceExamTitle='Nhập từ file';q.topicName=topicName(q.topicId);q.updatedAt=now;});
    const byId={};questionBank.forEach(q=>byId[String(q.id)]=q);valid.forEach(q=>byId[String(q.id)]=q);questionBank=Object.values(byId); localStorage.setItem('mathpro12_questionBank',JSON.stringify(questionBank));
    if(firebaseReady){let batch=db.batch(),count=0;for(const q of valid){batch.set(db.collection('questionBanks').doc(String(q.id)),{...q,createdBy:currentUser?.id||null,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});count++;if(count%450===0){await batch.commit();batch=db.batch();}}await batch.commit();}
    document.querySelector('.question-import-modal')?.remove(); toast(`Đã nhập ${valid.length} câu vào kho câu hỏi${bad?`, bỏ qua ${bad} dòng lỗi`:''}`,'ok'); renderQuestionBank();
  }catch(err){console.error(err);toast('Không nhập được file: '+(err?.message||err),'bad');}
}

function getFilteredBankQuestions(){
  const topic=$('bankTopicFilter')?.value||'all', type=$('bankTypeFilter')?.value||'all', kw=norm($('bankSearch')?.value||'');
  return questionBank.filter(q=>{const okTopic=topic==='all'||String(q.topicId)===String(topic);const okType=type==='all'||q.type===type;const hay=norm([q.text,q.sourceExamTitle,q.level,...(q.options||[]),...(q.statements||[])].join(' '));return okTopic&&okType&&(!kw||hay.includes(kw));});
}

function pickAllVisibleQuestions(flag=true){window.bankPicked=window.bankPicked||{};getFilteredBankQuestions().forEach(q=>{if(flag)window.bankPicked[q.id]=true;else delete window.bankPicked[q.id];});renderBankPickerList();}
function addPickedQuestionsToEditor(){

  ids.forEach(id=>{const q=questionBank.find(x=>String(x.id)===String(id));if(!q)return;if(exists.has(String(q.id))){skipped++;return;}const copy=cleanQuestionFromBank(q);copy.id='q'+uid()+added;copy.sourceQuestionId=q.id;window.editorQ.push(copy);exists.add(String(q.id));added++;});

}

function editorFields(q,i){if(q.type==='mc')return `<div class="grid md:grid-cols-2 gap-2 mt-2">${[0,1,2,3].map(k=>`<input onchange="editorQ[${i}].options[${k}]=this.value" class="border rounded-xl p-2" placeholder="Phương án ${'ABCD'[k]}" value="${safe(q.options?.[k]||'')}">`).join('')}</div><select onchange="editorQ[${i}].answer=Number(this.value)" class="border rounded-xl p-2 mt-2"><option value="0" ${q.answer==0?'selected':''}>Đáp án A</option><option value="1" ${q.answer==1?'selected':''}>Đáp án B</option><option value="2" ${q.answer==2?'selected':''}>Đáp án C</option><option value="3" ${q.answer==3?'selected':''}>Đáp án D</option></select>`; if(q.type==='tf')return `<div class="space-y-2 mt-2">${[0,1,2,3].map(k=>`<div class="grid md:grid-cols-[1fr_140px] gap-2"><input onchange="editorQ[${i}].statements[${k}]=this.value" class="border rounded-xl p-2" placeholder="Mệnh đề ${String.fromCharCode(97+k)}" value="${safe(q.statements?.[k]||'')}"><select onchange="editorQ[${i}].answer[${k}]=this.value==='true'" class="border rounded-xl p-2"><option value="true" ${q.answer?.[k]!==false?'selected':''}>Đúng</option><option value="false" ${q.answer?.[k]===false?'selected':''}>Sai</option></select></div>`).join('')}</div>`; return `<input onchange="editorQ[${i}].answer=this.value" class="border rounded-xl p-2 mt-2 w-full" placeholder="Đáp án ngắn" value="${safe(q.answer||'')}">`}
function addEditorQuestion(type){const base={id:'q'+uid(),type,text:'',solution:''};if(type==='mc'){base.options=['','','',''];base.answer=0}else if(type==='tf'){base.statements=['','','',''];base.answer=[true,true,true,true]}else{base.answer=''}window.editorQ.push(base);refreshEditorQuestions()}
async function saveExamEditor(id){
  const docId=String(id||uid());
  const data={id:docId,title:$('edTitle').value.trim(),topicId:Number($('edTopic').value),duration:Number($('edDuration').value||30),level:$('edLevel').value,description:$('edDesc').value,questions:window.editorQ,classIds:selectedClassIdsFromEditor(),startTime:readDateInputValue('edStartTime'),endTime:readDateInputValue('edEndTime'),maxAttempts:Number($('edMaxAttempts')?.value||0),isPublished:($('edPublished')?.value!=='false'),updatedAt:new Date().toISOString()};
  if(!data.title||!data.questions.length)return toast('Cần nhập tên đề và ít nhất 1 câu hỏi','bad');
  if(data.startTime&&data.endTime&&new Date(data.startTime)>=new Date(data.endTime))return toast('Thời gian đóng đề phải sau thời gian mở đề','bad');
  if(id){const idx=exams.findIndex(e=>String(e.id)==String(id)); if(idx>=0)exams[idx]=data}else exams.push(data);
  save();
  if(firebaseReady){
    try{await db.collection('exams').doc(docId).set({...data,createdBy:currentUser?.id||null,questionCount:data.questions.length,usesQuestionBank:true,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); await syncExamStructureToFirestore(data);}
    catch(err){toast('Đã lưu local, chưa ghi được Firestore: '+fbError(err),'bad')}
  } else { await syncExamQuestionsToQuestionBank(data); localStorage.setItem('mathpro12_examQuestionIds_'+docId,JSON.stringify(data.questions.map(q=>getQuestionBankId(q)))); }
  document.querySelector('.fixed')?.remove();renderTeacherDashboard();toast('Đã lưu đề thi','ok');
}
async function deleteExam(id){
  if(confirm('Xóa đề này và các điểm liên quan?')){
    exams=exams.filter(e=>String(e.id)!=String(id));
    submissions=submissions.filter(s=>String(s.examId)!=String(id));
    save();
    if(firebaseReady){try{await deleteExamQuestionLinks(id); await db.collection('exams').doc(String(id)).delete();}catch(err){toast('Chưa xóa được trên Firestore: '+fbError(err),'bad')}}
    renderTeacherDashboard();toast('Đã xóa','ok');
  }
}
function showSecurityRules(){
  const rules=`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function signedIn(){ return request.auth != null; }
    function isTeacher(){ return signedIn() && get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'teacher'; }

    match /users/{userId} {
      allow read: if signedIn() && (request.auth.uid == userId || isTeacher());
      allow create: if signedIn() && request.auth.uid == userId;
      allow update: if signedIn() && (request.auth.uid == userId || isTeacher());
    }

    match /questionBanks/{questionId} {
      allow read: if signedIn();
      allow create, update, delete: if isTeacher();
    }

    match /exams/{examId} {
      allow read: if true;
      allow create, update, delete: if isTeacher();
    }

    match /examQuestions/{id} {
      allow read: if signedIn();
      allow create, update, delete: if isTeacher();
    }

    match /examResults/{resultId} {
      allow create: if signedIn() && request.resource.data.studentId == request.auth.uid;
      allow read: if signedIn() && (resource.data.studentId == request.auth.uid || isTeacher());
      allow update, delete: if isTeacher();
    }
  }
}`;
  const m=document.createElement('div');m.className='fixed inset-0 bg-black/55 z-50 p-4 overflow-auto fade-in';m.innerHTML=`<div class="glass-card max-w-4xl mx-auto p-6"><div class="flex justify-between"><h2 class="text-2xl font-black">Firestore Rules chống sửa dữ liệu</h2><button onclick="this.closest('.fixed').remove()" class="text-2xl">&times;</button></div><p class="my-3 text-sm" style="color:var(--muted)">Dán đoạn này vào Firebase Console → Firestore Database → Rules. Bản HTML đã giảm lộ đáp án trên giao diện, còn rules này giúp học sinh không tự sửa/xóa đề và điểm.</p><textarea class="w-full h-96 border rounded-2xl p-4 font-mono text-sm">${rules}</textarea></div>`;document.body.appendChild(m);
}

function exportData(){const blob=new Blob([JSON.stringify({users,classes,exams,questionBank,submissions},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mathpro12-data.json';a.click()}
function resetDemo(){if(confirm('Khôi phục dữ liệu mẫu?')){localStorage.removeItem('mathpro12_users');localStorage.removeItem('mathpro12_exams');localStorage.removeItem('mathpro12_submissions');localStorage.removeItem('mathpro12_user');localStorage.removeItem('mathpro12_classes');bootstrap()}}
document.addEventListener('visibilitychange',()=>{if(document.hidden)antiCheatWarning('Rời tab hoặc thu nhỏ trình duyệt')});
document.addEventListener('fullscreenchange',()=>{if(examAntiCheatLocked&&!document.fullscreenElement)antiCheatWarning('Thoát toàn màn hình')});
document.addEventListener('contextmenu',e=>{if(examAntiCheatLocked){e.preventDefault();antiCheatWarning('Mở chuột phải')}});
document.addEventListener('copy',e=>{if(examAntiCheatLocked){e.preventDefault();antiCheatWarning('Copy nội dung đề')}});
document.addEventListener('paste',e=>{if(examAntiCheatLocked){e.preventDefault();antiCheatWarning('Dán nội dung vào bài')}});
document.addEventListener('keydown',e=>{if(examAntiCheatLocked&&((e.ctrlKey&&['c','v','u','s','p'].includes(e.key.toLowerCase()))||e.key==='F12')){e.preventDefault();antiCheatWarning('Dùng phím tắt bị khóa')}});
window.addEventListener('beforeunload',e=>{if(examAntiCheatLocked&&selectedExam&&examRemain>0){e.preventDefault();e.returnValue='Bài thi đang làm chưa nộp.'}});

async function bootstrap(){
  $('mainView').innerHTML='<div class="glass-card p-8 text-center"><i class="fa-solid fa-spinner fa-spin text-3xl text-blue-600"></i><p class="mt-3 font-semibold">Đang kết nối Firebase và tải dữ liệu...</p></div>';
  await load();
  renderHeader();
  renderHome();
  if(firebaseReady){
    auth.onAuthStateChanged(async (user)=>{
      if(user){
        try{
          currentUser=await getUserProfile(user); save(); renderHeader();
          await loadExamsFromFirestore(); await loadQuestionBankFromFirestore(); await loadSubmissionsFromFirestore();
        }catch(err){console.warn(err)}
      }else{currentUser=null; save(); renderHeader();}
    });
  }
}
bootstrap();
</script>
