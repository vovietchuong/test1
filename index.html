// ===== BƯỚC 3: IMPORT LaTeX EX_TEST CHUYÊN NGHIỆP =====
function latexStripSolution(block=''){
  const m=String(block).match(/\\loigiai\s*\{([\s\S]*)\}\s*$/);
  if(!m)return {body:block,solution:''};
  const idx=block.indexOf(m[0]);
  return {body:block.slice(0,idx).trim(),solution:m[1].trim()};
}
function latexCleanText(s=''){
  return String(s||'').replace(/\\True\s*/g,'').replace(/\\par\b/g,'\n').replace(/^[\s\n]+|[\s\n]+$/g,'').replace(/\n{3,}/g,'\n\n');
}
function readBalancedLatexGroups(text='',start=0,maxGroups=12){
  const groups=[]; let i=start;
  while(i<text.length && groups.length<maxGroups){
    while(i<text.length && /\s/.test(text[i]))i++;
    if(text[i]!=='{')break;
    let depth=0, begin=i+1, j=i;
    for(;j<text.length;j++){
      const ch=text[j], prev=text[j-1];
      if(ch==='{' && prev!=='\\')depth++;
      if(ch==='}' && prev!=='\\')depth--;
      if(depth===0){groups.push(text.slice(begin,j)); i=j+1; break;}
    }
    if(j>=text.length)break;
  }
  return groups;
}
function parseLatexExBlocks(latex='',opts={}){
  const text=String(latex||'');
  const blocks=[...text.matchAll(/\\begin\{ex\}([\s\S]*?)\\end\{ex\}/g)].map(m=>m[1]);
  const sourceBlocks=blocks.length?blocks:[text];
  const topicId=Number(opts.topicId||4), level=opts.level||'LaTeX import';
  const items=[];
  sourceBlocks.forEach((rawBlock,idx)=>{
    let {body,solution}=latexStripSolution(rawBlock);
    const isTF=/\\choiceTF\b/.test(body);
    const isMC=/\\choice\b/.test(body) && !isTF;
    try{
      if(isTF){
        const cut=body.search(/\\choiceTF\b/);
        const lead=latexCleanText(body.slice(0,cut));
        const groups=readBalancedLatexGroups(body, body.indexOf('\\choiceTF')+'\\choiceTF'.length, 4);
        const statements=groups.slice(0,4).map(latexCleanText);
        const answer=groups.slice(0,4).map(g=>/\\True\b/.test(g));
        items.push(normalizeImportedQuestion({type:'tf',topicId,level,text:lead||`Câu đúng/sai ${idx+1}`,statementA:statements[0]||'',statementB:statements[1]||'',statementC:statements[2]||'',statementD:statements[3]||'',answerA:answer[0]?'Đúng':'Sai',answerB:answer[1]?'Đúng':'Sai',answerC:answer[2]?'Đúng':'Sai',answerD:answer[3]?'Đúng':'Sai',solution,tags:'latex-import',standard2018:opts.standard2018||'',difficulty:opts.difficulty||'',sourceExamTitle:opts.source||'Nhập từ LaTeX'},idx,true));
      }else if(isMC){
        const cut=body.search(/\\choice\b/);
        const lead=latexCleanText(body.slice(0,cut));
        const groups=readBalancedLatexGroups(body, body.indexOf('\\choice')+'\\choice'.length, 4);
        const ans=Math.max(0,groups.findIndex(g=>/\\True\b/.test(g)));
        const options=groups.slice(0,4).map(latexCleanText);
        items.push(normalizeImportedQuestion({type:'mc',topicId,level,text:lead||`Câu trắc nghiệm ${idx+1}`,optionA:options[0]||'',optionB:options[1]||'',optionC:options[2]||'',optionD:options[3]||'',answer:ans,solution,tags:'latex-import',standard2018:opts.standard2018||'',difficulty:opts.difficulty||'',sourceExamTitle:opts.source||'Nhập từ LaTeX'},idx,true));
      }else{
        const ansMatch=body.match(/\\shortans\s*\{([^}]*)\}/)||body.match(/\\dapso\s*\{([^}]*)\}/i);
        const qText=latexCleanText(body.replace(/\\shortans\s*\{[^}]*\}/g,'').replace(/\\dapso\s*\{[^}]*\}/gi,''));
        items.push(normalizeImportedQuestion({type:'short',topicId,level,text:qText||`Câu trả lời ngắn ${idx+1}`,answer:ansMatch?ansMatch[1].trim():'',solution,tags:'latex-import;can-kiem-tra',standard2018:opts.standard2018||'',difficulty:opts.difficulty||'',sourceExamTitle:opts.source||'Nhập từ LaTeX'},idx,true));
      }
    }catch(err){
      const q=normalizeImportedQuestion({type:'short',topicId,level,text:latexCleanText(rawBlock).slice(0,500),answer:'',solution,tags:'latex-import-loi'},idx,true);
      q._errors=(q._errors||[]).concat('Không tách được LaTeX: '+(err?.message||err)); items.push(q);
    }
  });
  return items;
}

Mỗi phần tử có dạng:
{
  "type":"mc|tf|short",
  "text":"nội dung câu hỏi, giữ LaTeX trong $...$",
  "options":["A","B","C","D"],
  "statements":["a","b","c","d"],
  "answer":0 hoặc [true,false,true,false] hoặc "đáp án ngắn",

Quy tắc:

- Với trắc nghiệm A/B/C/D: answer là số 0,1,2,3.

- Nếu đọc từ ảnh/PDF scan: nhìn kỹ chỉ số trên/dưới, phân số, căn, tích phân, giới hạn, vectơ, ma trận/bảng biến thiên.

function parseAIAnswerByType(q={},type='short'){
  const raw=(q.answer!==undefined && q.answer!==null)?q.answer:(q.answerText!==undefined?q.answerText:q.correctAnswer);
  if(type==='mc'){
    if(Number.isFinite(Number(raw))) return Number(raw);
    const t=String(raw||'').trim().toUpperCase();
    const m=t.match(/^[A-D]/) || t.match(/ĐÁP\s*ÁN\s*[:\-]?\s*([A-D])/i);
    if(m){const ch=(m[1]||m[0]||'').trim().toUpperCase()[0]; return 'ABCD'.indexOf(ch);}
    return '';
  }
  if(type==='tf'){
    if(Array.isArray(raw)) return raw;
    const t=String(raw||'').trim();
    const parts=t.split(/[;,|\n]+/).map(x=>x.trim()).filter(Boolean);
    if(parts.length>=4) return parts.slice(0,4).map(x=>/^(đ|d|true|t|1|yes|y)/i.test(x));
    const compact=t.replace(/\s+/g,'').toUpperCase();
    if(/^[ĐDSSTF01]{4,}$/.test(compact)) return compact.slice(0,4).split('').map(ch=>['Đ','D','T','1'].includes(ch));
    return [false,false,false,false];
  }
  return raw??'';
}

function normalizeAIQuestion(q={},idx=0,opts={}){
  const type=['mc','tf','short'].includes(q.type)?q.type:(Array.isArray(q.options)?'mc':Array.isArray(q.statements)?'tf':'short');
  const raw={
    type,
    topicId:opts.topicId||4,
    level:q.level||opts.level||'AI import',
    text:q.text||q.question||'',
    solution:q.solution||q.explanation||'',
    tags:[q.tags,'ai-import',opts.sourceTag].filter(Boolean).join(';'),
    sourceExamTitle:opts.source||'AI import',
    standard2018:q.standard2018||opts.standard2018||'',
    difficulty:q.difficulty||opts.difficulty||'',
    hasImage:!!q.hasImage,
    confidence:Number(q.confidence||0)
  };
  if(type==='mc'){
    const ops=Array.isArray(q.options)?q.options:[q.optionA,q.optionB,q.optionC,q.optionD];
    raw.optionA=ops[0]||''; raw.optionB=ops[1]||''; raw.optionC=ops[2]||''; raw.optionD=ops[3]||'';
    raw.answer=parseAIAnswerByType(q,type);
  }else if(type==='tf'){
    const st=Array.isArray(q.statements)?q.statements:[q.statementA,q.statementB,q.statementC,q.statementD];
    raw.statementA=st[0]||''; raw.statementB=st[1]||''; raw.statementC=st[2]||''; raw.statementD=st[3]||'';
    const parsedTF=parseAIAnswerByType(q,type);
    const ans=Array.isArray(parsedTF)?parsedTF:[q.answerA,q.answerB,q.answerC,q.answerD];
    ['A','B','C','D'].forEach((k,i)=>raw['answer'+k]=(ans[i]===true||String(ans[i]).toLowerCase()==='true'||String(ans[i]).toLowerCase()==='đúng')?'Đúng':'Sai');
  }else raw.answer=parseAIAnswerByType(q,type);
  const out=normalizeImportedQuestion(raw,idx,true);
  if(q.answer===null || typeof q.answer==='undefined') out._errors=(out._errors||[]).concat('AI chưa xác định đáp án chắc chắn');
  if(raw.confidence && raw.confidence<0.65) out._warnings=(out._warnings||[]).concat('AI báo độ tin cậy thấp');
  return normalizeImportedMathQuestion?normalizeImportedMathQuestion(out,opts.autoMath!==false):out;
}
function parseJsonArrayLoose(text=''){
  let s=String(text||'').trim();
  s=s.replace(/^```(?:json)?\s*/i,'').replace(/```$/,'').trim();
  try{return JSON.parse(s);}catch(e){}
  const objStart=s.indexOf('{'), objEnd=s.lastIndexOf('}');
  if(objStart>=0 && objEnd>objStart){
    const objText=s.slice(objStart,objEnd+1);
    try{return JSON.parse(objText);}catch(e){}
  }
  const arrStart=s.indexOf('['), arrEnd=s.lastIndexOf(']');
  if(arrStart>=0 && arrEnd>arrStart){
    const arrText=s.slice(arrStart,arrEnd+1);
    try{return JSON.parse(arrText);}catch(e){}
  }
  // Cứu lỗi thường gặp khi AI lỡ thêm chữ trước/sau JSON hoặc xuống dòng thừa.
  const cleaned=s.replace(/[“”]/g,'"').replace(/[‘’]/g,"'").replace(/,\s*([}\]])/g,'$1');
  try{return JSON.parse(cleaned);}catch(e){}
  throw new Error('AI chưa trả về JSON hợp lệ. Thầy thử bấm đọc lại hoặc dùng chế độ tách câu nội bộ.');
}
function dataUrlToGeminiInlineData(dataUrl=''){
  const m=String(dataUrl||'').match(/^data:([^;]+);base64,(.+)$/);
  if(!m) throw new Error('Ảnh chưa đúng dạng base64 data URL');
  return {mimeType:m[1]||'image/jpeg',data:m[2]};
}
function geminiResponseText(data={}){
  return data?.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('\n') || data?.text || data?.output || '';
}
async function callGeminiGenerateContent({apiKey,model,systemText,userParts,responseSchema,temperature=0.05}){
  if(!apiKey) throw new Error('Chưa nhập Gemini API key hoặc chưa cấu hình backend AI.');
  const safeModel=(model||SMART_IMPORT_DEFAULT_MODEL||'gemini-2.5-flash').trim();
  const parts=Array.isArray(userParts)?userParts:[{text:String(userParts||'')}];
  const body={
    systemInstruction:{parts:[{text:systemText||smartImportSystemPrompt()}]},
    contents:[{role:'user',parts}],
    generationConfig:{
      temperature,
      responseMimeType:'application/json',
      responseSchema:responseSchema||smartQuestionJsonSchema()
    }
  };
  const res=await fetch(`${SMART_IMPORT_GEMINI_API_BASE}/${encodeURIComponent(safeModel)}:generateContent`,{
    method:'POST',
    headers:{'Content-Type':'application/json','x-goog-api-key':apiKey},
    body:JSON.stringify(body)
  });
  let data={}; try{data=await res.json();}catch(e){}
  if(!res.ok){
    const msg=data?.error?.message||`Không gọi được Gemini API. HTTP ${res.status}`;
    throw new Error(msg+' | Kiểm tra API key, model, quota/billing, API restrictions và quyền Generative Language API.');
  }
  const out=geminiResponseText(data);
  const parsed=parseJsonArrayLoose(out);
  const arr=Array.isArray(parsed)?parsed:(parsed.questions||parsed.items||parsed.data||[]);
  if(!Array.isArray(arr)) throw new Error('AI trả JSON nhưng chưa có mảng questions.');
  return arr;
}
async function smartParseWithAI(rawText='',opts={}){
  const chunk=String(rawText||'').slice(0,60000);
  if(!chunk.trim())return [];
  const prompt=`Nguồn: ${opts.source||'file'}\nChủ đề mặc định: ${topicName(opts.topicId||4)}\nMức độ mặc định: ${opts.level||'AI import'}\nChuẩn CT 2018 mặc định: ${opts.standard2018||''}\n\nTEXT CẦN PHÂN TÍCH:\n${chunk}`;
  const provider=(opts.provider||'gemini').toLowerCase();
  if(opts.apiKey && provider==='gemini'){
    const arr=await callGeminiGenerateContent({apiKey:opts.apiKey,model:opts.model||SMART_IMPORT_DEFAULT_MODEL,systemText:smartImportSystemPrompt(),userParts:[{text:prompt}],responseSchema:smartQuestionJsonSchema(),temperature:0.05});
    return arr.map((q,i)=>normalizeAIQuestion(q,i,{...opts,sourceTag:'gemini-text'}));
  }
  if(opts.apiKey && provider==='openai'){
    const res=await fetch('https://api.openai.com/v1/responses',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+opts.apiKey},body:JSON.stringify({model:opts.model||SMART_IMPORT_OPENAI_TEXT_MODEL,input:[{role:'system',content:smartImportSystemPrompt()},{role:'user',content:prompt}],temperature:0.1})});
    const data=await res.json();
    if(!res.ok)throw new Error(data?.error?.message||'Không gọi được OpenAI API');
    const out=data.output_text || data.output?.flatMap(o=>o.content||[]).map(c=>c.text||'').join('\n') || '';
    const parsed=parseJsonArrayLoose(out); const arr=Array.isArray(parsed)?parsed:(parsed.questions||[]);
    return arr.map((q,i)=>normalizeAIQuestion(q,i,{...opts,sourceTag:'openai-text'}));
  }
  const res=await fetch(opts.endpoint||'/api/parse-questions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider,model:opts.model||SMART_IMPORT_DEFAULT_MODEL,system:smartImportSystemPrompt(),text:prompt,source:opts.source||'',topicId:opts.topicId,level:opts.level,standard2018:opts.standard2018,schema:smartQuestionJsonSchema()})});
  const data=await res.json();
  if(!res.ok)throw new Error(data?.error||data?.message||'Endpoint AI chưa hoạt động');
  const arr=Array.isArray(data)?data:(data.questions||parseJsonArrayLoose(data.output||data.text||''));
  return arr.map((q,i)=>normalizeAIQuestion(q,i,{...opts,sourceTag:`${provider}-backend-text`}));
}

function smartQuestionJsonSchema(){
  // Gemini responseSchema dùng schema đơn giản, tránh any/{} và additionalProperties để khỏi lỗi 400.
  return {
    type:'object',
    properties:{
      questions:{
        type:'array',
        items:{
          type:'object',
          properties:{
            type:{type:'string',enum:['mc','tf','short']},
            text:{type:'string'},
            options:{type:'array',items:{type:'string'}},
            statements:{type:'array',items:{type:'string'}},
            answerText:{type:'string'},
            solution:{type:'string'},
            level:{type:'string'},
            standard2018:{type:'string'},
            tags:{type:'string'},
            confidence:{type:'number'},
            hasImage:{type:'boolean'},
            imageNote:{type:'string'}
          },
          required:['type','text']
        }
      }
    },

  };
}
async function blobToDataURL(blob){return await new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(blob);});}
async function fileToDataURL(file){return await blobToDataURL(file);}
async function renderPDFToVisionImages(file,opts={},onProgress){
  if(!window.pdfjsLib)throw new Error('Chưa tải được PDF.js để chuyển PDF thành ảnh.');
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const max=Math.min(pdf.numPages,Number(opts.maxVisionPages||12));
  const scale=Number(opts.pageScale||2.4);
  const pages=[];
  for(let i=1;i<=max;i++){
    if(onProgress)onProgress(`AI Vision: đang chuyển trang ${i}/${pdf.numPages} thành ảnh...`);
    const page=await pdf.getPage(i);
    const viewport=page.getViewport({scale});
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d',{alpha:false});
    canvas.width=Math.floor(viewport.width); canvas.height=Math.floor(viewport.height);
    ctx.fillStyle='white'; ctx.fillRect(0,0,canvas.width,canvas.height);
    await page.render({canvasContext:ctx,viewport}).promise;
    const dataUrl=canvas.toDataURL('image/jpeg',0.92);
    pages.push({page:i,dataUrl,width:canvas.width,height:canvas.height});
  }
  return {pages,totalPages:pdf.numPages,truncated:pdf.numPages>max};
}
async function extractVisionImagesFromFile(file,opts={},onProgress){
  const name=String(file?.name||'').toLowerCase();
  if(name.endsWith('.pdf')||file.type==='application/pdf') return await renderPDFToVisionImages(file,opts,onProgress);
  if(file.type?.startsWith('image/')||/\.(png|jpg|jpeg|webp)$/i.test(name)){
    if(onProgress)onProgress('AI Vision: đang nạp ảnh đề...');
    return {pages:[{page:1,dataUrl:await fileToDataURL(file),width:0,height:0}],totalPages:1,truncated:false};
  }
  return null;
}
function latexIssueListForQuestion(q={}){
  const fields=[q.text,q.solution,...(q.options||[]),...(q.statements||[])].filter(Boolean).join('\n');
  const issues=[];
  const dollars=(fields.match(/\$/g)||[]).length;
  if(dollars%2!==0)issues.push('Số dấu $ lẻ, có thể lỗi công thức inline');
  const open=(fields.match(/\\\(/g)||[]).length, close=(fields.match(/\\\)/g)||[]).length;
  if(open!==close)issues.push('Lệch cặp \\( ... \\)');
  const bOpen=(fields.match(/\\\[/g)||[]).length, bClose=(fields.match(/\\\]/g)||[]).length;
  if(bOpen!==bClose)issues.push('Lệch cặp \\[ ... \\]');
  const left=(fields.match(/\\left/g)||[]).length, right=(fields.match(/\\right/g)||[]).length;
  if(left!==right)issues.push('Lệch cặp \\left / \\right');
  let balance=0; for(const ch of fields){if(ch==='{')balance++; if(ch==='}')balance--; if(balance<0){issues.push('Dấu ngoặc nhọn } dư');break;}}
  if(balance>0)issues.push('Thiếu dấu ngoặc nhọn } trong LaTeX');
  if(/\b(frac|sqrt|lim|int|vec|overline|begin|end)\b/.test(fields)&&!/\\(frac|sqrt|lim|int|vec|overline|begin|end)/.test(fields))issues.push('Có lệnh Toán thiếu dấu \\ trước tên lệnh');
  return [...new Set(issues)];
}
async function smartParseVisionWithAI(file,opts={},onProgress){
  const vision=await extractVisionImagesFromFile(file,opts,onProgress);

  const header=`Nguồn: ${file.name}\nChủ đề mặc định: ${topicName(opts.topicId||4)}\nMức độ mặc định: ${opts.level||'AI Vision'}\nChuẩn CT 2018 mặc định: ${opts.standard2018||''}\nSố trang gửi: ${vision.pages.length}/${vision.totalPages}${vision.truncated?' (đã giới hạn để tránh quá tải)':''}\n\nHãy đọc trực tiếp các ảnh trang đề Toán. Ưu tiên độ chính xác công thức LaTeX hơn tốc độ. Trả về JSON đúng schema {"questions":[...]} hoặc mảng JSON câu hỏi.`;
  if(onProgress)onProgress(`AI Vision: đang gửi ${vision.pages.length} trang ảnh cho AI...`);
  const provider=(opts.provider||'gemini').toLowerCase();
  if(opts.apiKey && provider==='gemini'){
    const parts=[{text:smartImportSystemPrompt()+'\n\n'+header},...vision.pages.map(p=>({inlineData:dataUrlToGeminiInlineData(p.dataUrl)}))];
    const arr=await callGeminiGenerateContent({apiKey:opts.apiKey,model:opts.model||SMART_IMPORT_VISION_DEFAULT_MODEL,systemText:smartImportSystemPrompt(),userParts:parts,responseSchema:smartQuestionJsonSchema(),temperature:0.03});
    return arr.map((q,i)=>normalizeAIQuestion({...q,hasImage:q.hasImage??true},i,{...opts,source:file.name,sourceTag:'gemini-vision'}));

  if(opts.apiKey && provider==='openai'){

async function extractTextFromImageFile(file,onProgress,autoMath=true){
  if(!window.Tesseract)throw new Error('Chưa tải được Tesseract.js để OCR ảnh.');
  const result=await Tesseract.recognize(file,'vie+eng',{logger:m=>{if(onProgress&&m.status)onProgress(`OCR ảnh: ${m.status} ${m.progress?Math.round(m.progress*100)+'%':''}`)}});
  return cleanPdfTextForMathPro(result?.data?.text||'',autoMath);
}
async function extractSmartImportFile(file,opts,onProgress){
  const name=String(file?.name||'').toLowerCase();
  if(name.endsWith('.pdf')||file.type==='application/pdf') return await extractPDFSmart(file,opts.mode||'auto',onProgress,opts.autoMath!==false);
  if(name.endsWith('.docx')){const r=await extractTextFromWordFile(file,opts.autoMath!==false);return r.text;}
  if(file.type?.startsWith('image/')||/\.(png|jpg|jpeg|webp)$/i.test(name)) return await extractTextFromImageFile(file,onProgress,opts.autoMath!==false);
  if(name.endsWith('.txt')) return await file.text();
  throw new Error('Định dạng hỗ trợ: PDF, DOCX, ảnh PNG/JPG/WEBP hoặc TXT.');
}

        const rescue=await smartImportTextRescue(file,opts,msg=>{if(progress)progress.textContent=msg;});
        raw=rescue.raw; items=rescue.items;
      }
    }else{
      raw=await extractSmartImportFile(file,opts,msg=>{if(progress)progress.textContent=msg;});
      if(progress)progress.textContent='Đã trích xuất '+raw.length.toLocaleString('vi-VN')+' ký tự. Đang tách câu...';
      if(opts.useAI){
        try{items=await smartParseWithAI(raw,{...opts,source:file.name}); aiLog.push('AI Text thành công');}
        catch(aiErr){aiLog.push('AI Text lỗi: '+(aiErr?.message||aiErr)); items=[];}
      }
      if(!smartImportGoodCount(items)) items=localParseSmart(raw,{...opts,source:file.name});
    }
    // Nếu Vision trả quá ít câu hoặc toàn lỗi, tự cứu bằng OCR/Text để tránh màn hình “Chưa tách được câu”.
    if(isVisionFile && (!items.length || smartImportGoodCount(items)===0)){
      const rescue=await smartImportTextRescue(file,opts,msg=>{if(progress)progress.textContent=msg;});
      if(smartImportGoodCount(rescue.items)>smartImportGoodCount(items)){raw=rescue.raw; items=rescue.items; aiLog.push('Đã dùng chế độ cứu Text/OCR');}
    }
    window.smartImportRawText=raw;
    items=smartFilterByScope(items,opts.parseScope||'full');
    window.smartImportItems=applyMathDiagnosticsToItems(rvValidate(items));
    if(box){
      const logHTML=aiLog.length?`<div class="mb-3 p-3 rounded-2xl bg-blue-50 text-blue-700 text-xs"><b>Nhật ký AI:</b> ${safe(aiLog.join(' • '))}</div>`:'';
      box.innerHTML=logHTML+smartQualityPanelHTML(window.smartImportItems)+smartMathReportHTML(window.smartImportItems)+smartPreviewHTML(window.smartImportItems,raw);
    }
    typeset();
    if(progress)progress.textContent=`Hoàn tất: ${window.smartImportItems.length} câu, ${window.smartImportItems.filter(x=>x._errors?.length).length} câu cần sửa.`;
    if(!window.smartImportItems.length) toast('Chưa tách được câu. Thầy kiểm tra lại API key hoặc thử chọn PDF tự động/OCR.', 'bad');
  }catch(err){if(box)box.innerHTML=smartPreviewHTML([],window.smartImportRawText||''); if(progress)progress.textContent=''; toast('Không import được file: '+(err?.message||err),'bad');}
}

async function saveExamEditor(id){
  const docId=String(id||uid());
  const mode=$('edExamMode')?.value||'normal';
  const isPdf=mode==='pdf_exam';
  let pdfUrl=($('edPdfUrl')?.value||'').trim();
  try{
    if(isPdf && $('edPdfFile')?.files?.[0]){
      toast('Đang upload file PDF lên Firebase Storage...','info');
      pdfUrl=await uploadPdfExamFile($('edPdfFile').files[0]);
    }
  }catch(err){return toast('Upload PDF chưa thành công: '+(err?.message||err),'bad');}
  const answerKey=isPdf?parsePdfAnswerKey($('edPdfAnswerKey')?.value||''):[];
  const pdfCount=isPdf?Number($('edPdfQuestionCount')?.value||answerKey.length||0):0;
  const data={id:docId,title:$('edTitle').value.trim(),topicId:$('edTopic').value,duration:Number($('edDuration').value||60),level:$('edLevel').value,description:$('edDesc').value,classIds:selectedClassIdsFromEditor(),startTime:readDateInputValue('edStartTime'),endTime:readDateInputValue('edEndTime'),maxAttempts:Number($('edMaxAttempts')?.value||0),isPublished:($('edPublished')?.value!=='false'),updatedAt:new Date().toISOString()};
  if(isPdf){
    Object.assign(data,{type:'pdf_exam',examType:'pdf_exam',pdfUrl,answerKey,answerKeyText:answerKey.join(' '),pdfQuestionCount:pdfCount,questionCount:pdfCount,questions:[],usesQuestionBank:false});
  }else{
    Object.assign(data,{type:'normal',questions:window.editorQ||[],questionCount:(window.editorQ||[]).length,usesQuestionBank:true});
  }
  if(!data.title)return toast('Cần nhập tên đề','bad');
  if(isPdf && !data.pdfUrl)return toast('Đề PDF cần có file PDF hoặc link PDF','bad');
  if(isPdf && (!data.pdfQuestionCount||!answerKey.length))return toast('Đề PDF cần nhập số câu và đáp án','bad');
  if(!isPdf && !data.questions.length)return toast('Cần nhập ít nhất 1 câu hỏi','bad');
  if(data.startTime&&data.endTime&&new Date(data.startTime)>=new Date(data.endTime))return toast('Thời gian đóng đề phải sau thời gian mở đề','bad');
  if(id){const idx=exams.findIndex(e=>String(e.id)==String(id)); if(idx>=0)data.createdAt=exams[idx].createdAt||data.updatedAt,exams[idx]=data}else {data.createdAt=new Date().toISOString(); exams.unshift(data);}
  save();

function showSecurityRules(){

  const rules=`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function signedIn(){ return request.auth != null; }
    function isTeacher(){ return signedIn() && get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'teacher'; }

    match /users/{userId} {
      allow read: if signedIn() && (request.auth.uid == userId || isTeacher());
      allow create: if signedIn() && request.auth.uid == userId;
      allow update: if signedIn() && (request.auth.uid == userId || isTeacher());
    }

    match /questionBanks/{questionId} {
      allow read: if signedIn();
      allow create, update, delete: if isTeacher();
    }

    match /exams/{examId} {
      allow read: if true;
      allow create, update, delete: if isTeacher();
    }

    match /examQuestions/{id} {
      allow read: if signedIn();
      allow create, update, delete: if isTeacher();
    }

    match /examResults/{resultId} {
      allow create: if signedIn() && request.resource.data.studentId == request.auth.uid;
      allow read: if signedIn() && (resource.data.studentId == request.auth.uid || isTeacher());
      allow update, delete: if isTeacher();
    }
  }
}`;

function studentSubmissions(studentId){return submissions.filter(s=>String(s.studentId)===String(studentId));}
function studentAverage(studentId){const arr=studentSubmissions(studentId);return arr.length?Math.round(arr.reduce((sum,s)=>sum+(Number(s.percent)||0),0)/arr.length):0;}
function studentLastSubmit(studentId){const arr=studentSubmissions(studentId);return arr[0]||null;}
function classStudents(className){return users.filter(u=>u.role==='student' && String(u.className||'Chưa phân lớp')===String(className));}
function classAverage(className){const ids=classStudents(className).map(u=>String(u.id));const arr=submissions.filter(s=>ids.includes(String(s.studentId)));return arr.length?Math.round(arr.reduce((sum,s)=>sum+(Number(s.percent)||0),0)/arr.length):0;}
function studentWeakTopics(studentId){
  const wrong={};
  studentSubmissions(studentId).forEach(sub=>{
    const ex=exams.find(e=>String(e.id)===String(sub.examId));
    (sub.details||[]).forEach(d=>{
      if(d.ok) return;
      const q=(ex?.questions||[]).find(x=>String(x.id)===String(d.qid));
      const name=topicName(q?.topicId||ex?.topicId||8);
      wrong[name]=(wrong[name]||0)+1;
    });
  });
  return Object.entries(wrong).sort((a,b)=>b[1]-a[1]).slice(0,4);
}
async function refreshUsersFromFirestore(){
  if(!firebaseReady) return false;
  try{
    const snap=await db.collection('users').get();
    const remote=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(remote.length){
      const byId={}; users.forEach(u=>byId[String(u.id)]=u); remote.forEach(u=>byId[String(u.id)]={...byId[String(u.id)],...u,id:String(u.id)});
      users=Object.values(byId);
      const cls=new Set(classes);
      users.filter(u=>u.role==='student').forEach(u=>cls.add(u.className||'Chưa phân lớp'));
      classes=[...cls].filter(Boolean);
      save(); return true;
    }
  }catch(err){console.warn('Không tải được danh sách users từ Firestore:',err)}
  return false;
}

function applyStudentFilters(){
  let list=users.filter(u=>u.role==='student');
  const q=norm($('studentSearch')?.value||''), cls=$('studentClassFilter')?.value||'all', sort=$('studentSortFilter')?.value||'name';
  if(q) list=list.filter(u=>norm((u.fullname||'')+' '+(u.email||u.username||'')+' '+(u.className||'')).includes(q));
  if(cls!=='all') list=list.filter(u=>String(u.className||'Chưa phân lớp')===String(cls));
  if(sort==='avgDesc') list.sort((a,b)=>studentAverage(b.id)-studentAverage(a.id));
  else if(sort==='avgAsc') list.sort((a,b)=>studentAverage(a.id)-studentAverage(b.id));
  else if(sort==='recent') list.sort((a,b)=>(studentLastSubmit(b.id)?new Date(studentLastSubmit(b.id).createdAt||studentLastSubmit(b.id).date||0).getTime():0)-(studentLastSubmit(a.id)?new Date(studentLastSubmit(a.id).createdAt||studentLastSubmit(a.id).date||0).getTime():0));
  else list.sort((a,b)=>String(a.fullname||a.email||'').localeCompare(String(b.fullname||b.email||''),'vi'));
  const body=$('studentTableBody'); if(body) body.innerHTML=buildStudentRows(list);
}

let analyticsState={className:'all',examId:'all',from:'',to:'',mode:'overview'};
function pct(n){return Math.max(0,Math.min(100,Math.round(Number(n)||0)));}
function parseVNDateTime(v){
  if(!v)return null;
  if(v && typeof v.toDate==='function') return v.toDate();
  if(typeof v==='number') return new Date(v);
  const s=String(v);
  const iso=new Date(s); if(!isNaN(iso.getTime())) return iso;
  const m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})(?:,?\s*(\d{1,2}):(\d{2})(?::(\d{2}))?)?/);
  if(m){return new Date(Number(m[3]),Number(m[2])-1,Number(m[1]),Number(m[4]||0),Number(m[5]||0),Number(m[6]||0));}
  return null;
}
function analyticsFilteredSubmissions(){
  let arr=[...submissions];
  const cls=analyticsState.className||'all', examId=analyticsState.examId||'all';
  if(cls!=='all') arr=arr.filter(s=>String(s.className||'Chưa phân lớp')===String(cls));
  if(examId!=='all') arr=arr.filter(s=>String(s.examId)===String(examId));
  if(analyticsState.from){const f=new Date(analyticsState.from+'T00:00:00');arr=arr.filter(s=>{const d=parseVNDateTime(s.createdAt||s.date);return d && d>=f;});}
  if(analyticsState.to){const t=new Date(analyticsState.to+'T23:59:59');arr=arr.filter(s=>{const d=parseVNDateTime(s.createdAt||s.date);return d && d<=t;});}
  return arr;
}
function avgOf(arr,field='percent'){return arr.length?Math.round(arr.reduce((a,b)=>a+(Number(b[field])||0),0)/arr.length):0;}
function analyticsStudentsInScope(){
  let list=users.filter(u=>u.role==='student');
  if((analyticsState.className||'all')!=='all') list=list.filter(u=>String(u.className||'Chưa phân lớp')===String(analyticsState.className));
  return list;
}
function groupBy(arr,keyFn){const m={};arr.forEach(x=>{const k=keyFn(x);(m[k]||(m[k]=[])).push(x)});return m;}
function analyticsCard(title,value,icon,sub='',tone='blue'){
  const toneClass=tone==='red'?'text-red-600':tone==='green'?'text-green-600':tone==='amber'?'text-amber-600':'text-blue-600';
  return `<div class="glass-card p-5"><div class="flex items-start justify-between gap-3"><div><p class="text-sm" style="color:var(--muted)">${title}</p><p class="text-3xl font-black mt-1 ${toneClass}">${value}</p>${sub?`<p class="text-xs mt-1" style="color:var(--muted)">${sub}</p>`:''}</div><div class="w-11 h-11 rounded-2xl bg-blue-50 grid place-items-center ${toneClass}"><i class="fa-solid ${icon}"></i></div></div></div>`;
}
function miniProgressBar(value,label='',right=''){
  value=pct(value);
  return `<div class="mb-3"><div class="flex justify-between gap-2 text-sm"><span class="truncate">${safe(label)}</span><b>${safe(right||value+'%')}</b></div><div class="bar-track mt-1"><div class="bar-fill" style="width:${value}%"></div></div></div>`;
}
function classPerformanceHTML(arr=analyticsFilteredSubmissions()){
  const by=groupBy(arr,s=>s.className||'Chưa phân lớp');
  const rows=Object.entries(by).map(([name,a])=>({name,avg:avgOf(a),count:a.length,warn:a.reduce((s,x)=>s+(Number(x.warnings)||0),0)})).sort((a,b)=>b.avg-a.avg);
  return rows.map(x=>miniProgressBar(x.avg,x.name,`${x.avg}% • ${x.count} lượt`)).join('')||'<p class="text-sm text-slate-500">Chưa có dữ liệu theo lớp.</p>';
}
function examPerformanceHTML(arr=analyticsFilteredSubmissions()){
  const by=groupBy(arr,s=>s.examTitle||'Đề chưa đặt tên');
  const rows=Object.entries(by).map(([name,a])=>({name,avg:avgOf(a),count:a.length,warn:a.reduce((s,x)=>s+(Number(x.warnings)||0),0)})).sort((a,b)=>b.count-a.count).slice(0,8);
  return rows.map(x=>`<div class="p-3 rounded-2xl border bg-white/45 dark:bg-slate-900/35 mb-2"><div class="flex justify-between gap-2"><b class="truncate">${safe(x.name)}</b><span class="mini-badge">${x.count} lượt</span></div>${miniProgressBar(x.avg,'Điểm TB',x.avg+'%')}<p class="text-xs" style="color:var(--muted)">Cảnh báo: ${x.warn}</p></div>`).join('')||'<p class="text-sm text-slate-500">Chưa có dữ liệu theo đề.</p>';
}
function weeklyTrendHTML(arr=analyticsFilteredSubmissions()){
  const points={};
  arr.forEach(s=>{const d=parseVNDateTime(s.createdAt||s.date);if(!d)return;const key=d.toISOString().slice(0,10);(points[key]||(points[key]=[])).push(Number(s.percent)||0);});
  const rows=Object.entries(points).sort((a,b)=>a[0].localeCompare(b[0])).slice(-10).map(([date,vals])=>({date,avg:Math.round(vals.reduce((a,b)=>a+b,0)/vals.length),count:vals.length}));
  if(!rows.length)return '<p class="text-sm text-slate-500">Chưa đủ dữ liệu để vẽ xu hướng.</p>';
  const w=620,h=180,pad=28;
  const coords=rows.map((r,i)=>{const x=pad+(rows.length===1?0:i*(w-2*pad)/(rows.length-1));const y=h-pad-(r.avg*(h-2*pad)/100);return [x,y,r];});
  const poly=coords.map(c=>c[0]+','+c[1]).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" class="w-full h-52"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="currentColor" opacity=".15"/><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="currentColor" opacity=".15"/><polyline points="${poly}" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".82"/>${coords.map(c=>`<circle cx="${c[0]}" cy="${c[1]}" r="5" fill="currentColor"><title>${c[2].date}: ${c[2].avg}% (${c[2].count} lượt)</title></circle>`).join('')}${coords.map(c=>`<text x="${c[0]}" y="${c[1]-10}" text-anchor="middle" font-size="12" fill="currentColor">${c[2].avg}%</text>`).join('')}</svg><div class="grid grid-cols-2 md:grid-cols-5 gap-2 text-xs">${rows.map(r=>`<span class="px-2 py-1 rounded-lg bg-blue-50 text-blue-700 text-center">${safe(r.date.slice(5))}: ${r.avg}%</span>`).join('')}</div>`;
}
function difficultQuestionsHTML(arr=analyticsFilteredSubmissions()){
  const map={};
  arr.forEach(s=>(s.details||[]).forEach(d=>{const k=String(d.qid||'unknown');map[k]=map[k]||{wrong:0,total:0};map[k].total++;if(!d.ok)map[k].wrong++;}));

}
function riskStudentsHTML(arr=analyticsFilteredSubmissions()){

function applyUserFilters(){
  let list=[...users];
  const q=norm($('userSearch')?.value||''), role=$('userRoleFilter')?.value||'all', status=$('userStatusFilter')?.value||'all';
  if(q) list=list.filter(u=>norm((u.fullname||'')+' '+(u.email||u.username||'')+' '+(u.className||'')).includes(q));
  if(role==='teacher') list=list.filter(u=>u.role==='teacher');
  if(role==='student') list=list.filter(u=>u.role!=='teacher');
  if(status==='pendingTeacher') list=list.filter(u=>u.teacherRequest && u.role!=='teacher');
  if(status==='normal') list=list.filter(u=>!(u.teacherRequest && u.role!=='teacher'));
  list.sort((a,b)=>String(a.role||'student').localeCompare(String(b.role||'student')) || String(a.fullname||a.email||'').localeCompare(String(b.fullname||b.email||''),'vi'));
  const body=$('userTableBody'); if(body) body.innerHTML=buildUserRows(list);
}
async function updateUserRole(userId,newRole){
  if(!requireRole('teacher'))return;
  newRole=newRole==='teacher'?'teacher':'student';
  if(String(userId)===String(currentUser?.id) && newRole!=='teacher') return toast('Không thể tự hạ quyền tài khoản đang đăng nhập','bad');
  const u=users.find(x=>String(x.id)===String(userId));
  if(!u) return toast('Không tìm thấy người dùng','bad');
  const ok=confirm(`${newRole==='teacher'?'Cấp quyền giáo viên cho':'Hạ quyền về học sinh cho'} ${u.fullname||u.email}?`);
  if(!ok) return;
  const oldRole=u.role||'student';
  u.role=newRole;
  u.teacherRequest=false;
  if(newRole==='student' && !u.className) u.className='Chưa phân lớp';
  save();
  if(firebaseReady){
    try{await db.collection('users').doc(String(userId)).set({role:newRole,teacherRequest:false,teacherApprovedAt:newRole==='teacher'?firebase.firestore.FieldValue.serverTimestamp():null,className:u.className||'Chưa phân lớp',updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}
    catch(err){toast('Chưa cập nhật được Firestore: '+fbError(err),'bad');}
  }
  await addAuditLog(newRole==='teacher'?(oldRole==='teacher'?'promoteTeacher':'approveTeacher'):'demoteTeacher',u,{oldRole,newRole});
  toast(newRole==='teacher'?'Đã cấp quyền giáo viên':'Đã hạ quyền về học sinh','ok');
  renderUserManager();
}


async function rejectTeacherRequest(userId){
  if(!requireRole('teacher'))return;
  const u=users.find(x=>String(x.id)===String(userId));
  if(!u) return toast('Không tìm thấy người dùng','bad');
  if(!confirm(`Từ chối yêu cầu giáo viên của ${u.fullname||u.email}?`)) return;
  u.teacherRequest=false;
  save();
  if(firebaseReady){
    try{await db.collection('users').doc(String(userId)).set({teacherRequest:false,teacherRejectedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}
    catch(err){toast('Chưa cập nhật được Firestore: '+fbError(err),'bad');}
  }
  await addAuditLog('rejectTeacher',u,{});
  toast('Đã từ chối yêu cầu giáo viên','ok');
  renderUserManager();
}
async function approveAllTeacherRequests(){
  if(!requireRole('teacher'))return;
  const list=teacherPendingUsers();
  if(!list.length) return toast('Không có tài khoản chờ duyệt','info');
  if(!confirm(`Duyệt ${list.length} tài khoản thành giáo viên?`)) return;
  for(const u of list){
    u.role='teacher'; u.teacherRequest=false;
    if(firebaseReady){
      try{await db.collection('users').doc(String(u.id)).set({role:'teacher',teacherRequest:false,teacherApprovedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}
      catch(err){console.warn(err)}
    }
    await addAuditLog('approveTeacher',u,{bulk:true});
  }
  save();
  toast('Đã duyệt tất cả tài khoản giáo viên','ok');
  renderUserManager();
}


/* ===== Bước 5: Công cụ vận hành production - kiểm tra dữ liệu, sao lưu, phục hồi ===== */
function dataQualityReport(){
  const issues=[];
  const userIds=new Set(users.map(u=>String(u.id)));
  const examIds=new Set(exams.map(e=>String(e.id)));
  const qIds=new Set(questionBank.map(q=>String(q.id)));
  users.forEach(u=>{
    if(!u.fullname && !u.email && !u.username) issues.push({level:'warn',group:'users',msg:'Có tài khoản thiếu họ tên/email',ref:String(u.id)});
    if(u.role==='student' && !u.className) issues.push({level:'warn',group:'users',msg:'Học sinh chưa phân lớp',ref:u.fullname||u.email||u.id});
    if(!['student','teacher'].includes(String(u.role))) issues.push({level:'bad',group:'users',msg:'Vai trò người dùng không hợp lệ',ref:u.fullname||u.email||u.id});
  });
  exams.forEach(e=>{
    if(!e.title) issues.push({level:'bad',group:'exams',msg:'Đề thi thiếu tiêu đề',ref:String(e.id)});
    if(!Array.isArray(e.questions) && !Array.isArray(e.questionIds)) issues.push({level:'bad',group:'exams',msg:'Đề chưa có danh sách câu hỏi',ref:e.title||e.id});
    const count=(e.questions||[]).length || (e.questionIds||[]).length || Number(e.questionCount||0);
    if(!count) issues.push({level:'warn',group:'exams',msg:'Đề chưa có câu hỏi',ref:e.title||e.id});
    if(Number(e.duration||0)<=0) issues.push({level:'warn',group:'exams',msg:'Đề chưa đặt thời gian làm bài',ref:e.title||e.id});
  });
  questionBank.forEach(q=>{
    if(!q.text) issues.push({level:'bad',group:'questionBank',msg:'Câu hỏi thiếu nội dung',ref:String(q.id)});
    if(!['mc','tf','short'].includes(String(q.type))) issues.push({level:'bad',group:'questionBank',msg:'Loại câu hỏi không hợp lệ',ref:String(q.id)});
    if(q.type==='mc' && (!Array.isArray(q.options)||q.options.length<2)) issues.push({level:'bad',group:'questionBank',msg:'Câu trắc nghiệm thiếu phương án',ref:String(q.id)});
    if(q.type==='tf' && (!Array.isArray(q.statements)||q.statements.length<2)) issues.push({level:'bad',group:'questionBank',msg:'Câu đúng/sai thiếu mệnh đề',ref:String(q.id)});
  });
  submissions.forEach(s=>{
    if(s.studentId && !userIds.has(String(s.studentId))) issues.push({level:'warn',group:'submissions',msg:'Bài làm có học sinh không còn trong danh sách local',ref:s.studentName||s.studentId});
    if(s.examId && !examIds.has(String(s.examId))) issues.push({level:'warn',group:'submissions',msg:'Bài làm thuộc đề không còn trong danh sách local',ref:s.examTitle||s.examId});
  });
  return issues;
}

function buildBackupObject(){
  return {version:'MathPro12-step5',exportedAt:new Date().toISOString(),users,exams,submissions,questionBank,classes,auditLogs,meta:{totalUsers:users.length,totalExams:exams.length,totalResults:submissions.length,totalQuestions:questionBank.length}};
}
function exportBackupJSON(){
  if(!adminDangerGuard())return;
  const data=JSON.stringify(buildBackupObject(),null,2);
  const blob=new Blob([data],{type:'application/json;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='mathpro12-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Đã xuất file sao lưu JSON','ok');

function importBackupJSON(input){
  if(!adminDangerGuard())return;
  const file=input.files&&input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data || !Array.isArray(data.exams)) throw new Error('File sao lưu không đúng cấu trúc');
      if(!confirm('Phục hồi dữ liệu từ file này sẽ ghi đè dữ liệu local hiện tại. Tiếp tục?')) return;
      users=Array.isArray(data.users)?data.users:users;
      exams=Array.isArray(data.exams)?data.exams:exams;
      submissions=Array.isArray(data.submissions)?data.submissions:submissions;
      questionBank=Array.isArray(data.questionBank)?data.questionBank:questionBank;
      classes=Array.isArray(data.classes)?data.classes:classes;
      auditLogs=Array.isArray(data.auditLogs)?data.auditLogs:auditLogs;
      save();
      toast('Đã phục hồi dữ liệu local từ file sao lưu','ok');
      renderDataTools();
    }catch(err){toast('Không đọc được file sao lưu: '+(err.message||err),'bad');}
  };
  reader.readAsText(file);
}
async function syncLocalDataToFirestore(){
  if(!adminDangerGuard())return;
  if(!firebaseReady) return toast('Firebase chưa sẵn sàng','bad');
  if(!confirm('Đồng bộ đề thi, kho câu hỏi, lớp học và hồ sơ người dùng local lên Firestore?')) return;
  try{
    for(const u of users){ if(u.id) await db.collection('users').doc(String(u.id)).set({...u,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); }
    for(const e of exams){ await db.collection('exams').doc(String(e.id)).set({...e,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); await syncExamStructureToFirestore(e); }
    for(const c of classes){ await db.collection('classes').doc(String(c)).set({name:String(c),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); }
    toast('Đã đồng bộ dữ liệu local lên Firestore','ok');
    renderDataTools();
  }catch(err){toast('Đồng bộ thất bại: '+fbError(err),'bad');}
}

  $('mainView').innerHTML=`<div class="fade-in"><div class="flex flex-wrap justify-between items-center gap-3 mb-5"><div><span class="mini-badge"><i class="fa-solid fa-screwdriver-wrench"></i> Bước 5</span><h2 class="text-3xl font-black mt-2">Công cụ vận hành dữ liệu</h2><p style="color:var(--muted)">Sao lưu, phục hồi, kiểm tra lỗi dữ liệu và đồng bộ Firestore.</p></div><button onclick="renderTeacherDashboard()" class="btn-soft px-4 py-2 rounded-2xl font-bold">Quay lại dashboard</button></div><section class="grid md:grid-cols-4 gap-4 mb-5">${analyticsCard('Người dùng',users.length,'fa-users')}${analyticsCard('Đề thi',exams.length,'fa-file-lines')}${analyticsCard('Câu hỏi',questionBank.length,'fa-database')}${analyticsCard('Bài làm',submissions.length,'fa-chart-simple')}</section><section class="grid lg:grid-cols-3 gap-5 mb-5"><div class="glass-card p-5"><h3 class="font-black text-xl mb-3">Sao lưu dữ liệu</h3><p class="text-sm mb-4" style="color:var(--muted)">Xuất toàn bộ dữ liệu local ra file JSON để lưu trữ an toàn.</p><button onclick="exportBackupJSON()" class="btn-primary text-white px-4 py-3 rounded-2xl font-bold w-full"><i class="fa-solid fa-download"></i> Xuất backup JSON</button></div><div class="glass-card p-5"><h3 class="font-black text-xl mb-3">Phục hồi dữ liệu</h3><p class="text-sm mb-4" style="color:var(--muted)">Chọn file backup JSON đã xuất từ hệ thống MathPro 12.</p><input type="file" accept="application/json,.json" onchange="importBackupJSON(this)" class="w-full px-4 py-3 rounded-2xl border bg-white"></div><div class="glass-card p-5"><h3 class="font-black text-xl mb-3">Đồng bộ Firestore</h3><p class="text-sm mb-4" style="color:var(--muted)">Đẩy dữ liệu local quan trọng lên Firestore, phù hợp khi thầy nhập dữ liệu offline trước.</p><button onclick="syncLocalDataToFirestore()" class="bg-emerald-600 text-white px-4 py-3 rounded-2xl font-bold w-full"><i class="fa-solid fa-cloud-arrow-up"></i> Đồng bộ lên Firestore</button></div></section><section class="glass-card p-5"><h3 class="font-black text-xl mb-3">Bảng kiểm tra lỗi dữ liệu</h3><div class="overflow-x-auto"><table class="w-full text-sm"><thead><tr class="text-left border-b"><th class="p-3">Mức</th><th class="p-3">Nhóm</th><th class="p-3">Nội dung</th><th class="p-3">Đối tượng</th></tr></thead><tbody>${issueRows}</tbody></table></div></section></div>`;

/* =======================

======================= */
function studentInterventionProfile(u, arr=analyticsFilteredSubmissions()){
  const sid=String(u.id||'');
  const a=arr.filter(s=>String(s.studentId||'')===sid);
  const avg=a.length?avgOf(a):0;
  const warnings=a.reduce((sum,x)=>sum+(Number(x.warnings)||0),0);
  let level='Chưa làm bài', tone='slate', action='Giao đề chẩn đoán 15 phút để lấy dữ liệu ban đầu.';
  if(a.length && avg<50){level='Cần kèm gấp'; tone='red'; action='Giao 1 đề nền tảng, xem lại câu sai và hẹn chữa bài.';}
  else if(a.length && avg<70){level='Cần theo dõi'; tone='amber'; action='Giao thêm bài cùng chủ đề sai nhiều, kiểm tra lại sau 2–3 ngày.';}
  else if(a.length && warnings>=3){level='Cần xác minh'; tone='amber'; action='Kiểm tra lại phiên thi vì có nhiều cảnh báo gian lận.';}
  else if(a.length){level='Ổn định'; tone='green'; action='Giao đề vận dụng hoặc đề tổng hợp để nâng mức.';}
  return {student:u, attempts:a.length, avg, warnings, level, tone, action, last:a[0]||null};
}
function toneBadge(text,tone='blue'){
  const cls=tone==='red'?'bg-red-100 text-red-700':tone==='amber'?'bg-amber-100 text-amber-700':tone==='green'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-600';
  return '<span class="px-2 py-1 rounded-full text-xs font-bold '+cls+'">'+safe(text)+'</span>';
}
function interventionCenterHTML(){
  const arr=analyticsFilteredSubmissions();
  const students=analyticsStudentsInScope();

}

    const okQ=!q||hay.includes(q);
    const okTopic=st.topic==='all'||String(e.topicId)===String(st.topic);
    const okClass=st.cls==='all'||(st.cls==='none'?!(e.classIds||[]).length:(e.classIds||[]).includes(st.cls));
    let okStatus=true;
    if(st.status==='published') okStatus=e.isPublished!==false;
    if(st.status==='draft') okStatus=e.isPublished===false;
    if(st.status==='open') okStatus=e.isPublished!==false && (!e.startTime||Date.now()>=new Date(e.startTime).getTime()) && (!e.endTime||Date.now()<=new Date(e.endTime).getTime());

  });

async function toggleExamPublished(id){
  if(!requireRole('teacher'))return;
  const idx=exams.findIndex(e=>String(e.id)===String(id));
  if(idx<0)return;
  exams[idx]=normalizeExamAccess(exams[idx]);
  exams[idx].isPublished=exams[idx].isPublished===false;
  exams[idx].updatedAt=new Date().toISOString();
  save();
  if(firebaseReady){try{await db.collection('exams').doc(String(id)).set({isPublished:exams[idx].isPublished,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(err){toast('Đã đổi local, chưa đồng bộ Firestore: '+fbError(err),'bad')}}
  renderTeacherDashboard();toast(exams[idx].isPublished?'Đã xuất bản đề':'Đã chuyển đề về nháp','ok');
}
async function duplicateExam(id){
  if(!requireRole('teacher'))return;
  const src=exams.find(e=>String(e.id)===String(id)); if(!src)return;
  const docId=String(uid());
  const copy=JSON.parse(JSON.stringify(normalizeExamAccess(src)));
  copy.id=docId; copy.title='Bản sao - '+(copy.title||'Đề thi'); copy.isPublished=false; copy.createdAt=new Date().toISOString(); copy.updatedAt=new Date().toISOString();
  exams.unshift(copy); save();
  try{
    if(firebaseReady){await db.collection('exams').doc(docId).set({...copy,createdBy:currentUser?.id||null,questionCount:(copy.questions||[]).length,usesQuestionBank:true,createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); await syncExamStructureToFirestore(copy);}
  }catch(err){toast('Đã nhân bản local, chưa đồng bộ Firestore: '+fbError(err),'bad')}
  renderTeacherDashboard();toast('Đã nhân bản đề ở trạng thái nháp','ok');
}

let achievementState={className:'all',examId:'all',range:'all'};
function achDate(s){return parseVNDateTime(s?.createdAt||s?.submittedAt||s?.date)||new Date(0)}
function achScopedSubmissions(){
  let arr=[...submissions].sort((a,b)=>achDate(b)-achDate(a));
  if(!isTeacherUser(currentUser) && currentUser?.role==='student') arr=arr.filter(s=>String(s.studentId)===String(currentUser.id));
  if(isTeacherUser(currentUser) && !isAdminUser(currentUser)){
    const cls=teacherClassNames();
    if(cls.length) arr=arr.filter(s=>cls.includes(String(s.className||'')) || scopedStudents().some(u=>String(u.id)===String(s.studentId)));
  }
  if(achievementState.className!=='all') arr=arr.filter(s=>String(s.className||'Chưa phân lớp')===String(achievementState.className));
  if(achievementState.examId!=='all') arr=arr.filter(s=>String(s.examId)===String(achievementState.examId));
  if(achievementState.range!=='all'){const days=Number(achievementState.range||0);const from=Date.now()-days*86400000;arr=arr.filter(s=>achDate(s).getTime()>=from);}
  return arr;
}
function achStudentName(id,fallback='Học sinh'){const u=users.find(x=>String(x.id)===String(id));return u?.fullname||u?.email||fallback;}
function achStudentClass(id,fallback='Chưa phân lớp'){const u=users.find(x=>String(x.id)===String(id));return u?.className||fallback;}
function achStudentRows(arr=achScopedSubmissions()){
  const by=groupBy(arr,s=>String(s.studentId||s.studentEmail||s.studentName||'unknown'));
  return Object.entries(by).map(([id,list])=>{const best=Math.max(...list.map(s=>Number(s.percent)||0));const avg=avgOf(list);const total=list.length;const full=list.filter(s=>Number(s.percent)>=100).length;const warn=list.reduce((t,s)=>t+(Number(s.warnings)||0),0);const latest=list.slice().sort((a,b)=>achDate(b)-achDate(a))[0]||{};const power=Math.max(0,Math.round(avg*.55+best*.30+Math.min(total,20)*.75-Math.min(warn,10)*1.5));return {id,name:achStudentName(id,latest.studentName||'Học sinh'),className:achStudentClass(id,latest.className||'Chưa phân lớp'),avg,best,total,full,warn,latest,power};}).sort((a,b)=>b.power-a.power||b.best-a.best||b.total-a.total);
}

function achievementBadgesHTML(rows,mine){const rank=rows.findIndex(r=>String(r.id)===String(mine?.id))+1;const badges=[{ok:rank===1,icon:'fa-crown',title:'Thủ khoa bảng',sub:'Đứng hạng 1 trong bộ lọc hiện tại'},{ok:rank>0&&rank<=3,icon:'fa-medal',title:'Top 3 nổi bật',sub:'Có mặt trong 3 vị trí đầu'},{ok:(mine?.best||0)>=100,icon:'fa-bullseye',title:'Tuyệt đối 100%',sub:'Có ít nhất một bài đạt 100%'},{ok:(mine?.total||0)>=10,icon:'fa-fire',title:'Chăm chỉ 10+',sub:'Hoàn thành từ 10 lượt thi'},{ok:(mine?.avg||0)>=80,icon:'fa-chart-line',title:'Phong độ cao',sub:'Điểm trung bình từ 80%'},{ok:(mine?.warn||0)===0&&(mine?.total||0)>0,icon:'fa-shield-halved',title:'Thi nghiêm túc',sub:'Không có cảnh báo trong các lượt làm'}];return badges.map(b=>'<div class="achievement-badge '+(b.ok?'':'locked')+'"><div class="badge-icon"><i class="fa-solid '+b.icon+'"></i></div><div><b>'+safe(b.title)+'</b><p class="text-xs mt-1" style="color:var(--muted)">'+safe(b.sub)+'</p></div></div>').join('');}
function achievementTrendSVG(arr=achScopedSubmissions()){const points={};arr.forEach(s=>{const d=achDate(s);if(d.getTime()<=0)return;const k=d.toISOString().slice(0,10);(points[k]||(points[k]=[])).push(Number(s.percent)||0);});const rows=Object.entries(points).sort((a,b)=>a[0].localeCompare(b[0])).slice(-12).map(([date,vals])=>({date,avg:Math.round(vals.reduce((x,y)=>x+y,0)/vals.length),count:vals.length}));if(!rows.length)return '<p class="text-sm text-slate-500">Chưa có dữ liệu xu hướng.</p>';const w=680,h=210,pad=32;const coords=rows.map((r,i)=>{const x=pad+(rows.length===1?0:i*(w-2*pad)/(rows.length-1));const y=h-pad-r.avg*(h-2*pad)/100;return [x,y,r];});const poly=coords.map(c=>c[0]+','+c[1]).join(' ');return '<svg viewBox="0 0 '+w+' '+h+'" class="w-full h-56 text-blue-600"><line x1="'+pad+'" y1="'+(h-pad)+'" x2="'+(w-pad)+'" y2="'+(h-pad)+'" stroke="currentColor" opacity=".16"/><line x1="'+pad+'" y1="'+pad+'" x2="'+pad+'" y2="'+(h-pad)+'" stroke="currentColor" opacity=".16"/><polyline points="'+poly+'" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity=".88"/>'+coords.map(c=>'<circle cx="'+c[0]+'" cy="'+c[1]+'" r="6" fill="currentColor"><title>'+c[2].date+': '+c[2].avg+'%</title></circle>').join('')+coords.map(c=>'<text x="'+c[0]+'" y="'+(c[1]-12)+'" text-anchor="middle" font-size="12" font-weight="900" fill="currentColor">'+c[2].avg+'</text>').join('')+'</svg><div class="grid grid-cols-2 md:grid-cols-6 gap-2 text-xs">'+rows.map(r=>'<span class="px-2 py-1 rounded-lg bg-blue-50 text-blue-700 text-center">'+safe(r.date.slice(5))+': '+r.avg+'%</span>').join('')+'</div>';}
function achievementExamBreakdownHTML(arr=achScopedSubmissions()){const by=groupBy(arr,s=>s.examTitle||'Đề chưa đặt tên');const rows=Object.entries(by).map(([name,a])=>({name,count:a.length,avg:avgOf(a),best:Math.max(...a.map(s=>Number(s.percent)||0))})).sort((a,b)=>b.avg-a.avg||b.count-a.count).slice(0,8);return rows.map(r=>'<div class="p-3 rounded-2xl border bg-white/50 mb-2"><div class="flex justify-between gap-2"><b class="truncate">'+safe(r.name)+'</b><span class="mini-badge">'+r.count+' lượt</span></div>'+miniProgressBar(r.avg,'Điểm trung bình',r.avg+'%')+'<p class="text-xs" style="color:var(--muted)">Điểm cao nhất: '+r.best+'%</p></div>').join('')||'<p class="text-sm text-slate-500">Chưa có dữ liệu theo đề.</p>'; }
function achievementInsightHTML(rows,arr){const avg=avgOf(arr),count=arr.length,top=rows[0],risk=rows.filter(r=>r.total>0&&r.avg<50).length;const msg=count?'Điểm trung bình hiện tại là '+avg+'%. '+(top?'Học sinh nổi bật nhất là '+top.name+' với '+top.power+' điểm vinh danh. ':'')+(risk?'Có '+risk+' học sinh cần được hỗ trợ thêm.':'Phong độ chung đang ổn định.'):'Chưa có dữ liệu, cần học sinh làm bài để kích hoạt bảng thành tích.';return '<div class="p-4 rounded-2xl bg-blue-50/80 border border-blue-100 text-blue-900"><b><i class="fa-solid fa-wand-magic-sparkles"></i> Nhận xét nhanh</b><p class="mt-1 text-sm">'+safe(msg)+'</p></div>';}
function achievementFiltersHTML(){return '<div class="glass-card p-4 mb-5"><div class="achievement-filter"><select id="achClass" class="exam-admin-input"><option value="all">Tất cả lớp</option>'+classes.map(c=>'<option value="'+safe(c)+'" '+(achievementState.className===c?'selected':'')+'>'+safe(c)+'</option>').join('')+'</select><select id="achExam" class="exam-admin-input"><option value="all">Tất cả đề</option>'+exams.map(e=>'<option value="'+safe(e.id)+'" '+(String(achievementState.examId)===String(e.id)?'selected':'')+'>'+safe(e.title)+'</option>').join('')+'</select><select id="achRange" class="exam-admin-input"><option value="all" '+(achievementState.range==='all'?'selected':'')+'>Toàn thời gian</option><option value="7" '+(achievementState.range==='7'?'selected':'')+'>7 ngày gần đây</option><option value="30" '+(achievementState.range==='30'?'selected':'')+'>30 ngày gần đây</option><option value="90" '+(achievementState.range==='90'?'selected':'')+'>90 ngày gần đây</option></select><button onclick="applyAchievementFilters()" class="btn-primary text-white px-4 py-3 rounded-2xl font-bold"><i class="fa-solid fa-filter"></i> Lọc thành tích</button></div></div>';}

seye','Đạt 100%',perfect?'green':'blue')+'</section><section class="grid xl:grid-cols-[1fr_.9fr] gap-5"><div class="glass-card p-5"><h3 class="text-2xl font-black mb-1"><i class="fa-solid fa-ranking-star text-blue-600"></i> Bảng xếp hạng nổi bật</h3><p class="text-sm mb-4" style="color:var(--muted)">Tính theo điểm trung bình, điểm cao nhất, số lượt làm và cảnh báo.</p><div class="space-y-3">'+achievementLeaderboardHTML(rows)+'</div></div><div class="space-y-5"><div class="glass-card p-5"><h3 class="text-xl font-black mb-3"><i class="fa-solid fa-user-graduate text-blue-600"></i> Hồ sơ thành tích '+(currentUser?.role==='student'?'của em':'top 1')+'</h3>'+(mine?'<div class="grid grid-cols-2 gap-3"><div class="achievement-kpi"><b>'+mine.avg+'%</b><span class="text-sm" style="color:var(--muted)">Điểm TB</span></div><div class="achievement-kpi"><b>'+mine.best+'%</b><span class="text-sm" style="color:var(--muted)">Cao nhất</span></div><div class="achievement-kpi"><b>'+mine.total+'</b><span class="text-sm" style="color:var(--muted)">Lượt làm</span></div><div class="achievement-kpi"><b>'+mine.power+'</b><span class="text-sm" style="color:var(--muted)">Điểm vinh danh</span></div></div>':'<p class="text-sm text-slate-500">Chưa có bài làm.</p>')+'</div><div class="glass-card p-5"><h3 class="text-xl font-black mb-3"><i class="fa-solid fa-medal text-blue-600"></i> Huy hiệu học tập</h3><div class="badge-wall">'+achievementBadgesHTML(rows,mine||{})+'</div></div>'+achievementInsightHTML(rows,arr)+'</div></section><section class="grid xl:grid-cols-[1.1fr_.9fr] gap-5"><div class="glass-card p-5"><h3 class="text-xl font-black mb-3"><i class="fa-solid fa-chart-line text-blue-600"></i> Biểu đồ tiến bộ</h3><div class="achievement-chart">'+achievementTrendSVG(arr)+'</div></div><div class="glass-card p-5"><h3 class="text-xl font-black mb-3"><i class="fa-solid fa-layer-group text-blue-600"></i> Thành tích theo đề</h3>'+achievementExamBreakdownHTML(arr)+'</div></section></div>';typeset();}

function requireRole(role){
  if(!currentUser){showLoginModal();return false}
  if(role==='admin'&&!isAdminUser(currentUser)){toast('Chỉ admin hệ thống mới được truy cập chức năng này','bad');return false}
  if(role==='teacher'&&!isTeacherUser(currentUser)){toast('Tài khoản hiện tại không có quyền giáo viên','bad');return false}
  if(role&&role!=='teacher'&&role!=='admin'&&currentUser.role!==role){toast('Tài khoản hiện tại không có quyền truy cập','bad');return false}
  return true;
}
function teacherClassNames(user=currentUser){
  if(isAdminUser(user)) return [...classes];
  const arr=Array.isArray(user?.classNames)?user.classNames:(user?.className?[user.className]:[]);
  return [...new Set(arr.map(x=>String(x||'').trim()).filter(Boolean))];
}
function isStudentInMyClass(u){return isAdminUser(currentUser)||teacherClassNames().includes(String(u?.className||'Chưa phân lớp'))}
function scopedStudents(){return users.filter(u=>u.role==='student' && isStudentInMyClass(u));}
function scopedSubmissions(){
  if(isAdminUser(currentUser)) return submissions;
  const cls=teacherClassNames();
  return submissions.filter(s=>cls.includes(String(s.className||'')) || scopedStudents().some(u=>String(u.id)===String(s.studentId)));
}
function scopedExams(){
  if(isAdminUser(currentUser)) return exams;
  const me=String(currentUser?.id||currentUser?.email||currentUser?.username||'');
  const cls=teacherClassNames();
  return exams.filter(e=>String(e.createdBy||e.teacherId||'')===me || (Array.isArray(e.classIds)&&e.classIds.some(c=>cls.includes(String(c)))) || !e.createdBy);
}
function scopedQuestions(){
  if(isAdminUser(currentUser)) return questionBank;
  const me=String(currentUser?.id||currentUser?.email||currentUser?.username||'');
  return questionBank.filter(q=>String(q.createdBy||q.teacherId||'')===me || !q.createdBy);
}
function adminOnlyGuard(){ if(!isAdminUser(currentUser)){toast('Chức năng quan trọng này chỉ dành cho admin hệ thống','bad');return false} return true; }

function questionBankDangerAllowed(){return isAdminUser(currentUser);}
function adminDangerGuard(){return adminOnlyGuard();}
function canModifyQuestionBankItem(q={}){
  if(isAdminUser(currentUser)) return true;
  const me=String(currentUser?.id||currentUser?.email||currentUser?.username||'');
  const owner=String(q.createdBy||q.teacherId||'');
  // Giáo viên được sửa câu của mình hoặc câu cũ chưa có chủ sở hữu để đảm bảo tương thích dữ liệu cũ.
  return !!currentUser && currentUser.role==='teacher' && (!owner || owner===me);
}

function normalizeTeacherOwnership(obj={}){
  if(!obj.createdBy) obj.createdBy=currentUser?.id||currentUser?.email||null;
  if(!obj.teacherId) obj.teacherId=currentUser?.id||currentUser?.email||null;
  if(!obj.teacherName) obj.teacherName=currentUser?.fullname||currentUser?.email||'';
  if(!Array.isArray(obj.classIds)||!obj.classIds.length){
    const tc=teacherClassNames(); if(tc.length&&!isAdminUser(currentUser)) obj.classIds=[...tc];
  }
  return obj;
}

// Ghi đè nội dung Firestore Rules theo mô hình admin/teacher/student mới
showSecurityRules=function(){
  if(!adminOnlyGuard())return;
  const rules=`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function signedIn(){ return request.auth != null; }
    function myUser(){ return get(/databases/$(database)/documents/users/$(request.auth.uid)); }
    function myRole(){ return signedIn() && exists(/databases/$(database)/documents/users/$(request.auth.uid)) ? myUser().data.role : 'guest'; }
    function isAdmin(){ return myRole() == 'admin'; }
    function isTeacher(){ return myRole() == 'teacher' || isAdmin(); }
    function isOwner(userId){ return signedIn() && request.auth.uid == userId; }
    function sameTeacher(){ return isTeacher() && (resource.data.createdBy == request.auth.uid || resource.data.teacherId == request.auth.uid || isAdmin()); }
    function sameTeacherNew(){ return isTeacher() && (request.resource.data.createdBy == request.auth.uid || request.resource.data.teacherId == request.auth.uid || isAdmin()); }

    match /users/{userId} {
      allow read: if isOwner(userId) || isTeacher();
      allow create: if isOwner(userId) && request.resource.data.role in ['student','teacher'];
      allow update: if isOwner(userId) || isAdmin();
      allow delete: if isAdmin();
    }

    match /questionBanks/{questionId} {
      allow read: if signedIn();
      allow create: if isTeacher() && sameTeacherNew();
      allow update, delete: if isAdmin() || sameTeacher();
    }

    match /exams/{examId} {
      allow read: if true;
      allow create: if isTeacher() && sameTeacherNew();
      allow update, delete: if isAdmin() || sameTeacher();
    }

    match /examQuestions/{id} {
      allow read: if signedIn();
      allow create: if isTeacher();
      allow update, delete: if isAdmin() || isTeacher();
    }

    match /examSessions/{sessionId} {
      allow create: if signedIn() && request.resource.data.studentId == request.auth.uid;
      allow read: if signedIn() && (resource.data.studentId == request.auth.uid || isTeacher());
      allow update: if signedIn() && (resource.data.studentId == request.auth.uid || isTeacher());
      allow delete: if isAdmin();
    }

    match /examResults/{resultId} {
      allow create: if signedIn() && request.resource.data.studentId == request.auth.uid;
      allow read: if signedIn() && (resource.data.studentId == request.auth.uid || isTeacher());
      allow update, delete: if isAdmin();
    }
  }
}`;
  const m=document.createElement('div');
  m.className='fixed inset-0 bg-black/55 z-50 p-4 overflow-auto fade-in';
  m.innerHTML=`<div class="glass-card max-w-5xl mx-auto p-6"><div class="flex justify-between"><h2 class="text-2xl font-black">Firestore Rules theo mô hình Admin - Giáo viên - Học sinh</h2><button onclick="this.closest('.fixed').remove()" class="text-2xl">&times;</button></div><p class="my-3 text-sm" style="color:var(--muted)">Dán đoạn này vào Firebase Console → Firestore Database → Rules. Admin có quyền toàn hệ thống; giáo viên chỉ tạo/sửa dữ liệu có createdBy/teacherId của mình; học sinh chỉ tạo phiên làm bài và đọc điểm của mình.</p><textarea class="w-full h-[520px] border rounded-2xl p-4 font-mono text-sm">${rules}</textarea></div>`;
  document.body.appendChild(m);
}

function applyUserFilters(){
  let list=[...users];
  const q=norm($('userSearch')?.value||''), role=$('userRoleFilter')?.value||'all', status=$('userStatusFilter')?.value||'all';
  if(q) list=list.filter(u=>norm((u.fullname||'')+' '+(u.email||u.username||'')+' '+(u.className||'')+' '+(u.classNames||[]).join(' ')).includes(q));
  if(role!=='all') list=list.filter(u=>String(u.role||'student')===role);
  if(status==='pendingTeacher') list=list.filter(u=>u.teacherRequest && u.role!=='teacher');
  if(status==='disabled') list=list.filter(u=>u.disabled);
  if(status==='normal') list=list.filter(u=>!u.disabled && !(u.teacherRequest && u.role!=='teacher'));
  list.sort((a,b)=>roleRank(b.role)-roleRank(a.role) || String(a.fullname||a.email||'').localeCompare(String(b.fullname||b.email||''),'vi'));
  const body=$('userTableBody'); if(body) body.innerHTML=isAdminUser(currentUser)?buildUserRowsFull(list):buildUserRows(list);
}

const ADMIN_DASHBOARD_PRO_VERSION='admin-dashboard-pro-2026-04-29';
function adminAllStudents(){return users.filter(u=>String(u.role||'student')==='student' || !(typeof isPrivilegedRole==='function'&&isPrivilegedRole(u.role)));}
function adminRecentSubmissions(limit=8){return analyticsFilteredSubmissions().slice().sort((a,b)=>(parseVNDateTime(b.createdAt||b.submittedAt||b.date)||0)-(parseVNDateTime(a.createdAt||a.submittedAt||a.date)||0)).slice(0,limit);}
function adminDateLabel(){
  const cls=analyticsState.className==='all'?'Tất cả lớp':analyticsState.className;
  const exam=analyticsState.examId==='all'?'Tất cả đề':(exams.find(e=>String(e.id)===String(analyticsState.examId))?.title||'Đề đã chọn');
  const time=(analyticsState.from||analyticsState.to)?`${analyticsState.from||'...'} → ${analyticsState.to||'...'}`:'Toàn thời gian';
  return {cls,exam,time};
}
function adminScopeSubmissions(){return analyticsFilteredSubmissions();}
function adminWeakTopicRows(arr=adminScopeSubmissions()){
  const map={};
  arr.forEach(s=>(s.details||[]).forEach(d=>{
    const name=d.topicName||topicName(d.topicId)||'Chủ đề khác';
    map[name]=map[name]||{name,total:0,wrong:0};
    map[name].total++;
    if(!d.ok) map[name].wrong++;
  }));
  return Object.values(map).map(x=>({...x,rate:x.total?Math.round(x.wrong*100/x.total):0})).sort((a,b)=>b.rate-a.rate||b.wrong-a.wrong);
}
function adminNeedSupportRows(arr=adminScopeSubmissions()){
  const by=groupBy(arr,s=>String(s.studentId||s.studentEmail||s.studentName||''));
  return adminAllStudents().map(u=>{
    const key=String(u.id||u.email||u.username||'');
    const list=by[key]||arr.filter(s=>String(s.studentEmail||'')===String(u.email||u.username||''));
    const avg=avgOf(list), count=list.length, warn=list.reduce((t,s)=>t+(Number(s.warnings)||0),0);
    let level='Chưa làm bài', tone='warn';
    if(count && avg<50){level='Cần can thiệp'; tone='bad';}
    else if(count && avg<70){level='Theo dõi thêm'; tone='warn';}
    else if(count){level='Ổn định'; tone='good';}
    return {u,list,avg,count,warn,level,tone};
  }).filter(x=>x.count===0 || x.avg<70 || x.warn>0).sort((a,b)=>(a.tone==='bad'?-1:a.tone==='warn'?0:1)-(b.tone==='bad'?-1:b.tone==='warn'?0:1)||a.avg-b.avg).slice(0,10);
}

let realtimeExamSessions=[], realtimeExamSessionsUnsub=null, liveMonitorTickTimer=null;

function liveDateValue(v){
  if(!v) return null;
  if(v.toDate) return v.toDate();
  if(v.seconds) return new Date(v.seconds*1000);
  const d=new Date(v);
  return isNaN(d.getTime())?null:d;
}
function liveTimeAgo(v){
  const d=liveDateValue(v); if(!d) return 'chưa rõ';
  const sec=Math.max(0,Math.round((Date.now()-d.getTime())/1000));
  if(sec<60) return sec+' giây trước';
  const min=Math.round(sec/60); if(min<60) return min+' phút trước';
  const h=Math.round(min/60); return h+' giờ trước';
}
function liveRemainText(sec){
  sec=Number(sec||0); if(sec<=0) return '00:00';
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  return (h?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function liveSessionFreshness(s){
  const d=liveDateValue(s.lastUpdate||s.updatedAt||s.savedAt||s.startedAt);
  const diff=d?Date.now()-d.getTime():999999999;
  if(String(s.status)==='submitted') return {key:'submitted',label:'Đã nộp',cls:'bad',icon:'fa-circle-check'};
  if(diff<=60000) return {key:'live',label:'Đang online',cls:'live',icon:'fa-signal'};
  if(diff<=180000) return {key:'recent',label:'Không hoạt động > 60s',cls:'stale',icon:'fa-clock'};
  return {key:'stale',label:'Mất tín hiệu',cls:'bad',icon:'fa-wifi'};

function liveAnsweredCount(s){

/* ===== NÂNG CẤP LỚP HỌC THEO MÃ RIÊNG - 2026-04-26 =====
   Mục tiêu: cùng tên lớp 12A1 có thể tồn tại nhiều lớp khác nhau theo từng giáo viên.
   Học sinh đăng ký bằng mã lớp để tự vào đúng lớp và đúng giáo viên phụ trách.
*/
function classCodeStoreKey(){return 'mathpro12_classRooms_v2';}
function normalizeClassRoom(r){
  r=r||{};
  const name=String(r.name||r.className||'Chưa đặt tên').trim()||'Chưa đặt tên';
  const code=String(r.code||r.classCode||generateClassCode(name)).trim().toUpperCase();
  return {
    id:String(r.id||code||uid()),
    name,
    code,
    teacherId:String(r.teacherId||r.createdBy||''),
    teacherName:String(r.teacherName||''),
    createdBy:String(r.createdBy||r.teacherId||currentUser?.id||''),
    createdAt:r.createdAt||new Date().toISOString(),
    status:r.status||'active'
  };
}
function classRooms(){
  let arr=[];
  try{arr=JSON.parse(localStorage.getItem(classCodeStoreKey())||'[]')||[];}catch(e){arr=[];}
  if(!Array.isArray(arr)) arr=[];
  if(!arr.length){
    const seedTeachers=users.filter(u=>u.role==='teacher'||u.role==='admin');
    const firstTeacher=seedTeachers.find(u=>u.role==='teacher')||seedTeachers[0]||{};
    const seen=new Set();
    (classes||[]).forEach((c,idx)=>{
      const name=String(c||'Chưa đặt tên').trim()||'Chưa đặt tên';
      let code=generateClassCode(name); while(seen.has(code)){code=generateClassCode(name);} seen.add(code);
      arr.push(normalizeClassRoom({id:code,name,code,teacherId:firstTeacher.id||'',teacherName:firstTeacher.fullname||firstTeacher.email||'Chưa gán'}));
    });
    localStorage.setItem(classCodeStoreKey(),JSON.stringify(arr));
  }
  return arr.map(normalizeClassRoom);
}
function saveClassRooms(arr){
  arr=(arr||[]).map(normalizeClassRoom);
  localStorage.setItem(classCodeStoreKey(),JSON.stringify(arr));
  classes=[...new Set(arr.map(r=>r.name).filter(Boolean))];
  localStorage.setItem('mathpro12_classes',JSON.stringify(classes));
  save();
}
function generateClassCode(name='Lop'){
  const base=String(name).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Za-z0-9]+/g,'').toUpperCase().slice(0,6)||'LOP';
  const rand=Math.random().toString(36).slice(2,6).toUpperCase();
  return `${base}-${rand}`;
}
function classRoomByCode(code){code=String(code||'').trim().toUpperCase();return classRooms().find(r=>String(r.code).toUpperCase()===code)||null;}
function classRoomLabel(codeOrName){
  const r=classRoomByCode(codeOrName)||classRooms().find(x=>x.name===codeOrName);
  return r?`${r.name} • ${r.code}${r.teacherName?' • '+r.teacherName:''}`:String(codeOrName||'Chưa phân lớp');
}
function userClassCode(u){return String(u?.classCode||u?.classId||'').trim().toUpperCase();}
function userClassLabel(u){const r=classRoomByCode(userClassCode(u));return r?`${r.name} (${r.code})`:String(u?.className||'Chưa phân lớp');}
function teacherClassCodes(user=currentUser){
  if(isAdminUser(user)) return classRooms().map(r=>r.code);
  const direct=Array.isArray(user?.classCodes)?user.classCodes.map(x=>String(x).toUpperCase()):[];
  const fromRooms=classRooms().filter(r=>String(r.teacherId)===String(user?.id)).map(r=>r.code);
  const legacy=Array.isArray(user?.classNames)?user.classNames:[];
  const fromLegacy=classRooms().filter(r=>legacy.includes(r.name)).map(r=>r.code);
  return [...new Set([...direct,...fromRooms,...fromLegacy])];
}
teacherClassNames=function(user=currentUser){
  const codes=teacherClassCodes(user);
  return classRooms().filter(r=>codes.includes(r.code)).map(r=>`${r.name} (${r.code})`);
};
isStudentInMyClass=function(u){
  if(isAdminUser(currentUser)) return true;
  const codes=teacherClassCodes();
  if(userClassCode(u)) return codes.includes(userClassCode(u));
  return classRooms().some(r=>codes.includes(r.code) && r.name===String(u?.className||''));
};
scopedStudents=function(){return users.filter(u=>u.role==='student' && isStudentInMyClass(u));};
scopedSubmissions=function(){
  if(isAdminUser(currentUser)) return submissions;
  const codes=teacherClassCodes();
  const myStudentIds=new Set(scopedStudents().map(u=>String(u.id)));
  return submissions.filter(s=>myStudentIds.has(String(s.studentId)) || codes.includes(String(s.classCode||'').toUpperCase()) || classRooms().some(r=>codes.includes(r.code)&&r.name===s.className));
};
scopedExams=function(){
  if(isAdminUser(currentUser)) return exams;
  const codes=teacherClassCodes();
  const myId=String(currentUser?.id||'');
  return exams.map(normalizeExamAccess).filter(e=>String(e.createdBy||e.teacherId||'')===myId || (e.classIds||[]).some(c=>codes.includes(String(c).toUpperCase()) || classRooms().some(r=>r.code===String(c).toUpperCase()&&codes.includes(r.code))));
};

classOptionsHTML=function(selected=[]){
  selected=Array.isArray(selected)?selected.map(x=>String(x).toUpperCase()):String(selected||'').split(',').map(x=>x.trim().toUpperCase()).filter(Boolean);
  const rooms=isAdminUser(currentUser)?classRooms():classRooms().filter(r=>teacherClassCodes().includes(r.code));
  return rooms.map(r=>`<label class="inline-flex items-center gap-2 px-3 py-2 rounded-xl border bg-white/60"><input type="checkbox" class="edClassCheck" value="${safe(r.code)}" ${selected.includes(String(r.code).toUpperCase())?'checked':''}> ${safe(r.name)} <span class="text-xs text-slate-500">${safe(r.code)}</span></label>`).join('')||'<span class="text-sm text-slate-500">Chưa có lớp/mã lớp. Hãy tạo lớp trước.</span>';
};
selectedClassIdsFromEditor=function(){return Array.from(document.querySelectorAll('.edClassCheck:checked')).map(x=>String(x.value).toUpperCase());};
const __classCodeNormalizeExamAccess=normalizeExamAccess;
normalizeExamAccess=function(e){
  e=__classCodeNormalizeExamAccess(e||{});
  e.classIds=(e.classIds||[]).map(x=>String(x).toUpperCase());
  return e;
};
getExamAvailability=function(e,user=currentUser){
  e=normalizeExamAccess(e||{});
  const now=Date.now();
  const start=e.startTime?new Date(e.startTime).getTime():null;
  const end=e.endTime?new Date(e.endTime).getTime():null;
  if(user?.role==='admin') return {ok:true,label:'Admin xem đề',reason:''};
  if(e.isPublished===false && user?.role!=='teacher') return {ok:false,label:'Chưa xuất bản',reason:'Đề này chưa được giáo viên xuất bản.'};
  if(user?.role==='student'){
    const code=userClassCode(user);
    const allowedByCode=code && e.classIds.includes(code);
    const allowedLegacy=e.classIds.some(c=>classRoomByCode(c)?.name===user.className || c===String(user.className||'').toUpperCase());
    if(e.classIds.length && !allowedByCode && !allowedLegacy) return {ok:false,label:'Không thuộc lớp',reason:'Đề này không được giao cho mã lớp của em.'};
    if(start && now<start) return {ok:false,label:'Chưa mở',reason:'Đề chưa đến thời gian mở.'};
    if(end && now>end) return {ok:false,label:'Đã đóng',reason:'Đề đã hết thời gian làm bài.'};
    if(e.maxAttempts>0 && examAttemptCount(e.id,user.id)>=e.maxAttempts) return {ok:false,label:'Đã làm đủ lượt',reason:`Em đã dùng đủ ${e.maxAttempts} lượt làm bài.`};
  }
  return {ok:true,label:e.isPublished===false?'Nháp':'Sẵn sàng',reason:''};
};
canStudentSeeExam=function(e){
  if(isAdminUser(currentUser)||isTeacherUser(currentUser)) return true;
  e=normalizeExamAccess(e);
  if(e.isPublished===false) return false;
  if(currentUser?.role==='student' && e.classIds.length){
    const code=userClassCode(currentUser);
    return (code && e.classIds.includes(code)) || e.classIds.some(c=>classRoomByCode(c)?.name===currentUser.className || c===String(currentUser.className||'').toUpperCase());
  }
  return true;
};
examScheduleText=function(e){
  e=normalizeExamAccess(e);
  const fmt=v=>v?new Date(v).toLocaleString('vi-VN'):'Không giới hạn';
  const cls=e.classIds.length?e.classIds.map(c=>classRoomLabel(c)).join(', '):'Tất cả lớp';
  const attempts=e.maxAttempts>0?`${e.maxAttempts} lượt`:'Không giới hạn lượt';
  return `Lớp: ${cls} • Mở: ${fmt(e.startTime)} • Đóng: ${fmt(e.endTime)} • ${attempts}`;
};

function roomsForCurrentUser(){return isAdminUser(currentUser)?classRooms():classRooms().filter(r=>teacherClassCodes().includes(r.code));}

async function saveClassRoom(editCode=''){
  let arr=classRooms();
  const name=($('roomName')?.value||'').trim(); if(!name) return toast('Nhập tên lớp trước','bad');
  let code=($('roomCode')?.value||'').trim().toUpperCase()||generateClassCode(name);
  const teacherId=isAdminUser(currentUser)?($('roomTeacher')?.value||''):String(currentUser?.id||'');
  const teacher=users.find(u=>String(u.id)===String(teacherId))||currentUser||{};
  if(arr.some(r=>r.code===code && r.code!==String(editCode).toUpperCase())) return toast('Mã lớp này đã tồn tại, hãy dùng mã khác','bad');
  const obj=normalizeClassRoom({id:code,name,code,teacherId,teacherName:teacher.fullname||teacher.email||teacher.username||'',createdBy:teacherId});
  if(editCode) arr=arr.map(r=>r.code===String(editCode).toUpperCase()?{...r,...obj}:r); else arr.push(obj);
  saveClassRooms(arr);
  if(firebaseReady){try{await db.collection('classes').doc(code).set({...obj,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(err){toast('Đã lưu local, chưa lưu Firestore: '+fbError(err),'bad');}}

}

applyStudentFilters=function(){
  let list=isAdminUser(currentUser)?users.filter(u=>u.role==='student'):scopedStudents();
  const q=norm($('studentSearch')?.value||''), cls=$('studentClassFilter')?.value||'all', sort=$('studentSortFilter')?.value||'name';
  if(q) list=list.filter(u=>norm((u.fullname||'')+' '+(u.email||u.username||'')+' '+(u.className||'')+' '+userClassCode(u)).includes(q));
  if(cls!=='all') list=list.filter(u=>userClassCode(u)===String(cls).toUpperCase());
  if(sort==='avgDesc') list.sort((a,b)=>studentAverage(b.id)-studentAverage(a.id));
  else if(sort==='avgAsc') list.sort((a,b)=>studentAverage(a.id)-studentAverage(b.id));
  else if(sort==='recent') list.sort((a,b)=>(studentLastSubmit(b.id)?new Date(studentLastSubmit(b.id).createdAt||studentLastSubmit(b.id).date||0).getTime():0)-(studentLastSubmit(a.id)?new Date(studentLastSubmit(a.id).createdAt||studentLastSubmit(a.id).date||0).getTime():0));
  else list.sort((a,b)=>String(a.fullname||a.email||'').localeCompare(String(b.fullname||b.email||''),'vi'));
  const body=$('studentTableBody'); if(body) body.innerHTML=buildStudentRows(list);
};

function validateAIAutoExam(cfg){
  const errors=[]; const total=aiRealExamTotal(cfg.need);
  if(total<=0)errors.push('Cần chọn ít nhất 1 câu hỏi.');
  if(total>80)errors.push('Không nên tạo quá 80 câu/lần để tránh quá tải AI.');
  if(cfg.duration<=0)errors.push('Thời gian làm bài phải lớn hơn 0.');
  if(cfg.provider!=='backend' && !cfg.apiKey)errors.push('Chưa nhập API key hoặc hãy chọn Backend bảo mật.');
  return errors;
}

function aiAuditGeneratedQuestions(questions=[],cfg={}){
  const issues=[]; const c={mc:0,tf:0,short:0};
  questions.forEach((q,i)=>{
    c[q.type]=(c[q.type]||0)+1;
    if(!q.solution)issues.push(`Câu ${i+1} thiếu lời giải.`);
    if(q.type==='mc' && (!Array.isArray(q.options)||q.options.length!==4))issues.push(`Câu ${i+1} trắc nghiệm chưa đủ 4 phương án.`);
    if(q.type==='tf' && (!Array.isArray(q.statements)||q.statements.length!==4))issues.push(`Câu ${i+1} đúng/sai chưa đủ 4 ý.`);
    if(q.type==='short' && (q.answer===undefined||q.answer===null||String(q.answer).trim()===''))issues.push(`Câu ${i+1} trả lời ngắn thiếu đáp án.`);
  });
  ['mc','tf','short'].forEach(t=>{if(Number(cfg.need?.[t]||0)!==c[t])issues.push(`${aiRealExamPartName(t)}: AI trả ${c[t]} câu, yêu cầu ${cfg.need[t]} câu.`);});
  return issues;
}
