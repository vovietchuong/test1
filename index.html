async function getUserProfile(user){
  if(!user) return null;
  let fallbackRole=TEACHER_EMAILS.includes((user.email||'').toLowerCase())?'teacher':'student';
  let profile={id:user.uid,username:user.email,fullname:user.displayName||user.email,role:fallbackRole,email:user.email};
  if(firebaseReady){
    const ref=db.collection('users').doc(user.uid);
    const snap=await ref.get();
    if(snap.exists){
      profile={...profile,...snap.data(),id:user.uid,email:user.email,username:user.email};
      if(fallbackRole==='teacher' && profile.role!=='teacher'){
        profile.role='teacher';
        await ref.set({role:'teacher',updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      }
    }
    else{await ref.set({...profile,createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}
  }
  return profile;
}

  }));

async function syncExamQuestionsToQuestionBank(examData){
  const now=new Date().toISOString();
  const items=(examData.questions||[]).map((q,idx)=>({
    ...q,
    id:String(q.bankId||q.id||('q'+uid())),
    sourceExamId:String(examData.id),
    sourceExamTitle:examData.title,
    topicId:examData.topicId,
    topicName:topicName(examData.topicId),
    level:examData.level||'',
    order:idx+1,
    status:'published',
    createdBy:currentUser?.id||null,
    updatedAt:now
  }));
  const byId={}; questionBank.forEach(q=>byId[String(q.id)]=q); items.forEach(q=>byId[String(q.id)]=q);
  questionBank=Object.values(byId);
  localStorage.setItem('mathpro12_questionBank',JSON.stringify(questionBank));
  if(firebaseReady){
    const batch=db.batch();
    items.forEach(q=>batch.set(db.collection('questionBanks').doc(String(q.id)),{...q,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}));
    await batch.commit();
  }
}

function getQuestionBankId(q){
  return String(q?.sourceQuestionId || q?.bankId || q?.id || ('q'+uid()));
}
async function deleteExamQuestionLinks(examId){
  if(!firebaseReady) return;
  const snap=await db.collection('examQuestions').where('examId','==',String(examId)).get().catch(()=>null);
  if(!snap || snap.empty) return;
  let batch=db.batch(), count=0;
  for(const d of snap.docs){
    batch.delete(d.ref); count++;
    if(count%450===0){await batch.commit(); batch=db.batch();}
  }
  await batch.commit();
}
async function syncExamStructureToFirestore(examData){
  if(!examData || !examData.id) return;
  const examId=String(examData.id);
  const questions=(examData.questions||[]);
  // Bước 3: mỗi đề chỉ cần liên kết tới mã câu hỏi trong kho qua collection examQuestions.
  // File vẫn giữ mảng questions trong exams để tương thích với bản web hiện tại.
  await syncExamQuestionsToQuestionBank(examData);
  const questionIds=questions.map(q=>getQuestionBankId(q));
  localStorage.setItem('mathpro12_examQuestionIds_'+examId,JSON.stringify(questionIds));
  if(!firebaseReady) return;
  await deleteExamQuestionLinks(examId);
  let batch=db.batch();
  questions.forEach((q,idx)=>{
    const questionId=getQuestionBankId(q);
    const linkId=examId+'_'+questionId;
    batch.set(db.collection('examQuestions').doc(linkId),{
      examId,
      questionId,
      order:idx+1,
      point:q.point||1,
      type:q.type||'',
      topicId:examData.topicId||q.topicId||null,
      examTitle:examData.title||'',
      createdBy:currentUser?.id||null,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true});
  });
  batch.set(db.collection('exams').doc(examId),{
    questionIds,
    questionCount:questions.length,
    usesQuestionBank:true,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true});
  await batch.commit();
}
async function migrateAllExamStructures(){

async function loadExamFromQuestionBank(examBase){
  // Bước 4: học sinh lấy cấu trúc đề từ examQuestions và nội dung câu từ questionBanks.
  // Nếu Firestore chưa có cấu trúc mới, hệ thống tự quay về questions cũ để không làm hỏng đề đang dùng.
  const fallback=JSON.parse(JSON.stringify(examBase||{}));
  if(!firebaseReady || !examBase?.id) return fallback;
  try{
    let links=[];
    const snap=await db.collection('examQuestions').where('examId','==',String(examBase.id)).get();
    if(!snap.empty){
      links=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));
    }
    if(!links.length && Array.isArray(examBase.questionIds) && examBase.questionIds.length){
      links=examBase.questionIds.map((questionId,idx)=>({questionId,order:idx+1}));
    }
    if(!links.length) return fallback;

    const questionDocs=await Promise.all(links.map(l=>db.collection('questionBanks').doc(String(l.questionId)).get()));
    const questions=[];
    questionDocs.forEach((doc,idx)=>{
      if(!doc.exists) return;
      const raw={id:doc.id,...doc.data()};
      questions.push({
        ...raw,
        id:String(raw.id||doc.id),
        sourceQuestionId:String(doc.id),
        point:links[idx]?.point||raw.point||1,
        order:links[idx]?.order||idx+1
      });
    });
    if(!questions.length) return fallback;
    return {
      ...fallback,
      questions,
      questionCount:questions.length,
      loadedFromQuestionBank:true,
      usesQuestionBank:true
    };
  }catch(err){
    console.warn('Không tải được đề từ questionBanks/examQuestions, dùng dữ liệu cũ:',err);
    return fallback;
  }
}
function publicQuestionForStudent(q){
  const copy=JSON.parse(JSON.stringify(q));
  delete copy.answer;
  delete copy.solution;
  delete copy.explanation;
  return copy;
}
function safeExamForProgress(exam){
  const copy=JSON.parse(JSON.stringify(exam));
  copy.questions=(copy.questions||[]).map(publicQuestionForStudent);
  return copy;
}

function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function buildAnswerKey(exam){
  const key={};
  (exam.questions||[]).forEach(q=>key[q.id]={type:q.type,answer:JSON.parse(JSON.stringify(q.answer??null)),solution:q.solution||'',options:q.options||[],statements:q.statements||[]});
  return key;
}
function sanitizeExamForStudent(exam){
  const copy=JSON.parse(JSON.stringify(exam));
  copy.questions=(copy.questions||[]).map(publicQuestionForStudent);
  return copy;
}
function prepareExamInstance(exam){
  const copy=JSON.parse(JSON.stringify(exam)); copy.originalId=String(exam.id); copy.instanceId=String(uid());
  copy.questions=shuffleArray(copy.questions).map(q=>{ if(q.type==='mc'&&Array.isArray(q.options)){const pairs=q.options.map((text,idx)=>({text,idx}));const sh=shuffleArray(pairs);q.options=sh.map(x=>x.text);q.answer=sh.findIndex(x=>x.idx===Number(q.answer));} return q;});
  examAnswerKey=buildAnswerKey(copy);
  return currentUser?.role==='student'?sanitizeExamForStudent(copy):copy;
}

async function doRegister(){
  const email=emailFromLogin($('regU').value.trim()), password=$('regP').value, fullname=$('regName').value.trim()||email;
  const requestedRole=$('regRole')?.value||'student';
  const teacherCode=$('regTeacherCode')?.value||'';
  if(!email||!password) return toast('Vui lòng nhập email và mật khẩu','bad');
  if(password.length<6) return toast('Mật khẩu Firebase cần ít nhất 6 ký tự','bad');
  if(requestedRole==='teacher' && detectRegisterRole(email,requestedRole,teacherCode)!=='teacher') return toast('Mã giáo viên chưa đúng. Hãy nhập CHUONG2026 hoặc dùng email có chữ gv/giaovien.','bad');
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,password);
    const role=detectRegisterRole(email,requestedRole,teacherCode);
    const profile={id:cred.user.uid,email,username:email,fullname,role,createdAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
    await db.collection('users').doc(cred.user.uid).set(profile,{merge:true});
    currentUser={id:cred.user.uid,email,username:email,fullname,role};
    users=users.filter(u=>u.id!==cred.user.uid);
    users.push(currentUser); save();
    document.querySelector('.fixed')?.remove();
    renderHeader();
    if(role==='teacher'){ await seedExamsToFirestore(); renderTeacherDashboard(); toast('Đăng ký giáo viên thành công','ok'); }
    else{ renderExamsPublic(); toast('Đăng ký học sinh thành công','ok'); }
  }catch(err){
    toast('Đăng ký thất bại: '+fbError(err),'bad');
  }
}
async function startExam(id){
  const base=exams.find(e=>String(e.id)==String(id)); if(!base)return;
  const key=progressKey(id), saved=key?JSON.parse(localStorage.getItem(key)||'null'):null;
  if(saved?.exam && saved?.remain>0){
    selectedExam=saved.exam;
    examAnswers=saved.answers||{};
    examRemain=saved.remain;
    examWarnings=saved.warnings||0;
    examStartedAt=saved.startedAt||new Date().toISOString();
    // Không lưu đáp án trong localStorage. Khi khôi phục, tải lại đáp án tạm từ questionBanks/examQuestions để chấm.
    const fullExam=await loadExamFromQuestionBank(base);
    prepareExamInstance(fullExam);
    selectedExam=saved.exam;
    toast('Đã khôi phục bài đang làm trước đó','ok');
  }
  else{
    $('mainView').innerHTML='<div class="glass-card p-8 text-center"><i class="fa-solid fa-spinner fa-spin text-3xl text-blue-600"></i><p class="mt-3 font-semibold">Đang tải đề từ kho câu hỏi...</p></div>';
    const fullExam=await loadExamFromQuestionBank(base);
    selectedExam=prepareExamInstance(fullExam);
    examAnswers={};examReview=false;examRemain=(selectedExam.duration||30)*60; examWarnings=0; examStartedAt=new Date().toISOString();
  }
  renderExamRoom();
  if(currentUser?.role==='student'){enableAntiCheat();clearInterval(examTimer);examTimer=setInterval(()=>{examRemain--;saveExamProgress();updateTimer(); if(examRemain<=0){clearInterval(examTimer);submitExam(true)}},1000)}
}
function updateTimer(){const t=$('timerBox'); if(t)t.textContent=`${String(Math.floor(examRemain/60)).padStart(2,'0')}:${String(examRemain%60).padStart(2,'0')}`}
function renderExamRoom(){const e=selectedExam;$('mainView').innerHTML=`<div class="glass-card p-5 mb-5 sticky top-20 z-20"><div class="flex flex-wrap justify-between gap-3"><div><h2 class="text-2xl font-black">${safe(e.title)}</h2><p class="text-sm" style="color:var(--muted)">${topicName(e.topicId)} • ${e.questions.length} câu • <span class="mini-badge"><i class="fa-solid fa-shuffle"></i> Đã trộn đề</span> ${e.loadedFromQuestionBank?`<span class="mini-badge"><i class="fa-solid fa-database"></i> Từ kho câu hỏi</span>`:''} ${currentUser?.role==='student'?`<span class="mini-badge ${examWarnings?'warning-pulse':''}"><i class="fa-solid fa-triangle-exclamation"></i> Rời tab: ${examWarnings}</span>`:''}</p></div><div class="flex gap-2 items-center"><span id="timerBox" class="px-4 py-2 rounded-2xl bg-slate-900 text-white font-mono">--:--</span><button onclick="submitExam(false)" class="bg-green-600 text-white px-4 py-2 rounded-2xl font-bold">Nộp bài</button><button onclick="renderExamsPublic()" class="btn-soft px-4 py-2 rounded-2xl">Thoát</button></div></div></div>${currentUser?.role==='student'?`<div class="anti-cheat-box rounded-2xl p-4 mb-5 text-sm"><b><i class="fa-solid fa-shield-halved"></i> Chế độ thi an toàn:</b> hệ thống ghi nhận rời tab, thoát toàn màn hình, chuột phải, copy/paste và phím tắt. Từ 3 cảnh báo bài sẽ tự nộp.</div>`:''}<div class="space-y-5">${e.questions.map(renderQuestion).join('')}</div>`;updateTimer();typeset()}
function renderQuestion(q,i){const saved=examAnswers[q.id];let body=''; if(q.type==='mc')body=q.options.map((o,idx)=>`<label class="option-card flex gap-3 ${saved==idx?'selected':''}"><input type="radio" name="${q.id}" onchange="setMC('${q.id}',${idx})" ${saved==idx?'checked':''}><span class="math-content"><b>${'ABCD'[idx]}.</b> ${o}</span></label>`).join('');
 if(q.type==='tf')body=q.statements.map((s,idx)=>`<div class="option-card"><div class="math-content mb-2"><b>${String.fromCharCode(97+idx)})</b> ${s}</div><label class="mr-4"><input type="radio" name="${q.id}_${idx}" onchange="setTF('${q.id}',${idx},true)" ${saved?.[idx]===true?'checked':''}> Đúng</label><label><input type="radio" name="${q.id}_${idx}" onchange="setTF('${q.id}',${idx},false)" ${saved?.[idx]===false?'checked':''}> Sai</label></div>`).join('');
 if(q.type==='short')body=`<input value="${safe(saved||'')}" oninput="setShort('${q.id}',this.value)" class="w-full md:w-80 px-4 py-3 rounded-2xl border" placeholder="Nhập đáp án ngắn, ví dụ: 0.6 hoặc 1/2">`;
 return `<section class="glass-card p-5"><div class="font-bold mb-3 math-content">Câu ${i+1}. ${q.text}</div><div class="space-y-3">${body}</div></section>`}
function setTF(qid,idx,val){if(!examAnswers[qid])examAnswers[qid]=[];examAnswers[qid][idx]=val;saveExamProgress()}
function norm(x){return String(x??'').trim().replace(',','.').replace(/\s+/g,'').toLowerCase()}
async function submitExam(auto=false){
  if(!selectedExam)return;
  if(!currentUser){showLoginModal();toast('Thầy/các em cần đăng nhập học sinh để lưu điểm.','info');return}
  let score=0,details=[];
  selectedExam.questions.forEach(q=>{
    const key=examAnswerKey[q.id]||q;
    let ok=false,a=examAnswers[q.id];
    if(q.type==='mc')ok=Number(a)===Number(key.answer);
    if(q.type==='tf')ok=Array.isArray(a)&&Array.isArray(key.answer)&&key.answer.every((v,i)=>a[i]===v);
    if(q.type==='short')ok=norm(a)===norm(key.answer);
    if(ok)score++; details.push({qid:q.id,answer:a??null,ok});
  });
  const sub={id:String(uid()),studentId:currentUser.id,studentName:currentUser.fullname||currentUser.email,studentEmail:currentUser.email||currentUser.username,examId:String(selectedExam.originalId||selectedExam.id),examInstanceId:selectedExam.instanceId||null,examTitle:selectedExam.title,score,total:selectedExam.questions.length,percent:Math.round(score*100/selectedExam.questions.length),warnings:examWarnings,startedAt:examStartedAt,date:new Date().toLocaleString('vi-VN'),details,createdAt:new Date().toISOString()};
  if(currentUser.role==='student'){
    submissions.unshift(sub); save();
    if(firebaseReady){
      try{ await db.collection('examResults').doc(sub.id).set({...sub,createdAt:firebase.firestore.FieldValue.serverTimestamp()}); }
      catch(err){ toast('Đã lưu local, chưa ghi được Firestore: '+fbError(err),'bad'); }
    }
  }
  clearInterval(examTimer);disableAntiCheat();clearExamProgress();renderResult(sub,auto);

function addPickedQuestionsToEditor(){

  save();
  if(firebaseReady){
    try{await db.collection('exams').doc(docId).set({...data,createdBy:currentUser?.id||null,questionCount:data.questions.length,usesQuestionBank:true,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}); await syncExamStructureToFirestore(data);}
    catch(err){toast('Đã lưu local, chưa ghi được Firestore: '+fbError(err),'bad')}
  } else { await syncExamQuestionsToQuestionBank(data); localStorage.setItem('mathpro12_examQuestionIds_'+docId,JSON.stringify(data.questions.map(q=>getQuestionBankId(q)))); }
  document.querySelector('.fixed')?.remove();renderTeacherDashboard();toast('Đã lưu đề thi','ok');
}
async function deleteExam(id){
  if(confirm('Xóa đề này và các điểm liên quan?')){
    exams=exams.filter(e=>String(e.id)!=String(id));
    submissions=submissions.filter(s=>String(s.examId)!=String(id));
    save();
    if(firebaseReady){try{await deleteExamQuestionLinks(id); await db.collection('exams').doc(String(id)).delete();}catch(err){toast('Chưa xóa được trên Firestore: '+fbError(err),'bad')}}
    renderTeacherDashboard();toast('Đã xóa','ok');
  }
}
function showSecurityRules(){
  const rules=`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    function signedIn(){ return request.auth != null; }
    function isTeacher(){ return signedIn() && get(/databases/$(database)/documents/users/$(request.auth.uid)).data.role == 'teacher'; }

    match /users/{userId} {
      allow read: if signedIn() && (request.auth.uid == userId || isTeacher());
      allow create: if signedIn() && request.auth.uid == userId;
      allow update: if signedIn() && (request.auth.uid == userId || isTeacher());
    }

    match /questionBanks/{questionId} {
      allow read: if signedIn();
      allow create, update, delete: if isTeacher();
    }

    match /exams/{examId} {
      allow read: if true;
      allow create, update, delete: if isTeacher();
    }

    match /examQuestions/{id} {
      allow read: if signedIn();
      allow create, update, delete: if isTeacher();
    }

    match /examResults/{resultId} {
      allow create: if signedIn() && request.resource.data.studentId == request.auth.uid;
      allow read: if signedIn() && (resource.data.studentId == request.auth.uid || isTeacher());
      allow update, delete: if isTeacher();
    }
  }
}`;
  const m=document.createElement('div');m.className='fixed inset-0 bg-black/55 z-50 p-4 overflow-auto fade-in';m.innerHTML=`<div class="glass-card max-w-4xl mx-auto p-6"><div class="flex justify-between"><h2 class="text-2xl font-black">Firestore Rules chống sửa dữ liệu</h2><button onclick="this.closest('.fixed').remove()" class="text-2xl">&times;</button></div><p class="my-3 text-sm" style="color:var(--muted)">Dán đoạn này vào Firebase Console → Firestore Database → Rules. Bản HTML đã giảm lộ đáp án trên giao diện, còn rules này giúp học sinh không tự sửa/xóa đề và điểm.</p><textarea class="w-full h-96 border rounded-2xl p-4 font-mono text-sm">${rules}</textarea></div>`;document.body.appendChild(m);
}

function exportData(){const blob=new Blob([JSON.stringify({users,exams,submissions},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mathpro12-data.json';a.click()}
function resetDemo(){if(confirm('Khôi phục dữ liệu mẫu?')){localStorage.removeItem('mathpro12_users');localStorage.removeItem('mathpro12_exams');localStorage.removeItem('mathpro12_submissions');localStorage.removeItem('mathpro12_user');bootstrap()}}
document.addEventListener('visibilitychange',()=>{if(document.hidden)antiCheatWarning('Rời tab hoặc thu nhỏ trình duyệt')});
document.addEventListener('fullscreenchange',()=>{if(examAntiCheatLocked&&!document.fullscreenElement)antiCheatWarning('Thoát toàn màn hình')});
document.addEventListener('contextmenu',e=>{if(examAntiCheatLocked){e.preventDefault();antiCheatWarning('Mở chuột phải')}});
document.addEventListener('copy',e=>{if(examAntiCheatLocked){e.preventDefault();antiCheatWarning('Copy nội dung đề')}});
document.addEventListener('paste',e=>{if(examAntiCheatLocked){e.preventDefault();antiCheatWarning('Dán nội dung vào bài')}});
document.addEventListener('keydown',e=>{if(examAntiCheatLocked&&((e.ctrlKey&&['c','v','u','s','p'].includes(e.key.toLowerCase()))||e.key==='F12')){e.preventDefault();antiCheatWarning('Dùng phím tắt bị khóa')}});
window.addEventListener('beforeunload',e=>{if(examAntiCheatLocked&&selectedExam&&examRemain>0){e.preventDefault();e.returnValue='Bài thi đang làm chưa nộp.'}});

async function bootstrap(){
  $('mainView').innerHTML='<div class="glass-card p-8 text-center"><i class="fa-solid fa-spinner fa-spin text-3xl text-blue-600"></i><p class="mt-3 font-semibold">Đang kết nối Firebase và tải dữ liệu...</p></div>';
  await load();
  renderHeader();
  renderHome();
  if(firebaseReady){
    auth.onAuthStateChanged(async (user)=>{
      if(user){
        try{
          currentUser=await getUserProfile(user); save(); renderHeader();
          await loadExamsFromFirestore(); await loadQuestionBankFromFirestore(); await loadSubmissionsFromFirestore();
        }catch(err){console.warn(err)}
      }else{currentUser=null; save(); renderHeader();}
    });
  }
}
bootstrap();
</script>
