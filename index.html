    document.querySelector('.ai-auto-exam-modal')?.remove(); renderTeacherDashboard(); toast(audit.length?'Đã tạo đề AI thi thật dạng nháp, có cảnh báo cần rà soát.':'Đã tạo đề AI thi thật và lưu vào hệ thống. Thầy nên mở đề kiểm tra trước khi xuất bản.','ok');

/* ===== BẢN TẠO ĐỀ TỪ KHO FULL CHUẨN THI THẬT - 2026 ===== */
function bankExamLevelRank(level=''){
  const x=norm(level);
  if(x.includes('van dung cao'))return 4;
  if(x.includes('van dung'))return 3;
  if(x.includes('thong hieu'))return 2;
  if(x.includes('nhan biet')||x.includes('co ban'))return 1;
  return 0;
}
function bankExamTypeLabel(type){return type==='mc'?'PHẦN I - Trắc nghiệm A/B/C/D':type==='tf'?'PHẦN II - Đúng/Sai':type==='short'?'PHẦN III - Trả lời ngắn':'Khác'}
function bankExamPublishedPool(){qBankNormalizeList?.();return (questionBank||[]).filter(q=>(q.status||'published')==='published' && q.text && q.type && !(qBankQuestionHasCriticalIssue?.(q)));}
function bankExamPoolByConfig(){
  const topic=$('bankExamTopic')?.value||'all', search=norm($('bankExamSearch')?.value||''), type=$('bankExamType')?.value||'all', level=$('bankExamLevel')?.value||'all';
  return bankExamPublishedPool().filter(q=>{
    const hay=norm([q.text,q.solution,q.topicName,q.level,q.tags].flat().join(' '));
    return (!search||hay.includes(search)) && topicMatches(q.topicId,topic) && (type==='all'||q.type===type) && (level==='all'||norm(q.level).includes(norm(level))||norm(level).includes(norm(q.level)));
  });
}
function bankExamPreset(mode='thpt'){
  const sets={thpt:{mc:18,tf:4,short:6,duration:90,title:'Đề thi thật từ kho câu hỏi - TN THPT'},quick45:{mc:12,tf:3,short:4,duration:45,title:'Đề kiểm tra 45 phút từ kho câu hỏi'},practice:{mc:8,tf:2,short:2,duration:30,title:'Đề luyện tập nhanh từ kho câu hỏi'},full50:{mc:30,tf:5,short:10,duration:90,title:'Đề tổng hợp 50 câu từ kho câu hỏi'}};
  const c=sets[mode]||sets.thpt;
  if($('bankExamMC'))$('bankExamMC').value=c.mc; if($('bankExamTF'))$('bankExamTF').value=c.tf; if($('bankExamShort'))$('bankExamShort').value=c.short; if($('bankExamDuration'))$('bankExamDuration').value=c.duration; if($('bankExamTitle')&&!$('bankExamTitle').value.trim())$('bankExamTitle').value=c.title+' '+new Date().toLocaleDateString('vi-VN'); bankExamRefresh();

function bankExamNeed(){return {mc:Number($('bankExamMC')?.value||0),tf:Number($('bankExamTF')?.value||0),short:Number($('bankExamShort')?.value||0)}}
function bankExamSelectedIds(){return Array.from(document.querySelectorAll('.bankExamPick:checked')).map(x=>String(x.value));}
function bankExamSetAllVisible(checked=true){document.querySelectorAll('.bankExamPick').forEach(x=>x.checked=checked);bankExamRefreshSummary();}
function bankExamTakeBalanced(pool,count,type,used){
  const arr=shuffleArray(pool.filter(q=>q.type===type && !used[String(q.id)])); const groups={1:[],2:[],3:[],4:[],0:[]}; arr.forEach(q=>groups[bankExamLevelRank(q.level)].push(q));
  const total=Math.max(0,Number(count)||0), quota=type==='mc'?{1:Math.ceil(total*.45),2:Math.ceil(total*.30),3:Math.floor(total*.18),4:total}:{1:Math.ceil(total*.35),2:Math.ceil(total*.30),3:Math.ceil(total*.25),4:total};
  let picked=[]; [1,2,3,4].forEach(k=>{const need=Math.max(0,Math.min(quota[k]-picked.length,total-picked.length));picked.push(...groups[k].splice(0,need));});
  if(picked.length<total)picked.push(...shuffleArray([...[1,2,3,4,0].flatMap(k=>groups[k])]).slice(0,total-picked.length)); picked.forEach(q=>used[String(q.id)]=true); return picked;
}
function bankExamAutoPickIds(){
  const need=bankExamNeed(), pool=bankExamPoolByConfig(), used={};
  const picked=[...bankExamTakeBalanced(pool,need.mc,'mc',used),...bankExamTakeBalanced(pool,need.tf,'tf',used),...bankExamTakeBalanced(pool,need.short,'short',used)];
  document.querySelectorAll('.bankExamPick').forEach(x=>x.checked=picked.some(q=>String(q.id)===String(x.value))); bankExamRefreshSummary();
}

function bankExamBuildQuestions(){const ids=bankExamSelectedIds(); const picked=bankExamPublishedPool().filter(q=>ids.includes(String(q.id))); return sortQuestionsByExamPart(shuffleArray(picked)).map((q,i)=>{const c=cleanQuestionFromBank(q);c.type=normalizeQuestionType(c.type);c.id='q'+uid()+'bank_'+i;c.sourceQuestionId=String(q.id);c.realBankExam=true;c.partName=bankExamTypeLabel(c.type);return c;});}

function normalizeClassCodeValue(code=''){return String(code||'').trim().toUpperCase();}
function uniqueClassCodes(codes=[]){return [...new Set((Array.isArray(codes)?codes:[codes]).map(normalizeClassCodeValue).filter(Boolean))];}
function studentClassCodes(user=currentUser){
  if(!user) return [];
  const codes=[];
  if(Array.isArray(user.classCodes)) codes.push(...user.classCodes);
  if(Array.isArray(user.joinedClassCodes)) codes.push(...user.joinedClassCodes);
  if(user.primaryClassCode) codes.push(user.primaryClassCode);
  if(user.classCode) codes.push(user.classCode);
  const legacyName=String(user.className||'').trim();
  if(legacyName && legacyName!=='Chưa phân lớp') classRooms().filter(r=>r.name===legacyName).forEach(r=>codes.push(r.code));
  return uniqueClassCodes(codes);
}
function studentPrimaryClassCode(user=currentUser){const codes=studentClassCodes(user);const p=normalizeClassCodeValue(user?.primaryClassCode||user?.classCode||'');return p&&codes.includes(p)?p:(codes[0]||'');}
function studentClassRooms(user=currentUser){return studentClassCodes(user).map(c=>classRoomByCode(c)).filter(Boolean);}
function buildStudentClassPatch(user=currentUser,codes=[]){
  codes=uniqueClassCodes(codes); const primary=studentPrimaryClassCode({...user,classCodes:codes}); const room=classRoomByCode(primary)||classRoomByCode(codes[0])||{};
  return {classCodes:codes,joinedClassCodes:codes,primaryClassCode:room.code||'',classCode:room.code||'',className:room.name||'Chưa phân lớp',teacherId:room.teacherId||'',teacherName:room.teacherName||'',classMemberships:codes.map(code=>{const r=classRoomByCode(code)||{};return {code,name:r.name||'',teacherId:r.teacherId||'',teacherName:r.teacherName||'',status:'active'};})};
}

async function refreshCurrentUserProfileFromFirestore(){if(!firebaseReady||!currentUser?.id)return;try{const snap=await db.collection('users').doc(String(currentUser.id)).get();if(snap.exists){currentUser={...currentUser,...snap.data(),id:currentUser.id};users=users.filter(u=>String(u.id)!==String(currentUser.id));users.push(currentUser);save();}}catch(e){console.warn(e)}}

getExamAvailability=function(e,user=currentUser){e=normalizeExamAccess(e||{});const now=Date.now(),start=e.startTime?new Date(e.startTime).getTime():null,end=e.endTime?new Date(e.endTime).getTime():null;if(user?.role==='admin')return {ok:true,label:'Admin xem đề',reason:''};if(e.isPublished===false&&user?.role!=='teacher')return {ok:false,label:'Chưa xuất bản',reason:'Đề này chưa được giáo viên xuất bản.'};if(user?.role==='student'){const codes=studentClassCodes(user);const ok=e.classIds.some(c=>codes.includes(normalizeClassCodeValue(c))||classRoomByCode(c)?.name===user.className);if(e.classIds.length&&!ok)return {ok:false,label:'Không thuộc lớp',reason:'Đề này chưa được giao cho các lớp trong hồ sơ của em.'};if(start&&now<start)return {ok:false,label:'Chưa mở',reason:'Đề chưa đến thời gian mở.'};if(end&&now>end)return {ok:false,label:'Đã đóng',reason:'Đề đã hết thời gian làm bài.'};if(e.maxAttempts>0&&examAttemptCount(e.id,user.id)>=e.maxAttempts)return {ok:false,label:'Đã làm đủ lượt',reason:`Em đã dùng đủ ${e.maxAttempts} lượt làm bài.`};}return {ok:true,label:e.isPublished===false?'Nháp':'Sẵn sàng',reason:''};};
canStudentSeeExam=function(e){if(isAdminUser(currentUser)||isTeacherUser(currentUser))return true;e=normalizeExamAccess(e);if(e.isPublished===false)return false;if(currentUser?.role==='student'&&e.classIds.length){const codes=studentClassCodes(currentUser);return e.classIds.some(c=>codes.includes(normalizeClassCodeValue(c))||classRoomByCode(c)?.name===currentUser.className);}return true;};
renderHeader=function(){const ui=$('userInfo');const theme=localStorage.getItem('mathpro12_theme')||'light';document.documentElement.dataset.theme=theme;ui.innerHTML=`<button onclick="toggleTheme()" class="btn-soft px-3 py-2 rounded-xl no-print"><i class="fa-solid ${theme==='dark'?'fa-sun':'fa-moon'}"></i></button>`+(currentUser?`<button onclick="renderProfile()" class="btn-soft px-3 py-2 rounded-xl no-print"><i class="fa-solid fa-id-card"></i> Hồ sơ</button><div class="flex items-center gap-2 px-3 py-2 rounded-2xl bg-blue-50/80"><i class="fa-solid fa-circle-user text-blue-600"></i><span class="font-semibold text-sm">${safe(currentUser.fullname||currentUser.username)}</span><span class="text-xs px-2 py-1 rounded-full bg-white">${currentUser.role==='admin'?'Admin':(currentUser.role==='teacher'?'Giáo viên':'Học sinh')}</span>${currentUser.role==='student'?`<span class="hidden lg:inline text-xs px-2 py-1 rounded-full bg-cyan-50 text-cyan-700">${studentClassCodes(currentUser).length} lớp</span>`:''}<button onclick="logout()" class="text-red-500 ml-1"><i class="fa-solid fa-right-from-bracket"></i></button></div>`:`<button onclick="showLoginModal()" class="btn-primary text-white px-4 py-2 rounded-2xl no-print"><i class="fa-solid fa-right-to-bracket"></i> Đăng nhập</button>`);};
const __profileGetUserProfile=getUserProfile;
getUserProfile=async function(user){const profile=await __profileGetUserProfile(user);if(profile&&profile.role==='student'){const codes=studentClassCodes(profile);if(codes.length&&(!Array.isArray(profile.classCodes)||!profile.classCodes.length)){const patch=buildStudentClassPatch(profile,codes);Object.assign(profile,patch);if(firebaseReady){try{await db.collection('users').doc(String(profile.id)).set({...patch,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(e){}}}}return profile;};

</script>

<script>

  };

  /* ===== NÂNG CẤP DASHBOARD THÀNH TÍCH + PHÂN QUYỀN 4 VAI TRÒ - 2026-04-29 ===== */
  function userRole(user=currentUser){return user?.role||'guest'}
  function isGuestUser(user=currentUser){return !user || userRole(user)==='guest'}
  function isStudentUser(user=currentUser){return !!user && user.role==='student'}
  function isTeacherOnlyUser(user=currentUser){return !!user && user.role==='teacher'}

  function roleHomeHTML(){return `<section class="glass-card p-8 text-center fade-in"><div class="w-16 h-16 rounded-3xl btn-primary text-white grid place-items-center mx-auto text-2xl"><i class="fa-solid fa-user-lock"></i></div><h2 class="text-2xl font-black mt-4">Cần đăng nhập để xem dữ liệu cá nhân</h2><p class="mt-2" style="color:var(--muted)">Khách được xem bài giảng và kho đề công khai. Thành tích, thống kê, làm bài và quản lý hệ thống yêu cầu tài khoản phù hợp.</p><div class="flex justify-center gap-3 mt-5"><button onclick="showLoginModal()" class="btn-primary text-white px-5 py-3 rounded-2xl font-bold">Đăng nhập</button><button onclick="renderLessons()" class="btn-soft px-5 py-3 rounded-2xl font-bold">Xem bài giảng</button></div></section>`}

  const __oldRenderHeaderRolePatch=renderHeader;
  renderHeader=function(){
    __oldRenderHeaderRolePatch();
    const box=document.querySelector('#userInfo .rounded-full.bg-white');
    if(box && currentUser) box.textContent=roleDisplayName(currentUser.role);
  }

  achievementState={className:'all',examId:'all',range:'month',weakTopic:'all'};
  function achRoleScopedSubmissions(){
    if(isAdminUser(currentUser)) return [...submissions];
    if(isTeacherUser(currentUser)) return scopedSubmissions();
    if(isStudentUser(currentUser)) return submissions.filter(s=>String(s.studentId||'')===String(currentUser.id));
    return [];
  }
  function achRangeLabel(){return achievementState.range==='week'?'Tuần này':achievementState.range==='month'?'Tháng này':achievementState.range==='7'?'7 ngày':achievementState.range==='30'?'30 ngày':achievementState.range==='90'?'90 ngày':'Toàn thời gian'}
  function achRangeFilter(arr){
    const now=new Date(); let from=null;
    if(achievementState.range==='week'){from=new Date(now); const day=(from.getDay()+6)%7; from.setDate(from.getDate()-day); from.setHours(0,0,0,0);}
    else if(achievementState.range==='month'){from=new Date(now.getFullYear(),now.getMonth(),1);}
    else if(achievementState.range!=='all'){from=new Date(Date.now()-Number(achievementState.range||0)*86400000);}
    return from?arr.filter(s=>achDate(s)>=from):arr;
  }
  function resultTopicId(d={},s={}){
    if(d.topicId) return String(d.topicId);
    const q=questionBank.find(x=>String(x.id)===String(d.sourceQuestionId||d.qid));
    if(q?.topicId) return String(q.topicId);
    const e=exams.find(x=>String(x.id)===String(s.examId));
    return String(e?.topicId||8);
  }
  function topicWeakRows(arr=achRoleScopedSubmissions()){
    const map={};
    arr.forEach(s=>(s.details||[]).forEach(d=>{const tid=resultTopicId(d,s); const name=d.topicName||topicName(tid); map[tid]=map[tid]||{id:tid,name,total:0,wrong:0,correct:0}; map[tid].total++; if(d.ok) map[tid].correct++; else map[tid].wrong++;}));
    return Object.values(map).map(x=>({...x,rate:x.total?Math.round(x.wrong*100/x.total):0,avg:x.total?Math.round(x.correct*100/x.total):0})).sort((a,b)=>b.rate-a.rate||b.total-a.total);
  }
  function achScopedSubmissions(){
    let arr=achRoleScopedSubmissions().sort((a,b)=>achDate(b)-achDate(a));
    if(achievementState.className!=='all') arr=arr.filter(s=>String(s.className||'Chưa phân lớp')===String(achievementState.className));
    if(achievementState.examId!=='all') arr=arr.filter(s=>String(s.examId)===String(achievementState.examId));
    arr=achRangeFilter(arr);
    if(achievementState.weakTopic!=='all') arr=arr.filter(s=>(s.details||[]).some(d=>topicMatches(resultTopicId(d,s),achievementState.weakTopic)) || topicMatches(exams.find(e=>String(e.id)===String(s.examId))?.topicId,achievementState.weakTopic));
    return arr;
  }
  function achievementFiltersHTML(){
    const classList=isTeacherUser(currentUser)&&!isAdminUser(currentUser)?teacherClassNames():classes;

    return '<div class="glass-card p-4 mb-5"><div class="grid md:grid-cols-5 gap-3"><select id="achClass" class="exam-admin-input"><option value="all">Tất cả lớp</option>'+classList.map(c=>'<option value="'+safe(c)+'" '+(achievementState.className===c?'selected':'')+'>'+safe(c)+'</option>').join('')+'</select><select id="achExam" class="exam-admin-input"><option value="all">Tất cả đề</option>'+exams.map(e=>'<option value="'+safe(e.id)+'" '+(String(achievementState.examId)===String(e.id)?'selected':'')+'>'+safe(e.title)+'</option>').join('')+'</select><select id="achRange" class="exam-admin-input"><option value="week" '+(achievementState.range==='week'?'selected':'')+'>Tuần này</option><option value="month" '+(achievementState.range==='month'?'selected':'')+'>Tháng này</option><option value="7" '+(achievementState.range==='7'?'selected':'')+'>7 ngày gần đây</option><option value="30" '+(achievementState.range==='30'?'selected':'')+'>30 ngày gần đây</option><option value="90" '+(achievementState.range==='90'?'selected':'')+'>90 ngày gần đây</option><option value="all" '+(achievementState.range==='all'?'selected':'')+'>Toàn thời gian</option></select><select id="achWeakTopic" class="exam-admin-input"><option value="all">Tất cả chủ đề yếu</option>'+weak.map(t=>'<option value="'+safe(t.id)+'" '+(String(achievementState.weakTopic)===String(t.id)?'selected':'')+'>'+safe(t.name)+' • sai '+t.rate+'%</option>').join('')+'</select><button onclick="applyAchievementFilters()" class="btn-primary text-white px-4 py-3 rounded-2xl font-bold"><i class="fa-solid fa-filter"></i> Lọc</button></div></div>';
  }
  function applyAchievementFilters(){achievementState.className=$('achClass')?.value||'all';achievementState.examId=$('achExam')?.value||'all';achievementState.range=$('achRange')?.value||'month';achievementState.weakTopic=$('achWeakTopic')?.value||'all';renderAchievements();}
  function achievementWeakTopicHTML(arr=achScopedSubmissions()){
    const rows=topicWeakRows(arr).slice(0,8);
    return rows.map(r=>'<div class="p-3 rounded-2xl border bg-white/50 mb-2"><div class="flex justify-between gap-2"><b class="truncate">'+safe(r.name)+'</b><span class="mini-badge">Sai '+r.rate+'%</span></div>'+miniProgressBar(100-r.rate,'Mức nắm vững',(100-r.rate)+'%')+'<p class="text-xs" style="color:var(--muted)">'+r.wrong+'/'+r.total+' lượt sai • '+(r.rate>=60?'Cần giao bài củng cố ngay':r.rate>=35?'Nên luyện thêm':'Ổn')+'</p></div>').join('')||'<p class="text-sm text-slate-500">Chưa có dữ liệu chủ đề yếu từ examResults.</p>';

    const avg=avgOf(arr),attempts=arr.length,best=attempts?Math.max(...arr.map(s=>Number(s.percent)||0)):0,perfect=arr.filter(s=>Number(s.percent)>=100).length; const myRank=mine?rows.findIndex(r=>String(r.id)===String(mine.id))+1:0;

m chỉ - cảnh báo.</p><div class="space-y-3">'+achievementLeaderboardHTML(rows)+'</div></div><div class="space-y-5"><div class="glass-card p-5"><h3 class="text-xl font-black mb-3"><i class="fa-solid fa-triangle-exclamation text-amber-600"></i> Chủ đề yếu</h3>'+achievementWeakTopicHTML(arr)+'</div><div class="glass-card p-5"><h3 class="text-xl font-black mb-3"><i class="fa-solid fa-user-graduate text-blue-600"></i> Hồ sơ thành tích '+(isStudentUser(currentUser)?'của em':'top 1')+'</h3>'+(mine?'<div class="grid grid-cols-2 gap-3"><div class="achievement-kpi"><b>'+mine.avg+'%</b><span class="text-sm" style="color:var(--muted)">Điểm TB</span></div><div class="achievement-kpi"><b>'+mine.best+'%</b><span class="text-sm" style="color:var(--muted)">Cao nhất</span></div><div class="achievement-kpi"><b>'+mine.total+'</b><span class="text-sm" style="color:var(--muted)">Lượt làm</span></div><div class="achievement-kpi"><b>'+mine.power+'</b><span class="text-sm" style="color:var(--muted)">Điểm vinh danh</span></div></div>':'<p class="text-sm text-slate-500">Chưa có bài làm.</p>')+'</div><div class="glass-card p-5"><h3 class="text-xl font-black mb-3"><i class="fa-solid fa-medal text-blue-600"></i> Huy hiệu học tập</h3><div class="badge-wall">'+achievementBadgesHTML(rows,mine||{})+'</div></div>'+achievementInsightHTML(rows,arr)+'</div></section><section class="grid xl:grid-cols-[1.1fr_.9fr] gap-5"><div class="glass-card p-5"><h3 class="text-xl font-black mb-3"><i class="fa-solid fa-chart-line text-blue-600"></i> Biểu đồ tiến bộ</h3><div class="achievement-chart">'+achievementTrendSVG(arr)+'</div></div><div class="glass-card p-5"><h3 class="text-xl font-black mb-3"><i class="fa-solid fa-layer-group text-blue-600"></i> Thành tích theo đề</h3>'+achievementExamBreakdownHTML(arr)+'</div></section></div>'; typeset();
  }
  window.renderAchievements=renderAchievements; window.applyAchievementFilters=applyAchievementFilters; window.achievementWeakTopicHTML=achievementWeakTopicHTML;
  const __oldRenderStatsRolePatch=renderStats;
  renderStats=function(){ if(isGuestUser(currentUser)){ $('mainView').innerHTML=roleHomeHTML(); return; } return __oldRenderStatsRolePatch(); }
})();
</script>

      <h2 class="text-2xl font-black text-center">Tạo tài khoản</h2>

        <input id="regU" class="w-full px-4 py-3 rounded-2xl border" placeholder="Email đăng nhập" autocomplete="email">
        <input id="regP" type="password" class="w-full px-4 py-3 rounded-2xl border" placeholder="Mật khẩu" autocomplete="new-password">
        <select id="regRole" class="w-full px-4 py-3 rounded-2xl border bg-white">

<script>
(function(){
  const ARENA_VERSION='arena-pro-2026-04-30';
  let arenaRooms=[], arenaSessions=[], arenaRoomUnsub=null, arenaSessionUnsub=null, arenaState={tab:'rooms',roomId:null,currentQuestionIndex:0,answers:{},remain:0,timer:null,startedAt:null,warnings:0,submitted:false};
  function arenaId(){return 'arena_'+Date.now()+'_'+Math.floor(Math.random()*9999)}
  function arenaLocalLoad(){try{arenaRooms=JSON.parse(localStorage.getItem('mathpro12_arenaRooms')||'[]')||[]}catch(e){arenaRooms=[]}try{arenaSessions=JSON.parse(localStorage.getItem('mathpro12_arenaSessions')||'[]')||[]}catch(e){arenaSessions=[]}}
  function arenaLocalSave(){localStorage.setItem('mathpro12_arenaRooms',JSON.stringify(arenaRooms));localStorage.setItem('mathpro12_arenaSessions',JSON.stringify(arenaSessions));}
  function arenaRoleCanManage(){return typeof isTeacherUser==='function' ? isTeacherUser(currentUser) : !!currentUser && ['teacher','admin'].includes(currentUser.role)}
  function arenaUserCanPlay(){return !!currentUser && ['student','teacher','admin'].includes(currentUser.role)}
  function arenaExamList(){return (exams||[]).filter(e=>!isPdfExam(e) && (e.questions||[]).length)}
  function arenaRoomStatus(room){const now=Date.now();const start=room.startTime?new Date(room.startTime).getTime():0;const end=room.endTime?new Date(room.endTime).getTime():0;if(room.status==='finished'||(end&&now>end))return 'finished';if(room.status==='live'||(start&&now>=start&&(!end||now<=end)))return 'live';return 'waiting'}
  function arenaStatusLabel(room){const s=arenaRoomStatus(room);return s==='live'?'Đang đấu':s==='finished'?'Đã kết thúc':'Chờ mở'}
  function arenaModeLabel(mode){return mode==='solo'?'1vs1':mode==='class'?'Đấu lớp':mode==='global'?'Toàn hệ thống':'Phòng đấu'}
  function arenaScopeRooms(){const role=currentUser?.role||'guest';let list=[...(arenaRooms||[])]; if(role==='student'){list=list.filter(r=>!r.classIds?.length||r.classIds.includes(currentUser.className||''));} return list.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));}
  function arenaFindRoom(id){return arenaRooms.find(r=>String(r.id)===String(id))}
  function arenaRoomSessions(roomId){return arenaSessions.filter(s=>String(s.roomId)===String(roomId)).sort((a,b)=>(Number(b.score)||0)-(Number(a.score)||0)||(Number(a.finishMs)||999999999)-(Number(b.finishMs)||999999999))}
  function arenaMySession(roomId){return arenaSessions.find(s=>String(s.roomId)===String(roomId)&&String(s.userId)===String(currentUser?.id))}
  function arenaQuestionCount(room){const e=exams.find(x=>String(x.id)===String(room?.examId));return (e?.questions||[]).length||room?.questionCount||0}
  function arenaCalcElo(score,total,finishMs,warnings){const pct=total?score*100/total:0;let speed=finishMs?Math.max(0,Math.round(30-(finishMs/60000))):0;return Math.max(0,Math.round(pct*10+speed*6-Number(warnings||0)*20))}
  function arenaRankName(elo){elo=Number(elo)||0;return elo>=2000?'💎 Kim cương':elo>=1500?'🥇 Vàng':elo>=1000?'🥈 Bạc':'🥉 Đồng'}
  async function arenaLoadFromFirestore(){arenaLocalLoad(); if(!firebaseReady)return false; try{const snap=await db.collection('arenaRooms').orderBy('createdAt','desc').limit(100).get(); arenaRooms=snap.docs.map(d=>({id:d.id,...d.data()})); const ss=await db.collection('arenaSessions').orderBy('updatedAt','desc').limit(300).get(); arenaSessions=ss.docs.map(d=>({id:d.id,...d.data()})); arenaLocalSave(); return true;}catch(err){console.warn('Arena Firestore load fail',err);return false;}}
  function arenaListen(){ if(!firebaseReady)return; try{ if(arenaRoomUnsub)arenaRoomUnsub(); arenaRoomUnsub=db.collection('arenaRooms').orderBy('createdAt','desc').limit(100).onSnapshot(snap=>{arenaRooms=snap.docs.map(d=>({id:d.id,...d.data()}));arenaLocalSave(); if(document.getElementById('arenaRoot')) arenaRenderCurrent();}); if(arenaSessionUnsub)arenaSessionUnsub(); arenaSessionUnsub=db.collection('arenaSessions').orderBy('updatedAt','desc').limit(300).onSnapshot(snap=>{arenaSessions=snap.docs.map(d=>({id:d.id,...d.data()}));arenaLocalSave(); if(document.getElementById('arenaRoot')) arenaRenderCurrent();}); }catch(err){console.warn('Arena listen fail',err);} }
  function arenaEnsureSeed(){arenaLocalLoad(); if(arenaRooms.length || !arenaExamList().length)return; const e=arenaExamList()[0]; arenaRooms.unshift({id:'arena_demo_'+Date.now(),title:'Đấu trường luyện nhanh',mode:'room',examId:String(e.id),examTitle:e.title,duration:e.duration||20,maxPlayers:30,classIds:[],status:'waiting',createdAt:new Date().toISOString(),createdBy:'system',createdByName:'Hệ thống',questionCount:(e.questions||[]).length}); arenaLocalSave();}
  async function arenaSaveRoom(room){const idx=arenaRooms.findIndex(r=>String(r.id)===String(room.id)); if(idx>=0)arenaRooms[idx]=room; else arenaRooms.unshift(room); arenaLocalSave(); if(firebaseReady){try{await db.collection('arenaRooms').doc(String(room.id)).set({...room,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(err){toast('Đã lưu local, chưa ghi Firestore đấu trường: '+fbError(err),'bad');}}}
  async function arenaSaveSession(sess){const idx=arenaSessions.findIndex(s=>String(s.id)===String(sess.id)); if(idx>=0)arenaSessions[idx]=sess; else arenaSessions.unshift(sess); arenaLocalSave(); if(firebaseReady){try{await db.collection('arenaSessions').doc(String(sess.id)).set({...sess,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(err){console.warn('save arena session fail',err);}}}
  function arenaKpiHTML(){const rooms=arenaScopeRooms(), live=rooms.filter(r=>arenaRoomStatus(r)==='live').length, players=arenaSessions.filter(s=>s.status!=='left').length, done=arenaSessions.filter(s=>s.status==='submitted').length;return '<section class="grid sm:grid-cols-2 xl:grid-cols-4 gap-4">'+analyticsCard('Phòng đấu',rooms.length,'fa-gamepad','Tổng phòng theo quyền')+analyticsCard('Đang diễn ra',live,'fa-bolt','Realtime',live?'green':'blue')+analyticsCard('Người tham gia',players,'fa-users','Tổng lượt vào')+analyticsCard('Lượt hoàn thành',done,'fa-flag-checkered','Đã nộp')+'</section>'}
  function arenaNavHTML(){return '<div class="arena-tabs no-print"><button onclick="arenaSetTab(\'rooms\')" class="arena-tab '+(arenaState.tab==='rooms'?'active':'')+'"><i class="fa-solid fa-door-open"></i> Phòng đấu</button><button onclick="arenaSetTab(\'leaderboard\')" class="arena-tab '+(arenaState.tab==='leaderboard'?'active':'')+'"><i class="fa-solid fa-ranking-star"></i> BXH</button><button onclick="arenaSetTab(\'my\')" class="arena-tab '+(arenaState.tab==='my'?'active':'')+'"><i class="fa-solid fa-user-ninja"></i> Hồ sơ đấu</button>'+(arenaRoleCanManage()?'<button onclick="arenaSetTab(\'manage\')" class="arena-tab '+(arenaState.tab==='manage'?'active':'')+'"><i class="fa-solid fa-sliders"></i> Quản lý</button>':'')+'</div>'}
  function arenaHeroHTML(){return '<section class="arena-hero"><div class="flex flex-wrap justify-between items-start gap-5"><div><span class="arena-pill"><i class="fa-solid fa-fire"></i> Arena Pro</span><h2 class="text-3xl md:text-5xl font-black mt-3">Đấu trường Toán học</h2><p class="mt-2 text-blue-100 max-w-3xl">Thi đối kháng, phòng đấu realtime, bảng xếp hạng, ELO và cảnh báo gian lận. Kết nối với kho đề và phiên thi hiện có.</p><div class="flex flex-wrap gap-2 mt-4"><span class="arena-pill"><i class="fa-solid fa-shield-halved"></i> Chống rời tab</span><span class="arena-pill"><i class="fa-solid fa-bolt"></i> Realtime Firestore</span><span class="arena-pill"><i class="fa-solid fa-medal"></i> Rank ELO</span></div></div><div class="text-right"><p class="text-sm text-cyan-100 font-bold">Rank hiện tại</p><p class="text-3xl md:text-4xl font-black">'+safe(arenaRankName(arenaMyElo()))+'</p><p class="text-blue-100 text-sm">ELO: '+arenaMyElo()+'</p></div></div></section>'}
  function arenaMyElo(){const rows=arenaSessions.filter(s=>String(s.userId)===String(currentUser?.id)&&s.status==='submitted');return rows.reduce((sum,s)=>sum+Number(s.eloGain||0),0)}
  function arenaRoomCard(room){const s=arenaRoomStatus(room), count=arenaRoomSessions(room.id).length, mine=arenaMySession(room.id);return '<article class="arena-room-card"><div class="flex flex-wrap justify-between gap-2"><span class="arena-mode-badge '+s+'"><i class="fa-solid '+(s==='live'?'fa-circle-play':s==='finished'?'fa-circle-check':'fa-hourglass-half')+'"></i> '+arenaStatusLabel(room)+'</span><span class="arena-mode-badge"><i class="fa-solid fa-chess-knight"></i> '+arenaModeLabel(room.mode)+'</span></div><h3 class="text-xl font-black mt-3 math-content">'+safe(room.title||'Phòng đấu')+'</h3><p class="text-sm mt-1" style="color:var(--muted)">'+safe(room.examTitle||'Chưa chọn đề')+' • '+arenaQuestionCount(room)+' câu • '+(room.duration||20)+' phút</p><p class="text-xs mt-2" style="color:var(--muted)">Lớp: '+(room.classIds?.length?room.classIds.map(safe).join(', '):'Tất cả')+' • Tối đa '+(room.maxPlayers||30)+' người</p><div class="grid grid-cols-3 gap-2 mt-3"><div class="arena-kpi"><b>'+count+'</b><span class="text-xs">Người chơi</span></div><div class="arena-kpi"><b>'+arenaRoomSessions(room.id).filter(x=>x.status==='submitted').length+'</b><span class="text-xs">Đã nộp</span></div><div class="arena-kpi"><b>'+arenaRoomSessions(room.id).filter(x=>x.status==='in_progress').length+'</b><span class="text-xs">Đang làm</span></div></div><div class="flex flex-wrap gap-2 mt-4"><button onclick="arenaOpenRoom(\''+safe(room.id)+'\')" class="btn-primary text-white px-4 py-2 rounded-2xl font-bold"><i class="fa-solid fa-eye"></i> Xem phòng</button>'+(s!=='finished'?'<button onclick="arenaJoinRoom(\''+safe(room.id)+'\')" class="bg-green-600 text-white px-4 py-2 rounded-2xl font-bold"><i class="fa-solid '+(mine?'fa-right-to-bracket':'fa-gamepad')+'"></i> '+(mine?'Vào lại':'Tham gia')+'</button>':'')+(arenaRoleCanManage()?'<button onclick="arenaFinishRoom(\''+safe(room.id)+'\')" class="btn-soft px-4 py-2 rounded-2xl font-bold"><i class="fa-solid fa-flag-checkered"></i> Kết thúc</button>':'')+'</div></article>'}
  function arenaRoomsHTML(){const rooms=arenaScopeRooms();return '<section class="grid md:grid-cols-2 xl:grid-cols-3 gap-5">'+(rooms.map(arenaRoomCard).join('')||'<div class="glass-card p-8 text-center text-slate-500">Chưa có phòng đấu phù hợp. Giáo viên có thể tạo phòng ở tab Quản lý.</div>')+'</section>'}
  function arenaLeaderboardRows(roomId=''){let rows=roomId?arenaRoomSessions(roomId):arenaSessions.filter(s=>s.status==='submitted');rows=[...rows].sort((a,b)=>(Number(b.eloGain)||0)-(Number(a.eloGain)||0)||(Number(b.score)||0)-(Number(a.score)||0));return rows.slice(0,80).map((s,i)=>'<div class="arena-leader-row '+(i===0?'top1':'')+'"><div class="arena-rank '+(i===0?'gold':i===1?'silver':i===2?'bronze':'')+'">'+(i+1)+'</div><div class="min-w-0"><b class="block truncate">'+safe(s.userName||s.studentName||'Học sinh')+'</b><p class="text-xs" style="color:var(--muted)">'+safe(s.className||'Chưa phân lớp')+' • '+safe(s.roomTitle||'Đấu trường')+'</p><div class="arena-progress mt-2"><span style="width:'+(s.total?Math.round(Number(s.score||0)*100/Number(s.total)):0)+'%"></span></div></div><div class="text-right"><b>'+safe((s.score??0)+'/'+(s.total??0))+'</b><p class="text-xs" style="color:var(--muted)">'+(s.percent||0)+'%</p></div><div class="text-right"><b>'+safe(arenaRankName(s.eloGain||0))+'</b><p class="text-xs" style="color:var(--muted)">+'+(s.eloGain||0)+' ELO • ⚠ '+(s.warnings||0)+'</p></div></div>').join('')||'<div class="glass-card p-8 text-center text-slate-500">Chưa có dữ liệu xếp hạng.</div>'}
  function arenaLeaderboardHTML(){return '<section class="glass-card p-5"><div class="flex flex-wrap justify-between gap-3 mb-4"><div><h3 class="text-2xl font-black"><i class="fa-solid fa-ranking-star text-blue-600"></i> Bảng xếp hạng đấu trường</h3><p class="text-sm" style="color:var(--muted)">Xếp theo ELO trận, điểm đúng, tốc độ và cảnh báo.</p></div><button onclick="arenaRefresh()" class="btn-soft px-4 py-2 rounded-2xl font-bold"><i class="fa-solid fa-rotate"></i> Làm mới</button></div><div class="space-y-3">'+arenaLeaderboardRows()+'</div></section>'}
  function arenaMyHTML(){const rows=arenaSessions.filter(s=>String(s.userId)===String(currentUser?.id));const wins=rows.filter(s=>s.rank===1).length;const done=rows.filter(s=>s.status==='submitted').length;const avg=done?Math.round(rows.filter(s=>s.status==='submitted').reduce((a,s)=>a+Number(s.percent||0),0)/done):0;return '<section class="grid md:grid-cols-4 gap-4">'+analyticsCard('ELO',arenaMyElo(),'fa-medal',arenaRankName(arenaMyElo()))+analyticsCard('Trận đã đấu',done,'fa-gamepad','Đã nộp')+analyticsCard('Top 1',wins,'fa-crown','Theo phòng')+analyticsCard('Điểm TB',avg+'%','fa-chart-line','Trong đấu trường',avg>=75?'green':avg>=50?'amber':'red')+'</section><section class="glass-card p-5 mt-5"><h3 class="text-xl font-black mb-3">Lịch sử đấu của em</h3><div class="space-y-3">'+rows.map(s=>'<div class="arena-leader-row"><div class="arena-rank">'+(s.rank||'-')+'</div><div><b>'+safe(s.roomTitle||'Phòng đấu')+'</b><p class="text-xs" style="color:var(--muted)">'+safe(s.submittedAt||s.updatedAt||'')+'</p></div><div><b>'+safe((s.score??0)+'/'+(s.total??0))+'</b></div><div class="text-right"><b>+'+(s.eloGain||0)+' ELO</b><p class="text-xs" style="color:var(--muted)">'+arenaRankName(s.eloGain||0)+'</p></div></div>').join('')+'</div></section>'}
  function arenaManageHTML(){if(!arenaRoleCanManage())return roleHomeHTML();const exs=arenaExamList();return '<section class="glass-card p-5"><h3 class="text-2xl font-black"><i class="fa-solid fa-plus-circle text-blue-600"></i> Tạo phòng đấu mới</h3><p class="text-sm mt-1 mb-4" style="color:var(--muted)">Giáo viên/admin chọn đề từ kho hiện có, đặt chế độ đấu và lớp được tham gia.</p><div class="arena-form-grid"><input id="arenaTitle" class="arena-input" placeholder="Tên phòng, ví dụ: Đấu nhanh 12A1"><select id="arenaExam" class="arena-input">'+exs.map(e=>'<option value="'+safe(e.id)+'">'+safe(e.title)+' • '+(e.questions||[]).length+' câu</option>').join('')+'</select><select id="arenaMode" class="arena-input"><option value="room">Phòng đấu</option><option value="solo">1vs1</option><option value="class">Đấu theo lớp</option><option value="global">Toàn hệ thống</option></select><input id="arenaMaxPlayers" type="number" min="2" max="200" value="30" class="arena-input" placeholder="Số người"><button onclick="arenaCreateRoom()" class="btn-primary text-white px-5 py-3 rounded-2xl font-bold"><i class="fa-solid fa-rocket"></i> Tạo phòng</button></div><div class="mt-3"><label class="block text-sm font-bold mb-2">Lớp được tham gia</label><div class="flex flex-wrap gap-2">'+(classes||[]).map(c=>'<label class="inline-flex items-center gap-2 px-3 py-2 rounded-xl border bg-white/60"><input type="checkbox" class="arenaClassCheck" value="'+safe(c)+'"> '+safe(c)+'</label>').join('')+'<span class="text-xs self-center" style="color:var(--muted)">Không chọn lớp = tất cả lớp.</span></div></div></section><section class="glass-card p-5 mt-5"><h3 class="text-xl font-black mb-3">Quản lý phòng hiện có</h3><div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4">'+arenaScopeRooms().map(arenaRoomCard).join('')+'</div></section>'}
  window.arenaSetTab=function(tab){arenaState.tab=tab; arenaRenderCurrent();}
  function arenaRenderCurrent(){const root=document.getElementById('arenaRoot'); if(!root)return; let body=arenaState.tab==='leaderboard'?arenaLeaderboardHTML():arenaState.tab==='my'?arenaMyHTML():arenaState.tab==='manage'?arenaManageHTML():arenaRoomsHTML(); root.innerHTML=arenaHeroHTML()+arenaNavHTML()+arenaKpiHTML()+body; typeset();}
  window.renderArena=function(){setExamFocusMode(false);clearInterval(examTimer); if(!arenaUserCanPlay()){ $('mainView').innerHTML=roleHomeHTML(); return;} arenaEnsureSeed(); $('mainView').innerHTML='<div id="arenaRoot" class="fade-in space-y-5"></div>'; arenaRenderCurrent(); arenaLoadFromFirestore().then(()=>arenaRenderCurrent()); arenaListen();}
  window.arenaRefresh=function(){arenaLoadFromFirestore().then(()=>{toast('Đã làm mới dữ liệu đấu trường','ok');arenaRenderCurrent();});}
  window.arenaCreateRoom=async function(){if(!arenaRoleCanManage())return toast('Chỉ giáo viên/admin được tạo phòng đấu','bad');const exam=exams.find(e=>String(e.id)===String($('arenaExam')?.value)); if(!exam)return toast('Chưa chọn đề thi','bad');const id=arenaId();const title=($('arenaTitle')?.value||'Đấu trường '+exam.title).trim();const classIds=Array.from(document.querySelectorAll('.arenaClassCheck:checked')).map(x=>x.value);const room={id,title,mode:$('arenaMode')?.value||'room',examId:String(exam.id),examTitle:exam.title,duration:Number(exam.duration||20),maxPlayers:Number($('arenaMaxPlayers')?.value||30),classIds,status:'live',questionCount:(exam.questions||[]).length,createdAt:new Date().toISOString(),createdBy:currentUser?.id||'',createdByName:currentUser?.fullname||currentUser?.email||''};await arenaSaveRoom(room);toast('Đã tạo phòng đấu','ok');arenaState.tab='rooms';arenaRenderCurrent();}
  window.arenaFinishRoom=async function(roomId){if(!arenaRoleCanManage())return;const room=arenaFindRoom(roomId);if(!room)return;room.status='finished';room.finishedAt=new Date().toISOString();await arenaSaveRoom(room);toast('Đã kết thúc phòng đấu','ok');arenaRenderCurrent();}
  window.arenaOpenRoom=function(roomId){const room=arenaFindRoom(roomId);if(!room)return;arenaState.roomId=roomId;const rows=arenaRoomSessions(roomId);const body='<div class="fade-in space-y-5"><section class="arena-hero"><div class="flex flex-wrap justify-between gap-4"><div><span class="arena-pill"><i class="fa-solid fa-door-open"></i> '+arenaStatusLabel(room)+'</span><h2 class="text-3xl font-black mt-3">'+safe(room.title)+'</h2><p class="text-blue-100 mt-1">'+safe(room.examTitle)+' • '+arenaQuestionCount(room)+' câu • '+(room.duration||20)+' phút</p></div><div class="flex gap-2 items-start"><button onclick="renderArena()" class="btn-soft px-4 py-2 rounded-2xl font-bold bg-white/15 text-white border-white/20">Quay lại</button>'+(arenaRoomStatus(room)!=='finished'?'<button onclick="arenaJoinRoom(\''+safe(room.id)+'\')" class="bg-green-600 text-white px-4 py-2 rounded-2xl font-bold">Tham gia đấu</button>':'')+'</div></div></section><section class="grid md:grid-cols-3 gap-4">'+analyticsCard('Người chơi',rows.length,'fa-users')+analyticsCard('Đã nộp',rows.filter(s=>s.status==='submitted').length,'fa-flag-checkered')+analyticsCard('Đang làm',rows.filter(s=>s.status==='in_progress').length,'fa-circle-play')+'</section><section class="glass-card p-5"><h3 class="text-xl font-black mb-3">BXH phòng đấu</h3><div class="space-y-3">'+arenaLeaderboardRows(roomId)+'</div></section></div>';$('mainView').innerHTML=body;typeset();}
  window.arenaJoinRoom=async function(roomId){if(!arenaUserCanPlay())return showLoginModal();const room=arenaFindRoom(roomId);if(!room)return toast('Không tìm thấy phòng đấu','bad');if(arenaRoomStatus(room)==='finished')return toast('Phòng đấu đã kết thúc','bad');if(currentUser?.role==='student'&&room.classIds?.length&&!room.classIds.includes(currentUser.className||''))return toast('Em chưa thuộc lớp được tham gia phòng này','bad');let sess=arenaMySession(roomId);if(!sess){sess={id:arenaId(),roomId,userId:currentUser.id,userName:currentUser.fullname||currentUser.email||currentUser.username,className:currentUser.className||'Chưa phân lớp',roomTitle:room.title,examId:room.examId,examTitle:room.examTitle,status:'in_progress',score:0,total:arenaQuestionCount(room),percent:0,currentQuestionIndex:0,answers:{},warnings:0,createdAt:new Date().toISOString(),startedAt:new Date().toISOString(),lastUpdate:new Date().toISOString()};await arenaSaveSession(sess);} arenaStartBattle(room,sess);}
  function arenaStartBattle(room,sess){const exam=exams.find(e=>String(e.id)===String(room.examId));if(!exam)return toast('Đề thi của phòng không còn tồn tại','bad');arenaState.roomId=room.id;arenaState.sessionId=sess.id;arenaState.answers=sess.answers||{};arenaState.currentQuestionIndex=sess.currentQuestionIndex||0;arenaState.warnings=sess.warnings||0;arenaState.submitted=sess.status==='submitted';arenaState.startedAt=sess.startedAt||new Date().toISOString();arenaState.remain=sess.remain||Number(room.duration||exam.duration||20)*60;selectedExam={...JSON.parse(JSON.stringify(exam)),originalId:String(exam.id),questions:sortQuestionsByExamPart(exam.questions||[])};examAnswerKey=buildAnswerKey(selectedExam);renderArenaBattle();clearInterval(arenaState.timer);if(!arenaState.submitted){arenaState.timer=setInterval(()=>{arenaState.remain--;arenaBattleSync(false);arenaUpdateTimer();if(arenaState.remain<=0){clearInterval(arenaState.timer);arenaSubmitBattle(true)}},1000)} }
  function arenaQuestionAnswered(q){const a=arenaState.answers[q.id];if(q.type==='mc')return a!==undefined&&a!==null&&a!=='';if(q.type==='tf')return Array.isArray(a)&&Array.isArray(q.statements)&&q.statements.every((_,i)=>a[i]===true||a[i]===false);if(q.type==='short')return norm(a).length>0;return false}
  function arenaStats(){const total=selectedExam?.questions?.length||0;const done=(selectedExam?.questions||[]).filter(arenaQuestionAnswered).length;return {total,done,remain:Math.max(total-done,0),percent:total?Math.round(done*100/total):0}}
  function arenaBattleSync(force){const sess=arenaSessions.find(s=>String(s.id)===String(arenaState.sessionId));if(!sess)return;const st=arenaStats();Object.assign(sess,{answers:arenaState.answers,currentQuestionIndex:arenaState.currentQuestionIndex,warnings:arenaState.warnings,remain:arenaState.remain,score:arenaScorePreview(),percent:st.percent,lastUpdate:new Date().toISOString(),status:arenaState.submitted?'submitted':'in_progress'});if(force||!sess._lastSync||Date.now()-sess._lastSync>3500){sess._lastSync=Date.now();arenaSaveSession(sess)}}
  function arenaScorePreview(){let score=0;(selectedExam?.questions||[]).forEach(q=>{const k=examAnswerKey[q.id]||q;const a=arenaState.answers[q.id];let ok=false;if(q.type==='mc')ok=Number(a)===Number(k.answer);if(q.type==='tf')ok=Array.isArray(a)&&Array.isArray(k.answer)&&k.answer.every((v,i)=>a[i]===v);if(q.type==='short')ok=norm(a)===norm(k.answer);if(ok)score++;});return score}
  function arenaRenderQuestion(q,i){const saved=arenaState.answers[q.id];let body='';if(q.type==='mc')body=(q.options||[]).map((o,idx)=>'<label class="option-card flex gap-3 '+(saved==idx?'selected':'')+'"><input type="radio" name="arena_'+q.id+'" onchange="arenaSetMC(\''+safe(q.id)+'\','+idx+')" '+(saved==idx?'checked':'')+'><span class="math-content"><b>'+('ABCD'[idx])+'.</b> '+richMathHTML(o)+'</span></label>').join('');if(q.type==='tf')body=(q.statements||[]).map((s,idx)=>'<div class="option-card"><div class="math-content mb-3"><b>'+String.fromCharCode(97+idx)+')</b> '+richMathHTML(s)+'</div><div class="tf-toggle"><label><input type="radio" name="arena_'+q.id+'_'+idx+'" onchange="arenaSetTF(\''+safe(q.id)+'\','+idx+',true)" '+(saved?.[idx]===true?'checked':'')+'><span>ĐÚNG</span></label><label><input type="radio" name="arena_'+q.id+'_'+idx+'" onchange="arenaSetTF(\''+safe(q.id)+'\','+idx+',false)" '+(saved?.[idx]===false?'checked':'')+'><span>SAI</span></label></div></div>').join('');if(q.type==='short')body='<input value="'+safe(saved||'')+'" oninput="arenaSetShort(\''+safe(q.id)+'\',this.value)" class="w-full md:w-80 px-4 py-3 rounded-2xl border" placeholder="Nhập đáp án ngắn">';return '<section id="arena-question-'+i+'" class="glass-card p-5 exam-question-card"><div class="flex items-center justify-between gap-3 mb-3"><div class="font-black text-blue-700">Câu '+(i+1)+'</div><span class="arena-mode-badge">'+(arenaQuestionAnswered(q)?'Đã trả lời':'Chưa trả lời')+'</span></div><div class="font-bold mb-3 math-content">'+richMathHTML(q.text)+'</div>'+imagePreviewHTML(q)+'<div class="space-y-3">'+body+'</div></section>'}
  window.arenaSetMC=function(qid,idx){arenaState.answers[qid]=idx;arenaBattleSync(true);arenaUpdateProgress();}
  window.arenaSetTF=function(qid,idx,val){if(!arenaState.answers[qid])arenaState.answers[qid]=[];arenaState.answers[qid][idx]=val;arenaBattleSync(true);arenaUpdateProgress();}
  window.arenaSetShort=function(qid,val){arenaState.answers[qid]=val;arenaBattleSync(false);arenaUpdateProgress();}
  function arenaNavigator(){const st=arenaStats();return '<aside class="arena-side glass-card p-5"><div class="arena-countdown" id="arenaTimer">--:--</div><div class="grid grid-cols-2 gap-2 mt-3"><div class="arena-kpi"><b id="arenaDone">'+st.done+'</b><span class="text-xs">Đã làm</span></div><div class="arena-kpi"><b id="arenaRemain">'+st.remain+'</b><span class="text-xs">Còn lại</span></div></div><div class="mt-3"><div class="exam-progress-label"><span>Tiến độ</span><span id="arenaPercent">'+st.percent+'%</span></div><div class="exam-progress-track"><div id="arenaFill" class="exam-progress-fill" style="width:'+st.percent+'%"></div></div></div><div class="arena-qgrid mt-4">'+(selectedExam.questions||[]).map((q,i)=>'<button id="arenaQbtn'+i+'" onclick="arenaGoQuestion('+i+')" class="arena-qbtn '+(arenaQuestionAnswered(q)?'done':'')+' '+(i===arenaState.currentQuestionIndex?'current':'')+'">'+(i+1)+'</button>').join('')+'</div><button onclick="arenaSubmitBattle(false)" class="w-full bg-green-600 text-white px-4 py-3 rounded-2xl font-black mt-4"><i class="fa-solid fa-flag-checkered"></i> Nộp trận đấu</button><button onclick="renderArena()" class="w-full btn-soft px-4 py-3 rounded-2xl font-bold mt-2">Thoát đấu trường</button></aside>'}
  function renderArenaBattle(){const room=arenaFindRoom(arenaState.roomId), rows=arenaRoomSessions(arenaState.roomId).slice(0,2);$('mainView').innerHTML='<div class="fade-in space-y-4"><section class="arena-hero"><div class="arena-vs"><div class="arena-fighter"><b>'+safe(rows[0]?.userName||currentUser?.fullname||'Người chơi')+'</b><p class="text-blue-100 text-sm">'+safe(rows[0]?.score??0)+' điểm</p></div><div class="arena-vs-icon">VS</div><div class="arena-fighter text-right"><b>'+safe(rows[1]?.userName||'Đối thủ / BXH')+'</b><p class="text-blue-100 text-sm">'+safe(rows[1]?.score??0)+' điểm</p></div></div><h2 class="text-2xl font-black mt-4">'+safe(room?.title||'Đấu trường')+'</h2><p class="text-blue-100">'+safe(selectedExam.title)+' • Cảnh báo: <b id="arenaWarnings">'+arenaState.warnings+'</b></p></section><div class="arena-battle-shell">'+arenaNavigator()+'<div class="space-y-5">'+(selectedExam.questions||[]).map(arenaRenderQuestion).join('')+'</div></div></div>';arenaUpdateTimer();setTimeout(()=>arenaGoQuestion(arenaState.currentQuestionIndex||0),50);typeset();}
  window.arenaGoQuestion=function(i){arenaState.currentQuestionIndex=i;document.querySelectorAll('.arena-qbtn').forEach(x=>x.classList.remove('current'));document.getElementById('arenaQbtn'+i)?.classList.add('current');document.getElementById('arena-question-'+i)?.scrollIntoView({behavior:'smooth',block:'start'});arenaBattleSync(false);}
  function arenaUpdateTimer(){const t=document.getElementById('arenaTimer');if(t)t.textContent=String(Math.floor(arenaState.remain/60)).padStart(2,'0')+':'+String(arenaState.remain%60).padStart(2,'0')}
  function arenaUpdateProgress(){const st=arenaStats();['arenaDone','arenaRemain','arenaPercent'].forEach(id=>{const el=document.getElementById(id);if(!el)return;el.textContent=id==='arenaDone'?st.done:id==='arenaRemain'?st.remain:st.percent+'%'});const fill=document.getElementById('arenaFill');if(fill)fill.style.width=st.percent+'%';(selectedExam.questions||[]).forEach((q,i)=>{const b=document.getElementById('arenaQbtn'+i);if(b)b.classList.toggle('done',arenaQuestionAnswered(q));});}
  window.arenaSubmitBattle=async function(auto=false){if(arenaState.submitted)return;arenaState.submitted=true;const sess=arenaSessions.find(s=>String(s.id)===String(arenaState.sessionId));if(!sess)return;let score=0,details=[];(selectedExam.questions||[]).forEach(q=>{const k=examAnswerKey[q.id]||q;const a=arenaState.answers[q.id];let ok=false;if(q.type==='mc')ok=Number(a)===Number(k.answer);if(q.type==='tf')ok=Array.isArray(a)&&Array.isArray(k.answer)&&k.answer.every((v,i)=>a[i]===v);if(q.type==='short')ok=norm(a)===norm(k.answer);if(ok)score++;details.push({qid:q.id,answer:a??null,ok,type:q.type,topicId:q.topicId||selectedExam.topicId,topicName:topicName(q.topicId||selectedExam.topicId)});});const total=(selectedExam.questions||[]).length, percent=total?Math.round(score*100/total):0, finishMs=Date.now()-new Date(arenaState.startedAt||Date.now()).getTime(), eloGain=arenaCalcElo(score,total,finishMs,arenaState.warnings);Object.assign(sess,{status:'submitted',score,total,percent,details,finishMs,eloGain,warnings:arenaState.warnings,autoSubmitted:!!auto,submittedAt:new Date().toISOString(),lastUpdate:new Date().toISOString()});await arenaSaveSession(sess);const rows=arenaRoomSessions(sess.roomId);rows.forEach((r,i)=>{r.rank=i+1;arenaSaveSession(r)});clearInterval(arenaState.timer);toast(auto?'Hết giờ, hệ thống đã nộp trận đấu':'Đã nộp trận đấu','ok');arenaOpenRoom(sess.roomId);}
  document.addEventListener('visibilitychange',function(){if(document.hidden&&document.getElementById('arenaTimer')&&!arenaState.submitted){arenaState.warnings++;const el=document.getElementById('arenaWarnings');if(el)el.textContent=arenaState.warnings;arenaBattleSync(true);toast('Cảnh báo đấu trường: rời khỏi tab. Lần '+arenaState.warnings,arenaState.warnings>=3?'bad':'info');if(arenaState.warnings>=3)arenaSubmitBattle(true);}});
  const __arenaOldHeader=renderHeader; renderHeader=function(){__arenaOldHeader(); const nav=document.querySelector('header nav'); if(nav&&!document.getElementById('arenaNavBtn')){const btn=document.createElement('button');btn.id='arenaNavBtn';btn.onclick=renderArena;btn.className='nav-btn px-3 py-2 rounded-xl hover:bg-blue-50';btn.innerHTML='<i class="fa-solid fa-gamepad"></i> Đấu trường'; const stat=[...nav.querySelectorAll('button')].find(b=>String(b.textContent).includes('Thống kê')); nav.insertBefore(btn,stat||null);} }
  const __arenaOldTeacherDashboard=typeof renderTeacherDashboard==='function'?renderTeacherDashboard:null; if(__arenaOldTeacherDashboard){renderTeacherDashboard=function(){__arenaOldTeacherDashboard();setTimeout(()=>{const box=document.querySelector('.flex.flex-wrap.gap-2');if(box&&!document.getElementById('arenaTeacherBtn')){const b=document.createElement('button');b.id='arenaTeacherBtn';b.onclick=renderArena;b.className='bg-orange-600 text-white px-4 py-2 rounded-2xl font-bold';b.innerHTML='<i class="fa-solid fa-gamepad"></i> Đấu trường';box.prepend(b);}},30)}}
  window.renderArena=window.renderArena; window.arenaRenderCurrent=arenaRenderCurrent;
  arenaLocalLoad();
  try{renderHeader();}catch(e){}
})();
</script>
